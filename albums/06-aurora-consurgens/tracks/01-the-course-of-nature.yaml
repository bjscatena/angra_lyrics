research:
  summary: Abertura do álbum sobre a passagem inexorável do tempo e a efemeridade
    da vida, com metáforas de decadência e solidão.
  themes:
  - passagem do tempo
  - mortalidade
  - solidão
  - natureza
  context: Primeira faixa e single virtual com videoclipe oficial. Letra de Edu Falaschi,
    música de Falaschi e Kiko Loureiro. Estabelece o tom existencial do disco.
  interpretation: A metáfora do 'curso da natureza' liga envelhecimento, perda de
    memória e a sensação de que a vida passa rápido demais para ser plenamente vivida.
