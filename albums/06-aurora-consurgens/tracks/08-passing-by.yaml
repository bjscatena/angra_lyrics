research:
  summary: Peça progressiva sobre o tempo que passa, supernova mental e negação da
    dor — observando a deterioração emocional nos olhos de outro.
  themes:
  - passagem do tempo
  - negação
  - supernova mental
  - tristeza
  context: Composição integral de Felipe Andreoli, com arranjos orquestrados de Fabrizio
    Di Sarno e intro de guitarra de Andreoli. Uma das faixas mais experimentais do
    disco.
  interpretation: A supernova na mente evoca explosão seguida de colapso — distúrbios
    bipolares ou burnout emocional vistos por quem observa impotente.
