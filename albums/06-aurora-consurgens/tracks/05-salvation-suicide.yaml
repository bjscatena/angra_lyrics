# Salvation: Suicide — Aurora Consurgens (2006)
id: 06-aurora-consurgens-05-salvation-suicide
album_id: 06-aurora-consurgens
track_number: 5
title: 'Salvation: Suicide'
language: en
authors:
- Kiko Loureiro
- Rafael Bittencourt
duration: '4:21'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: Wishing to be dead when hope is gone
    translation: Desejando estar morto quando a esperança se foi
    notes: ''
  - original: Depreciating life when the days are looking bad
    translation: Depreciando a vida quando os dias parecem ruins
    notes: ''
  - original: Sick of being alive when everyone is vain
    translation: Cansado de estar vivo quando todos são vãos
    notes: ''
  - original: Lost your hopes and now you fight against depression
    translation: Perdeu suas esperanças e agora luta contra a depressão
    notes: ''
- section: Pre-Chorus
  lines:
  - original: Cause life's hard for everyone just look all around you
    translation: Porque a vida é difícil para todos, olhe ao seu redor
    notes: ''
  - original: So why squander all your power on self-destruction
    translation: Então por que desperdiçar todo seu poder na autodestruição
    notes: ''
- section: Chorus
  lines:
  - original: Too proud to make amends
    translation: Orgulhoso demais para pedir perdão
    notes: ''
  - original: Your faith, it all depends – hold on tight…
    translation: Sua fé, tudo depende dela — aguente firme…
    notes: ''
  - original: Too scared to be alive?
    translation: Com muito medo de estar vivo?
    notes: ''
  - original: Salvation suicide calling me!
    translation: Salvação suicídio me chamando!
    notes: ''
- section: Verse 2
  lines:
  - original: A long way to hell
    translation: Um longo caminho para o inferno
    notes: ''
  - original: My spoiled paradise has met this dead end
    translation: Meu paraíso estragado encontrou este beco sem saída
    notes: ''
  - original: Cause I live my life all on my own with pride
    translation: Porque vivo minha vida sozinho com orgulho
    notes: ''
- section: Chorus (variant)
  lines:
  - original: Too proud to make amends
    translation: Orgulhoso demais para pedir perdão
    notes: ''
  - original: Your faith, it all depends – hold on tight…
    translation: Sua fé, tudo depende dela — aguente firme…
    notes: ''
  - original: Too scared to be alive?
    translation: Com muito medo de estar vivo?
    notes: ''
  - original: Salvation suicide haunting me!
    translation: Salvação suicídio me assombrando!
    notes: ''
- section: Outro
  lines:
  - original: Get out of my way!
    translation: Saia da minha frente!
    notes: ''
  - original: Get out of my way!
    translation: Saia da minha frente!
    notes: ''
  - original: On my way to hell
    translation: A caminho do inferno
    notes: ''
research:
  summary: Confronto direto com ideação suicida e depressão, questionando orgulho
    e autodestruição enquanto a 'salvação' aparece distorcida.
  themes:
  - suicídio
  - depressão
  - orgulho
  - autodestruição
  context: 'Letra de Rafael Bittencourt, música de Kiko Loureiro. Faixa mais veloz
    do disco; o título oxímoro ''Salvation: Suicide'' resume o conflito central.'
  interpretation: A personificação do suicídio como 'salvação' reflete a distorção
    cognitiva de quem vê a morte como única saída — o refrão alterna entre chamado
    e assombração.
