# Ego Painted Grey — Aurora Consurgens (2006)
id: 06-aurora-consurgens-03-ego-painted-grey
album_id: 06-aurora-consurgens
track_number: 3
title: Ego Painted Grey
language: en
authors:
- Kiko Loureiro
- Rafael Bittencourt
duration: '5:38'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: I feel the pain but I'm afraid to cry
    translation: Sinto a dor mas tenho medo de chorar
    notes: ''
  - original: All the time, desperate hiding tears
    translation: O tempo todo, desesperadamente escondendo lágrimas
    notes: ''
  - original: My life is boring and I count the days
    translation: Minha vida é entediante e eu conto os dias
    notes: ''
  - original: On and on, woe is here to stay
    translation: Sem parar, a aflição veio para ficar
    notes: ''
- section: Pre-Chorus
  lines:
  - original: Only if God would show a sign for me
    translation: Se ao menos Deus mostrasse um sinal para mim
    notes: ''
  - original: Oh…
    translation: Oh…
    notes: ''
  - original: Only if God could hold my begging hands
    translation: Se ao menos Deus pudesse segurar minhas mãos suplicantes
    notes: ''
- section: Verse 2
  lines:
  - original: This endless torture's building up my rage
    translation: Esta tortura sem fim está acumulando minha raiva
    notes: ''
  - original: Holding on, hide my agony
    translation: Aguentando firme, escondo minha agonia
    notes: ''
  - original: I'm getting weary just to be alive
    translation: Estou me cansando só de estar vivo
    notes: ''
  - original: All I want is help!!!
    translation: Tudo o que quero é ajuda!!!
    notes: ''
- section: Chorus
  lines:
  - original: So, you dove into the dark beyond yourself?
    translation: Então, você mergulhou na escuridão além de si mesmo?
    notes: ''
  - original: Lost your way to find the surface once again
    translation: Perdeu o caminho para encontrar a superfície outra vez
    notes: ''
  - original: Insomnia will kill all your solemn nights…
    translation: A insônia matará todas as suas noites solenes…
    notes: ''
  - original: Oh!
    translation: Oh!
    notes: ''
  - original: Haunting your despair!!!
    translation: Assombrando seu desespero!!!
    notes: ''
  - original: Sorrow made your life a living hell
    translation: A tristeza fez sua vida um inferno vivo
    notes: ''
  - original: Lights are fading
    translation: As luzes estão se apagando
    notes: ''
  - original: Caught inside the black-holed inner-self
    translation: Preso dentro do eu interior buraco negro
    notes: ''
  - original: Ego painted grey…
    translation: Ego pintado de cinza…
    notes: ''
- section: Chorus (repeat)
  lines:
  - original: Insomnia will hold pleasures in a shell
    translation: A insônia guardará prazeres em uma concha
    notes: ''
  - original: And your defiant stare!!!
    translation: E seu olhar desafiador!!!
    notes: ''
  - original: Sorrow made your life a living hell
    translation: A tristeza fez sua vida um inferno vivo
    notes: ''
  - original: Lights are fading
    translation: As luzes estão se apagando
    notes: ''
  - original: Caught inside the black-holed inner-self
    translation: Preso dentro do eu interior buraco negro
    notes: ''
  - original: Ego painted grey…
    translation: Ego pintado de cinza…
    notes: ''
research:
  summary: Retrato de depressão profunda, insônia e ego esmaecido, com apelo desesperado
    por ajuda divina e humana.
  themes:
  - depressão
  - insônia
  - ego
  - desespero
  context: Letra de Rafael Bittencourt, música de Kiko Loureiro. Título evoca a perda
    de identidade e vitalidade — o ego 'pintado de cinza'.
  interpretation: A imagem do 'buraco negro interior' e do ego acinzentado traduz
    anhedonia e dissolução do self típicas de quadros depressivos severos.
  references:
  - title: DarkLyrics — Aurora Consurgens (2006)
    url: http://www.darklyrics.com/lyrics/angra/auroraconsurgens.html
    type: database
    accessed: '2026-06-06'
