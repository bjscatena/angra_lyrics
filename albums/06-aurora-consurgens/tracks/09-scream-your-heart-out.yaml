# Scream Your Heart Out — Aurora Consurgens (2006)
id: 06-aurora-consurgens-09-scream-your-heart-out
album_id: 06-aurora-consurgens
track_number: 9
title: Scream Your Heart Out
language: en
authors:
- Kiko Loureiro
duration: '4:25'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: Shaken out of liquid dreams you're under
    translation: Sacudido de sonhos líquidos em que está submerso
    notes: ''
  - original: The hellfire-red, insane nightmares
    translation: Pesadelos insanos vermelho-fogo do inferno
    notes: ''
  - original: Is coming back inside
    translation: Estão voltando por dentro
    notes: ''
  - original: Patiently you walk again
    translation: Pacientemente você caminha de novo
    notes: ''
  - original: Through the lane of a sandman's pain
    translation: Pelo caminho da dor do homem da areia
    notes: ''
  - original: Inner urge, tough beliefs
    translation: Impulso interior, crenças firmes
    notes: ''
  - original: Is the way to a land of free
    translation: É o caminho para uma terra livre
    notes: ''
- section: Pre-Chorus
  lines:
  - original: Howling strong
    translation: Uivando forte
    notes: ''
  - original: Shouting loud
    translation: Gritando alto
    notes: ''
  - original: The fear should be cast out now!
    translation: O medo deve ser expulso agora!
    notes: ''
- section: Verse 2
  lines:
  - original: Awoken from a eternal sleep
    translation: Despertado de um sono eterno
    notes: ''
  - original: You're trembling
    translation: Você está tremendo
    notes: ''
  - original: In deadly black
    translation: Em negro mortal
    notes: ''
  - original: With painful eyes
    translation: Com olhos doloridos
    notes: ''
  - original: Delusion is back inside
    translation: A ilusão está de volta por dentro
    notes: ''
  - original: Cry for more
    translation: Clamando por mais
    notes: ''
  - original: To be sure
    translation: Para ter certeza
    notes: ''
  - original: And find your own real truth
    translation: E encontrar sua própria verdade real
    notes: ''
  - original: Let your heart out, put your soul in it!
    translation: Deixe seu coração sair, coloque sua alma nisso!
    notes: ''
- section: Chorus
  lines:
  - original: Time to fly away and let your mind go free
    translation: Hora de voar e deixar sua mente ir livre
    notes: ''
  - original: No denying what this life should give
    translation: Sem negar o que esta vida deve dar
    notes: ''
  - original: From mistakes you learn to forgive
    translation: Dos erros você aprende a perdoar
    notes: ''
  - original: Scream your heart out!
    translation: Grite seu coração para fora!
    notes: ''
  - original: Dig your soul in it
    translation: Cave sua alma nisso
    notes: ''
  - original: Time to fly again and let your mind go free
    translation: Hora de voar de novo e deixar sua mente ir livre
    notes: ''
  - original: No denying what this life should give
    translation: Sem negar o que esta vida deve dar
    notes: ''
  - original: Building dreams of your hope is the key
    translation: Construir sonhos da sua esperança é a chave
    notes: ''
  - original: Feel the truth of your heart to relief
    translation: Sinta a verdade do seu coração para alívio
    notes: ''
  - original: From your dreams you will learn how to live
    translation: Dos seus sonhos você aprenderá a viver
    notes: ''
research:
  summary: Hino catártico que convoca a expressão emocional total como antídoto para
    pesadelos, medo e ilusão.
  themes:
  - catarse
  - superação
  - expressão emocional
  - esperança
  context: Composição integral de Kiko Loureiro. Título dá nome ao álbum ao vivo Scream
    Your Heart Out (2015) e resume a mensagem terapêutica do disco.
  interpretation: Gritar o coração para fora é metáfora de vulnerabilidade radical
    — só enfrentando pesadelos e ilusões internas se constrói esperança autêntica.
  references:
  - title: DarkLyrics — Aurora Consurgens (2006)
    url: http://www.darklyrics.com/lyrics/angra/auroraconsurgens.html
    type: database
    accessed: '2026-06-06'
metadata:
  status: complete
