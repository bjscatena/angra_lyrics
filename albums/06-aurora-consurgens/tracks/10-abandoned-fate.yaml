research:
  summary: Encerramento melancólico sobre solidão, destino abandonado e esperança
    frágil — um castelo de areia à beira do colapso.
  themes:
  - solidão
  - destino
  - esperança frágil
  - liberdade interior
  context: Composição integral de Kiko Loureiro, com contrabaixo acústico de Felipe
    Andreoli. Fecha o álbum em tom introspectivo após a catarse de 'Scream Your Heart
    Out'.
  interpretation: O 'destino abandonado' sugere desamparo existencial, mas a recusa
    em entregar a liberdade interior indica resiliência mínima — aprender a sonhar
    ainda é difícil, porém necessário.
  references:
