# The Voice Commanding You — Aurora Consurgens (2006)
id: 06-aurora-consurgens-02-the-voice-commanding-you
album_id: 06-aurora-consurgens
track_number: 2
title: The Voice Commanding You
language: en
authors:
- Rafael Bittencourt
duration: '5:27'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: War games inside your brain
    translation: Jogos de guerra dentro do seu cérebro
    notes: ''
  - original: You got to fight alone
    translation: Você tem que lutar sozinho
    notes: ''
  - original: Falling back, your sanity has gone
    translation: Recuando, sua sanidade se foi
    notes: ''
  - original: Why'd you ever think that you could run away from pain?
    translation: Por que você achou que poderia fugir da dor?
    notes: ''
  - original: Sorry man, your tries were all in vain
    translation: Desculpe, cara, suas tentativas foram todas em vão
    notes: ''
- section: Verse 2
  lines:
  - original: Wandering 'round like a phantom in the dark
    translation: Vagando como um fantasma na escuridão
    notes: ''
  - original: And you're waiting for the night to come
    translation: E você espera a noite chegar
    notes: ''
  - original: Lunacy attacks and you struggle to hit back
    translation: A loucura ataca e você luta para revidar
    notes: ''
  - original: You'll be waiting for the morning sun
    translation: Você ficará esperando o sol da manhã
    notes: ''
- section: Chorus
  lines:
  - original: I'm the voice commanding you
    translation: Eu sou a voz que te comanda
    notes: ''
  - original: Divided we're nothing – united we're breaking the rules
    translation: Divididos não somos nada — unidos estamos quebrando as regras
    notes: ''
  - original: I'm the voice commanding you
    translation: Eu sou a voz que te comanda
    notes: ''
  - original: Someday the madness will loose control… over you
    translation: Algum dia a loucura perderá o controle… sobre você
    notes: ''
- section: Verse 3
  lines:
  - original: Dreaming on, you can fly in a never-ending story
    translation: Sonhando, você pode voar em uma história sem fim
    notes: ''
  - original: Where the sun will shine every passing day
    translation: Onde o sol brilhará a cada dia que passa
    notes: ''
  - original: Free your mind, let your spirit go free into the night
    translation: Liberte sua mente, deixe seu espírito ir livre na noite
    notes: ''
  - original: Let the minutes be gone and fly away
    translation: Deixe os minutos se irem e voar
    notes: ''
- section: Verse 4
  lines:
  - original: Coming in and out the confusions in your mind
    translation: Entrando e saindo das confusões em sua mente
    notes: ''
  - original: Going crazy as the night moves on
    translation: Enlouquecendo conforme a noite avança
    notes: ''
  - original: Playing with your head now you're wishing to be dead
    translation: Brincando com sua cabeça, agora você deseja estar morto
    notes: ''
  - original: And you're praying for the dawn to come
    translation: E você reza para o amanhecer chegar
    notes: ''
- section: Chorus (variant)
  lines:
  - original: I'm the voice commanding you
    translation: Eu sou a voz que te comanda
    notes: ''
  - original: Divided we're nothing – united we're breaking the rules
    translation: Divididos não somos nada — unidos estamos quebrando as regras
    notes: ''
  - original: I'm the voice commanding you
    translation: Eu sou a voz que te comanda
    notes: ''
  - original: Don't let the madness assume control
    translation: Não deixe a loucura assumir o controle
    notes: ''
  - original: Over you, over you, over you
    translation: Sobre você, sobre você, sobre você
    notes: ''
- section: Bridge
  lines:
  - original: I'll be there reminding who you are
    translation: Estarei lá lembrando quem você é
    notes: ''
  - original: All the time with no escape
    translation: O tempo todo, sem escapatória
    notes: ''
  - original: You look inside the voice is calling you
    translation: Você olha para dentro, a voz está te chamando
    notes: ''
  - original: Take your chance it's never late
    translation: Aproveite sua chance, nunca é tarde
    notes: ''
- section: Final Chorus
  lines:
  - original: I'm the voice commanding you
    translation: Eu sou a voz que te comanda
    notes: ''
  - original: Laying down the law
    translation: Estabelecendo a lei
    notes: ''
  - original: Divided we're nothing – united we're breaking the rules
    translation: Divididos não somos nada — unidos estamos quebrando as regras
    notes: ''
  - original: I'm the voice commanding you
    translation: Eu sou a voz que te comanda
    notes: ''
  - original: Can't make me go away… I'm over you
    translation: Não pode me fazer ir embora… estou sobre você
    notes: ''
  - original: I will never surrender
    translation: Nunca me renderei
    notes: ''
  - original: I'm commanding you
    translation: Estou te comandando
    notes: ''
  - original: Laying down the law over you
    translation: Estabelecendo a lei sobre você
    notes: ''
  - original: A border line
    translation: Uma linha de fronteira
    notes: ''
  - original: That you can't hide
    translation: Que você não pode esconder
    notes: ''
  - original: The voice commanding you
    translation: A voz que te comanda
    notes: ''
research:
  summary: Personificação da voz interior da esquizofrenia ou distúrbio psicótico,
    alternando entre ameaça e suposta proteção.
  themes:
  - esquizofrenia
  - loucura
  - voz interior
  - luta mental
  context: Composição integral de Rafael Bittencourt, com coros madrigalescos de Rita
    Maria, Patricia Zanzoti e Zeca Loureiro. Uma das faixas centrais do tema de saúde
    mental do álbum.
  interpretation: A voz alterna entre prometer liberdade onírica e impor controle
    absoluto, espelhando a ambivalência de experiências alucinatórias e delirantes.
