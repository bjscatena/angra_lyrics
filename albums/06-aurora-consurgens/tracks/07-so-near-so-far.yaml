# So Near So Far — Aurora Consurgens (2006)
id: 06-aurora-consurgens-07-so-near-so-far
album_id: 06-aurora-consurgens
track_number: 7
title: So Near So Far
language: en
authors:
- Kiko Loureiro
duration: '7:09'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: Look at my face
    translation: Olhe para o meu rosto
    notes: ''
  - original: Scars won't deny
    translation: Cicatrizes não negarão
    notes: ''
  - original: Alone again I start to cry
    translation: Sozinho de novo, começo a chorar
    notes: ''
  - original: Staring at me
    translation: Olhando para mim
    notes: ''
  - original: Too blind to see
    translation: Cego demais para ver
    notes: ''
  - original: Open arms
    translation: Braços abertos
    notes: ''
  - original: For all I give
    translation: Por tudo o que dou
    notes: ''
  - original: For all I take
    translation: Por tudo o que recebo
    notes: ''
  - original: Inside of your heart
    translation: Dentro do seu coração
    notes: ''
  - original: So near so far
    translation: Tão perto, tão longe
    notes: ''
  - original: I'm just a boy… like you
    translation: Sou apenas um garoto… como você
    notes: ''
- section: Chorus
  lines:
  - original: Oh! Father I pray
    translation: Oh! Pai, eu rezo
    notes: ''
  - original: For your charity
    translation: Pela sua caridade
    notes: ''
  - original: Wisdom for life
    translation: Sabedoria para a vida
    notes: ''
  - original: Was all I needed
    translation: Era tudo o que eu precisava
    notes: ''
  - original: Was all I wanted
    translation: Era tudo o que eu queria
    notes: ''
  - original: To share with you
    translation: Compartilhar com você
    notes: ''
  - original: You know my heart
    translation: Você conhece meu coração
    notes: ''
  - original: Was not disguise
    translation: Não era disfarce
    notes: ''
  - original: Waiting for you
    translation: Esperando por você
    notes: ''
  - original: So stay with me
    translation: Então fique comigo
    notes: ''
  - original: I'm now a man!
    translation: Agora sou um homem!
    notes: ''
  - original: You know!
    translation: Você sabe!
    notes: ''
- section: Verse 2
  lines:
  - original: Come! Take a chance
    translation: Venha! Arrisque
    notes: ''
  - original: And give it all
    translation: E dê tudo
    notes: ''
  - original: No harmful winds
    translation: Nenhum vento nocivo
    notes: ''
  - original: To whisper for
    translation: Para sussurrar
    notes: ''
  - original: Life is short, you know
    translation: A vida é curta, você sabe
    notes: ''
  - original: We can regret
    translation: Podemos nos arrepender
    notes: ''
  - original: Healing wounds always help us to redress
    translation: Curar feridas sempre nos ajuda a reparar
    notes: ''
  - original: And with you I learned to live
    translation: E com você aprendi a viver
    notes: ''
- section: Final Chorus
  lines:
  - original: Come! Take a chance
    translation: Venha! Arrisque
    notes: ''
  - original: And give it all
    translation: E dê tudo
    notes: ''
  - original: No harmful winds
    translation: Nenhum vento nocivo
    notes: ''
  - original: To whisper for
    translation: Para sussurrar
    notes: ''
  - original: Our time is short, you know
    translation: Nosso tempo é curto, você sabe
    notes: ''
  - original: Must we still regret?
    translation: Ainda devemos nos arrepender?
    notes: ''
  - original: Healing wounds always make time to redress
    translation: Curar feridas sempre faz tempo para reparar
    notes: ''
  - original: And I love you more each day
    translation: E eu te amo mais a cada dia
    notes: ''
research:
  summary: Balada autobiográfica sobre distância emocional entre pai e filho, cicatrizes
    afetivas e desejo de reconciliação.
  themes:
  - relação paterna
  - distância emocional
  - reconciliação
  - maturidade
  context: Composição integral de Kiko Loureiro, com bouzouki e influências brasileiras.
    Faixa mais longa do álbum; frequentemente citada como emocionalmente intensa ao
    vivo.
  interpretation: '''So near so far'' captura a proximidade física com distância emocional
    — o filho que se tornou homem mas ainda busca a presença e validação paterna.'
