history:
  summary: |
    Aurora Consurgens é o sexto álbum de estúdio da Angra e o último com Aquiles Priester na bateria.
    Lançado em outubro de 2006, abandona o formato de álbum conceitual de Temple of Shadows em favor
    de um disco temático sobre distúrbios mentais — depressão, esquizofrenia, bipolaridade, sociopatia
    e tendências suicidas. O título referencia o tratado alquímico medieval Aurora consurgens,
    posteriormente usado por Carl Jung para relacionar sonhos e estados psíquicos.
  recording: |
    Gravado entre junho e agosto de 2006: bateria no House of Audio (Karlsdorf-Neuthard, Alemanha)
    com produção, engenharia e mixagem de Dennis Ward; demais instrumentos no Via Musique Estúdios
    (São Paulo, Brasil), com coprodução de Thiago Bianchi. Masterização por Mika Jussila. Participações
    especiais incluem Fabrizio Di Sarno (teclados e orquestrações), Maurício Alves (percussão) e coros
    madrigalescos em "The Voice Commanding You" (Rita Maria, Patricia Zanzoti, Zeca Loureiro). A capa
    adapta uma ilustração do livro Aurora consurgens; conceito de Rafael Bittencourt, arte de Isabel de
    Amorim, fotografia de Welison Calandria. As sessões ocorreram em meio a conflitos internos na banda.
  concept: |
    Embora não seja um álbum conceitual narrativo, todas as letras compartilham o fio condutor da saúde
    mental e das lutas psicológicas. "The Course of Nature" aborda o passo inexorável do tempo; "The Voice
    Commanding You" personifica a voz interior da esquizofrenia; "Ego Painted Grey" e "Salvation: Suicide"
    exploram depressão e ideação suicida; "Breaking Ties" trata ruptura emocional; "Window to Nowhere"
    e "So Near So Far" examinam escolhas existenciais e distância afetiva; "Passing By" e "Scream Your
    Heart Out" pedem catarse e superação; "Abandoned Fate" fecha em solidão e esperança frágil. O som
    é mais pesado que os predecessores, mantendo influências brasileiras e arranjos progressivos.
  reception: |
    Aurora Consurgens recebeu críticas positivas (Metal Archives ~87%; Lords of Metal 8,5/10; AllMusic)
    e alcançou a 14ª posição no ABPD brasileiro, 17ª no Oricon japonês e 147ª na França. O single virtual
    "The Course of Nature" teve videoclipe oficial. A edição japonesa inclui a faixa bônus "Out of This
    World", escrita em homenagem ao astronauta brasileiro Marcos Pontes. O disco marcou o fim da era
    Priester e preparou o terreno para Aqua (2010), embora a tensão interna durante as gravações tenha
    sido documentada posteriormente pelos integrantes.
