research:
  summary: Alegoria da caverna de Platão com trechos em português e inglês, sobre prisioneiros que contemplam sombras até romper as correntes e alcançar a luz exterior.
  themes:
  - alegoria da caverna
  - Platão
  - iluminação
  - bilingualismo
  context: Sétima faixa de ØMNI; letra bilíngue (PT/EN) de Rafael Bittencourt. Referencia explicitamente a Alegoria da Caverna e cita "um salto gigante para a humanidade" (eco da missão Apollo 11). Trechos em português coloquial contrastam com versos filosóficos em inglês.
  interpretation: Os macacos e a caverna simbolizam a limitação perceptiva humana; a ruptura dos muros e a travessia da "border line" representam iluminação filosófica — sair das sombras para conhecer o mundo real.
  references:
