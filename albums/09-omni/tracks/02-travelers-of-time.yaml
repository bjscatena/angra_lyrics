    translation: Sou seu guia
    notes: ''
  - original: Approaching from the future
    translation: Chegando do futuro
    notes: ''
  - original: Be prepared
    translation: Esteja preparado
    notes: ''
  - original: To fly above the rainbow
    translation: Para voar acima do arco-íris
    notes: ''
  - original: Know that your mind is distorting
    translation: Saiba que sua mente está distorcendo
    notes: ''
  - original: All you feel
    translation: Tudo o que você sente
    notes: ''
  - original: Jumping from places in time
    translation: Saltando de lugares no tempo
    notes: ''
  - original: You have never been
    translation: Onde você nunca esteve
    notes: ''
  - original: Now come along with me!
    translation: Agora venha comigo!
    notes: ''
- section: Chorus
  lines:
