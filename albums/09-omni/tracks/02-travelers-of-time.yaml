lyrics:
- section: Verse 1
  lines:
  - original: Blind your eyes
    translation: Feche os olhos
    notes: ''
  - original: The journey is beginning
    translation: A jornada está começando
    notes: ''
  - original: Hold on tight
    translation: Segure firme
    notes: ''
  - original: We're heading to past times
    translation: Estamos indo para tempos passados
    notes: ''
  - original: Feel how your brain is distorting
    translation: Sinta como seu cérebro está distorcendo
    notes: ''
  - original: All you see
    translation: Tudo o que você vê
    notes: ''
  - original: I have been shouting your name
    translation: Tenho gritado seu nome
    notes: ''
  - original: But you just can't hear
    translation: Mas você simplesmente não consegue ouvir
    notes: ''
  - original: Listen to me!
    translation: Ouça-me!
    notes: ''
- section: Pre-Chorus
  lines:
