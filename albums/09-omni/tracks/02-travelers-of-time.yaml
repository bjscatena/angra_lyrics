    translation: Viajando mais rápido que a velocidade da luz
    notes: ''
  - original: Flash through the skies
    translation: Atravessando os céus em um flash
    notes: ''
  - original: Towards forever
    translation: Em direção ao eterno
    notes: ''
  - original: We'll bring a message that can save mankind
    translation: Trazemos uma mensagem que pode salvar a humanidade
    notes: ''
  - original: Open your minds
    translation: Abram suas mentes
    notes: ''
  - original: Cause we are the travelers of time
    translation: Pois somos os viajantes do tempo
    notes: ''
