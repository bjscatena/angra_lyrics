lyrics:
- section: Verse 1
  lines:
  - original: If you come close I'll tell you a little secret
    translation: Se chegar perto, contarei um pequeno segredo
    notes: ''
  - original: The best ones you can learn from are your enemies
    translation: Os melhores de quem você pode aprender são seus inimigos
    notes: ''
  - original: When it comes to know and defeat your weakness
    translation: Quando se trata de conhecer e vencer sua fraqueza
    notes: ''
  - original: You need to be the hunter and the prey
    translation: Você precisa ser o caçador e a presa
    notes: ''
  - original: Remembering the days
    translation: Lembrando os dias
    notes: ''
  - original: We would be lying on the grass out in the sun
    translation: Em que deitávamos na grama sob o sol
    notes: ''
  - original: Felt good to be friend back then
    translation: Era bom ser amigo naquela época
    notes: ''
  - original: But now we've built a fence of differences
    translation: Mas agora construímos uma cerca de diferenças
    notes: ''
- section: Pre-Chorus
  lines:
  - original: Now please present me what I've lost
    translation: Agora, por favor, mostre-me o que perdi
    notes: ''
  - original: And I'll portray your failures
    translation: E retratarei suas falhas
    notes: ''
  - original: So that we can be complete
    translation: Para que possamos ser completos
    notes: ''
- section: Chorus
  lines:
  - original: It's like a magic mirror
    translation: É como um espelho mágico
    notes: ''
  - original: Colliding mind's reflection
    translation: Colidindo reflexos de mentes
    notes: ''
  - original: They are the sacred window
    translation: Eles são a janela sagrada
    notes: ''
  - original: Reveals the other side
    translation: Revela o outro lado
    notes: ''
  - original: So be the magic mirror
    translation: Então seja o espelho mágico
    notes: ''
  - original: The other eye's perception
    translation: A percepção do outro olho
    notes: ''
  - original: They are the sacred window
    translation: Eles são a janela sagrada
    notes: ''
  - original: Grant that light to shine
    translation: Permita que a luz brilhe
    notes: ''
- section: Verse 2
  lines:
  - original: You and I know what's the best for both of us
    translation: Você e eu sabemos o que é melhor para nós dois
    notes: ''
  - original: Even though our thoughts are not the same
    translation: Mesmo que nossos pensamentos não sejam iguais
    notes: ''
  - original: Living in worlds
    translation: Vivendo em mundos
    notes: ''
  - original: That might be slightly different
    translation: Que podem ser ligeiramente diferentes
    notes: ''
  - original: Let us build a bridge, unite our ways!
    translation: Construamos uma ponte, unamos nossos caminhos!
    notes: ''
  - original: Always remembering the days
    translation: Sempre lembrando os dias
    notes: ''
  - original: We would be lying on the grass out in the sun
    translation: Em que deitávamos na grama sob o sol
    notes: ''
  - original: So, every time you point your fingers
    translation: Então, toda vez que apontar o dedo
    notes: ''
  - original: You deny your own mistakes
    translation: Você nega seus próprios erros
    notes: ''
  - original: Now who's the one to blame?
    translation: Agora quem é o culpado?
    notes: ''
- section: Chorus 2
  lines:
  - original: I see the magic mirror
    translation: Vejo o espelho mágico
    notes: ''
  - original: Colliding mind's reflection
    translation: Colidindo reflexos de mentes
    notes: ''
  - original: They are the sacred window
    translation: Eles são a janela sagrada
    notes: ''
  - original: Reveals the other side
    translation: Revela o outro lado
    notes: ''
  - original: So be the magic mirror
    translation: Então seja o espelho mágico
    notes: ''
  - original: The other eye's perception
    translation: A percepção do outro olho
    notes: ''
  - original: They are the sacred window
    translation: Eles são a janela sagrada
    notes: ''
  - original: Grant that light to shine
    translation: Permita que a luz brilhe
    notes: ''
research:
  summary: Convite à empatia através do "espelho mágico" — usar inimigos e diferenças como reflexo para completar a própria visão e construir pontes.
  themes:
  - empatia
  - espelho
  - diferenças
  - autoconhecimento
  context: Oitava faixa de ØMNI; letra de Rafael Bittencourt. Single com videoclipe. Propõe que aprender com inimigos e reconhecer falhas mútuas permite superar divisões — contraponto humanista às faixas apocalípticas e existenciais.
  interpretation: O espelho mágico simboliza a capacidade de ver o outro como extensão de si mesmo; apontar o dedo revela negação das próprias falhas, enquanto a colisão de mentes abre a "janela sagrada" da compreensão mútua.
