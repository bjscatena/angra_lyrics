research:
  summary: Mergulho existencial na angústia mais profunda — ansiedade, dor e queda até o fundo da alma, cantada por Rafael Bittencourt.
  themes:
  - angústia
  - ansiedade
  - depressão
  - autoconfronto
  context: Quinta faixa de ØMNI; única do álbum com Rafael Bittencourt nos vocais principais. Letra e música de Bittencourt com Andreoli e Valverde. Contraste emocional após as faixas mais fantásticas do disco.
  interpretation: Narrativa de colapso interior onde metáforas de afogamento, lama e agulhas expressam o isolamento no abismo emocional — a pergunta "onde perdi minhas asas" sugere perda de leveza e esperança.
