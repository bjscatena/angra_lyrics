research:
  summary: Metáfora da aranha viúva-negra aplicada à manipulação em redes sociais, vaidade digital e perda de identidade diante de predadores virtuais.
  themes:
  - manipulação
  - redes sociais
  - identidade
  - viúva-negra
  context: Terceira faixa de ØMNI; letra de Rafael Bittencourt com participações vocais de Sandy Lima e Alissa White-Gluz (Arch Enemy). Critica o isolamento e a busca por validação nas redes, usando a aranha como símbolo de armadilha sedutora.
  interpretation: A viúva-negra representa tanto o manipulador quanto a vítima presa pela própria vaidade — dispositivos de "alienação" drenam identidade enquanto a teia se espalha silenciosamente.
  references:
  - title: DarkLyrics — ØMNI (2018)
    url: http://www.darklyrics.com/lyrics/angra/omni.html
    type: database
    accessed: '2026-06-06'
