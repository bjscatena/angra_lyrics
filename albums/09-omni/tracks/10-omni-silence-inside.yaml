lyrics:
- section: Intro
  lines:
  - original: You realize, silence inside, free from time and space
    translation: Você percebe, silêncio interior, livre do tempo e do espaço
    notes: ''
  - original: Echo the horns and thus we reborn in glory
    translation: Ecoam as trombetas e assim renascemos em glória
    notes: ''
  - original: No surprise, mesmerized, the new flow…
    translation: Sem surpresa, mesmerizado, o novo fluxo…
    notes: ''
- section: Verse 1
  lines:
  - original: The miracle of love
    translation: O milagre do amor
    notes: ''
  - original: On the edge of the world
    translation: Na beira do mundo
    notes: ''
  - original: Expands in and out the horizon of ØMNI's infinity
    translation: Expande para dentro e fora do horizonte da infinitude de ØMNI
    notes: ''
  - original: On the edge of the world
    translation: Na beira do mundo
    notes: ''
  - original: The madness of love
    translation: A loucura do amor
    notes: ''
  - original: Ashes blown as the sun goes down like dying ember
    translation: Cinzas soprando enquanto o sol se põe como brasa moribunda
    notes: ''
  - original: There goes life unbroken 'n' fragile, around the OMNIverse
    translation: Aí vai a vida intacta e frágil, ao redor do OMNIverso
    notes: ''
  - original: The limits of void back the source where we belong
    translation: Os limites do vazio nos levam de volta à fonte onde pertencemos
    notes: ''
  - original: Hold your breath, be quiet, receive
    translation: Prenda a respiração, fique quieto, receba
    notes: ''
  - original: Be sure of nothingness
    translation: Tenha certeza do nada
    notes: ''
  - original: Certain and calm, beneath the tides, you cross the line
    translation: Certo e calmo, sob as marés, você cruza a linha
    notes: ''
  - original: From the bounds, sparkling skies are crimson
    translation: Dos limites, céus cintilantes são carmesim
    notes: ''
