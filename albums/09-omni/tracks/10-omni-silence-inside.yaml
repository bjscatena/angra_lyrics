research:
  summary: Penúltima faixa épica que explora o silêncio interior, a dualidade amor/caos e a infinitude de ØMNI na beira do OMNIverso cósmico.
  themes:
  - silêncio interior
  - amor e caos
  - infinito
  - cosmos
  context: Décima faixa de ØMNI; primeira parte do diptico de encerramento com "Infinite Nothing". Letra de Rafael Bittencourt; a faixa mais longa do álbum (8:31). Retoma temas de "War Horns" (trombetas) e "Magic Mirror" (espelhos colidindo).
  interpretation: O "silêncio interior" representa transcendência além do tempo e espaço; a colisão de estrelas de nêutrons e a pergunta "Can't our God be wrong?" confrontam a destruição humana com o milagre e a loucura do amor no horizonte infinito de ØMNI.
  references:
