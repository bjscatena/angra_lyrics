instrumental: true
instrumental_description: |
  Peça instrumental de encerramento do álbum que fecha o diptico cósmico iniciado em
  "ØMNI – Silence Inside". Combina passagens melódicas, solos de guitarra e arranjos
  progressivos que evocam o infinito e o vazio — o "nothing" do título — como resolução
  final da jornada espiritual e existencial de ØMNI. Funciona como epílogo sonoro sem
  vocais, deixando o ouvinte na contemplação do omni (tudo) e do nada infinito.
research:
