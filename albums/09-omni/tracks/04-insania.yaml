research:
  summary: Portal dimensional chamado Insania que despedaça a realidade, une vivos e mortos e liberta a mente da gravidade em um universo onírico sem retorno.
  themes:
  - loucura
  - portal dimensional
  - realidade alternativa
  - transcendência
  context: Quarta faixa de ØMNI; título em latim (insania = loucura) com letra integralmente em inglês de Rafael Bittencourt. Descreve um gateway que transporta o narrador a um mundo onde cidades flutuam e mentes se tornam transparentes.
  interpretation: Insania funciona como metáfora de ruptura com a realidade consensual — uma fuga da monotonia existencial que, embora aterrorizante, promete transcendência e encontro entre planos de existência.
  references:
  - title: DarkLyrics — ØMNI (2018)
    url: http://www.darklyrics.com/lyrics/angra/omni.html
    type: database
    accessed: '2026-06-06'
