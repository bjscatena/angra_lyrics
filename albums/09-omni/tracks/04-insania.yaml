- section: Verse 1
  lines:
  - original: I was just a normal guy in this crazy world
    translation: Eu era apenas um cara normal neste mundo louco
    notes: ''
  - original: Strange like most everyone around me
    translation: Estranho como quase todos ao meu redor
    notes: ''
  - original: Struggling to survive my senseless days
    translation: Lutando para sobreviver aos meus dias sem sentido
    notes: ''
  - original: "Til I found this curious gateway"
    translation: Até que encontrei este curioso portal
    notes: ''
  - original: Dragged inside I thought I'd go insane
    translation: Arrastado para dentro, pensei que enlouqueceria
    notes: ''
  - original: I tried to reach the doors, but I knew it was too late
    translation: Tentei alcançar as portas, mas sabia que era tarde demais
    notes: ''
- section: Chorus
  lines:
  - original: Insania
    translation: Insania
    notes: 'Latim: loucura'
  - original: Insania will trap you there
    translation: Insania te prenderá lá
    notes: ''
  - original: Reality is torn apart
    translation: A realidade é despedaçada
    notes: ''
  - original: The living ones will meet the dead
    translation: Os vivos encontrarão os mortos
    notes: ''
  - original: Insania
    translation: Insania
    notes: 'Latim: loucura'
  - original: Where gravity won't hold you down
    translation: Onde a gravidade não te prenderá
    notes: ''
  - original: And everyone is free to fly
    translation: E todos estão livres para voar
    notes: ''
  - original: When passing through the open gates
    translation: Ao passar pelos portões abertos
    notes: ''
- section: Verse 2
  lines:
  - original: It's a sight you can't conceive, in a dream reality
    translation: É uma visão inconcebível, numa realidade de sonho
    notes: ''
  - original: It's a space that blows your mind when you enter
    translation: É um espaço que explode sua mente quando você entra
    notes: ''
  - original: Once you're there you'll know there is no return
    translation: Uma vez lá, você saberá que não há retorno
    notes: ''
  - original: And the walls keep falling down in front of me
    translation: E as paredes continuam caindo diante de mim
    notes: ''
  - original: Terrified my feet had no control
    translation: Aterrorizado, meus pés não tinham controle
    notes: ''
  - original: Try your way out, there's nowhere to run
    translation: Tente sair, não há para onde correr
    notes: ''
