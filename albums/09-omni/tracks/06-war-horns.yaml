# War Horns — ØMNI (2018)
id: 09-omni-06-war-horns
album_id: 09-omni
track_number: 6
title: War Horns
language: en
authors:
- Rafael Bittencourt
- Felipe Andreoli
- Fabio Lione
- Kiko Loureiro
- Marcelo Barbosa
duration: '4:43'
instrumental: false
lyrics:
- section: Recitative
  lines:
  - original: Trumpets cry warnings from heaven
    translation: Trombetas clamam avisos do céu
    notes: ''
  - original: '"The virgin dressed with the sun'
    translation: '"A virgem vestida de sol'
    notes: 'Apocalipse 12:1'
  - original: With the moon on her feet
    translation: Com a lua aos seus pés
    notes: 'Apocalipse 12:1'
  - original: On her head a garland of twelve stars
    translation: Sobre a cabeça uma coroa de doze estrelas
    notes: 'Apocalipse 12:1'
  - original: Then, being with a child she cries for the birth of a King"'
    translation: Então, estando grávida, clama pelo nascimento de um Rei"
    notes: 'Apocalipse 12:1'
- section: Verse 1
  lines:
  - original: War Horns the sign of the times
    translation: Chifres de guerra, o sinal dos tempos
    notes: ''
  - original: Break through the silent cries
    translation: Rompem os clamores silenciosos
    notes: ''
  - original: Petrified, I'm facing the rapture
    translation: Petrificado, enfrento o arrebatamento
    notes: ''
  - original: Choking on tears, the prophecy fulfills
    translation: Engasgando em lágrimas, a profecia se cumpre
    notes: ''
  - original: The angels come announcing the gathering
    translation: Os anjos vêm anunciando a reunião
    notes: ''
  - original: The wages of sin are for all who live to see
    translation: O salário do pecado é para todos que viverem para ver
    notes: ''
- section: Chorus
  lines:
  - original: War Horns the sign of the times
    translation: Chifres de guerra, o sinal dos tempos
    notes: ''
  - original: Break through the silent cries
    translation: Rompem os clamores silenciosos
    notes: ''
  - original: Visions from prophets unveiled
    translation: Visões dos profetas reveladas
    notes: ''
  - original: All burns in the lake of fire
    translation: Tudo queima no lago de fogo
    notes: ''
- section: Recitative 2
  lines:
  - original: '"Fire will be raining from the sky'
    translation: '"Fogo choverá do céu'
    notes: 'Mateus 24:29'
  - original: The sun will be darkened,
    translation: O sol se escurecerá,
    notes: 'Mateus 24:29'
  - original: The moon will not give its light
    translation: A lua não dará sua luz
    notes: 'Mateus 24:29'
  - original: The stars will fall
    translation: As estrelas cairão
    notes: 'Mateus 24:29'
  - original: And the powers of heaven are shaken
    translation: E os poderes do céu serão abalados
    notes: 'Mateus 24:29'
  - original: That's when the Son of Man
    translation: Então o Filho do Homem
    notes: 'Mateus 24:29'
  - original: Will arise in the clouds"'
    translation: Se levantará nas nuvens"
    notes: 'Mateus 24:29'
- section: Chorus 2
  lines:
  - original: War Horns the sign of the times
    translation: Chifres de guerra, o sinal dos tempos
    notes: ''
  - original: Break through our silent cries
    translation: Rompem nossos clamores silenciosos
    notes: ''
  - original: Visions from prophets unveil
    translation: Visões dos profetas se revelam
    notes: ''
  - original: All burns in the lake of fire
    translation: Tudo queima no lago de fogo
    notes: ''
research:
  summary: Profecia apocalíptica com citações bíblicas sobre o fim dos tempos, arrebatamento e juízo final, anunciada por chifres de guerra.
  themes:
  - apocalipse
  - profecia bíblica
  - juízo final
  - arrebatamento
  context: Sexta faixa de ØMNI; letra de Rafael Bittencourt com seções recitativas citando Apocalipse 12:1 e Mateus 24:29. Kiko Loureiro contribui com solo de guitarra. Single com videoclipe oficial.
  interpretation: Contraste deliberado com faixas anteriores — aqui a transcendência espiritual assume tom bíblico e apocalíptico, onde profetas e anjos anunciam o cumprimento das profecias e o fogo do juízo final.
  references:
  - title: DarkLyrics — ØMNI (2018)
    url: http://www.darklyrics.com/lyrics/angra/omni.html
    type: database
    accessed: '2026-06-06'
metadata:
  status: complete
  last_updated: '2026-06-06'
