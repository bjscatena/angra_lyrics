history:
  summary: |
    ØMNI é o nono álbum de estúdio da Angra e o primeiro após a saída de Kiko Loureiro para o
    Megadeth, com Marcelo Barbosa assumindo as guitarras. Lançado em fevereiro de 2018, o disco
    foi produzido por Jens Bogren na Fascination Street Studios (Örebro, Suécia) e eleito o 2º
    melhor álbum de metal de 2018 pela revista japonesa Burrn!. O título evoca o latim "omni"
    (tudo) e a ideia de um universo infinito onde amor e caos coexistem.
  recording: |
    Gravado e produzido por Jens Bogren na Fascination Street Studios, Örebro, Suécia. Todas as
    letras são de Rafael Bittencourt. Participações especiais: Sandy Lima e Alissa White-Gluz
    (Arch Enemy) em "Black Widow's Web"; Kiko Loureiro (solo de guitarra em "War Horns"). A
    edição japonesa (VICP-65481) inclui faixa bônus "Evilution" e DVD; a edição europeia padrão
    traz 11 faixas. Rafael Bittencourt canta "The Bottom of My Soul".
  concept: |
    ØMNI explora transcendência espiritual, viagem no tempo, armadilhas da mente e da tecnologia,
    dualidade amor/caos e o infinito cósmico. "Light of Transcendence" abre com filosofia oriental
    sobre ilusão e renascimento; "Travelers of Time" propõe mensageiros do futuro; "Black Widow's
    Web" metaforiza manipulação nas redes; "Insania" descreve um portal dimensional; "The Bottom
    of My Soul" mergulha na angústia existencial; "War Horns" e "Caveman" contrastam profecia
    bíblica e alegoria platônica; "Magic Mirror" e "Always More" celebram empatia e aprendizado
    contínuo; o diptico final "Silence Inside" / "Infinite Nothing" fecha o ciclo cósmico do álbum.
  reception: |
    ØMNI alcançou a 42ª posição no Oricon japonês, 133ª na Bélgica (Ultratop Wallonia) e 88ª na
    Suíça. Críticas destacaram a integração de Marcelo Barbosa e a produção de Bogren; Blabbermouth
    atribuiu nota 9.5/10. Singles "War Horns" e "Magic Mirror" tiveram videoclipes; o disco
    preparou o terreno para Cycles of Pain (2023).
