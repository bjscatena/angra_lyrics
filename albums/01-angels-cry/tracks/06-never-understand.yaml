- section: Bridge 1
  lines:
  - original: Desperation fills the air
    translation: O desespero enche o ar
    notes: ''
  - original: (In your heart lies the dust of the anger)
    translation: (No seu coração jaz a poeira da raiva)
    notes: ''
  - original: Madness knocking on my back
    translation: A loucura bate nas minhas costas
    notes: ''
  - original: (Chiming bells have announced the new day)
    translation: (Sinos badalando anunciaram o novo dia)
    notes: ''
  - original: My courage lies someplace
    translation: Minha coragem jaz em algum lugar
    notes: ''
  - original: where time forgot to send me
    translation: onde o tempo esqueceu de me enviar
    notes: ''
  - original: (now where are you going?)
    translation: (agora para onde você vai?)
    notes: ''
  - original: (now where are you going now?)
    translation: (agora para onde você vai agora?)
    notes: ''
  - original: Someday they'll mark your sins
    translation: Algum dia marcarão seus pecados
    notes: ''
  - original: like torture on your back
    translation: como tortura nas suas costas
    notes: ''
- section: Chorus
  lines:
  - original: I wonder why
    translation: Pergunto-me por quê
    notes: ''
  - original: My mind is tight
    translation: Minha mente está tensa
    notes: ''
  - original: Like stormy weather
    translation: Como tempo tempestuoso
    notes: ''
  - original: And so it seems
    translation: E assim parece
    notes: ''
  - original: That little steps
    translation: Que pequenos passos
    notes: ''
  - original: would take forever
    translation: levariam uma eternidade
    notes: ''
  - original: Oh, never understand...
    translation: Oh, nunca entender...
    notes: ''
  - original: We're like mad horses
    translation: Somos como cavalos loucos
    notes: ''
  - original: heading for the bend
    translation: rumo à curva
    notes: ''
  - original: This place I'm standing here
    translation: Este lugar onde estou
    notes: ''
  - original: Made it on my own
    translation: Construí por conta própria
    notes: ''
  - original: Moored my life to never let it go...
    translation: Ancorei minha vida para nunca largá-la...
    notes: ''
