research:
  summary: Peça progressiva que mistura paisagem sonora brasileira e metal épico, expressando incompreensão
    diante das contradições da vida e firmeza pessoal.
  themes:
  - identidade brasileira
  - angústia
  - perseverança
  context: Abre com arranjo inspirado em "Asa Branca" (Luiz Gonzaga). Inclui participações de Kai Hansen,
    Dirk Schlächter e Sascha Paeth nos solos. Metal Express Radio destaca a influência do baião nordestino
    — marca da identidade brasileira no álbum.
  references:
