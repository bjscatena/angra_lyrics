- section: Intro / Verse 1
  lines:
  - original: White gold, a morning came
    translation: Ouro branco, uma manhã chegou
    notes: ''
  - original: Sunny cold, reflecting light
    translation: Frio ensolarado, refletindo luz
    notes: ''
  - original: Unknown songs
    translation: Canções desconhecidas
    notes: ''
  - original: Fresh water gush licks the lime
    translation: Jato de água fresca lambe o cal
    notes: ''
  - original: Sprinkling crowns of silence
    translation: Espargindo coroas de silêncio
    notes: ''
  - original: The face wet from the moistened dew
    translation: O rosto molhado pelo orvalho
    notes: ''
  - original: Wind takes the sight
    translation: O vento leva a vista
    notes: ''
  - original: Around the meadow
