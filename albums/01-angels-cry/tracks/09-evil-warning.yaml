# Evil Warning — Angels Cry (1993)
id: 01-angels-cry-09-evil-warning
album_id: 01-angels-cry
track_number: 9
title: Evil Warning
language: en
authors:
- Rafael Bittencourt
- Andre Matos
duration: '6:42'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: Time to believe in the dream that you've seen
    translation: Hora de acreditar no sonho que você viu
    notes: ''
  - original: In a world that is broken and mean
    translation: Num mundo que é quebrado e mesquinho
    notes: ''
  - original: One day the sun it will shine for us all
    translation: Um dia o sol brilhará para todos nós
    notes: ''
  - original: Take the freedom that you have fore-seen...
    translation: Tome a liberdade que você previu...
    notes: ''
  - original: Miles away
    translation: Milhas de distância
    notes: ''
  - original: You're heading for the unknown
    translation: Você segue para o desconhecido
    notes: ''
  - original: and there's no way to get back
    translation: e não há caminho de volta
    notes: ''
  - original: Time to complain
    translation: Hora de reclamar
    notes: ''
  - original: Nobody is telling the truth
    translation: Ninguém está dizendo a verdade
    notes: ''
  - original: To live in the crowd
    translation: Viver na multidão
    notes: ''
  - original: sick of your own vanity
    translation: cansado da sua própria vaidade
    notes: ''
  - original: Dead scattered petals around
    translation: Pétalas mortas espalhadas por aí
    notes: ''
  - original: Hymns of betrayal
    translation: Hinos de traição
    notes: ''
  - original: calling you for the attack
    translation: convocando você para o ataque
    notes: ''
- section: Chorus
  lines:
  - original: Evil warning
    translation: Aviso maligno
    notes: ''
  - original: You're much too fast
    translation: Você é rápido demais
    notes: ''
  - original: and much too high,
    translation: e alto demais,
    notes: ''
  - original: No time to worry!
    translation: Sem tempo para se preocupar!
    notes: ''
  - original: It's over,
    translation: Acabou,
    notes: ''
  - original: no more remaining time
    translation: não resta mais tempo
    notes: ''
  - original: to cry and feel the pain...
    translation: para chorar e sentir a dor...
    notes: ''
  - original: In the morning
    translation: De manhã
    notes: ''
  - original: You stagger up
    translation: Você cambaleia
    notes: ''
  - original: to start to fight
    translation: para começar a lutar
    notes: ''
  - original: You get so lonely...
    translation: Você fica tão solitário...
    notes: ''
  - original: with no fore-sight
    translation: sem visão de futuro
    notes: ''
  - original: until another day!
    translation: até outro dia!
    notes: ''
- section: Verse 2
  lines:
  - original: Run, don't wait for the sun,
    translation: Corra, não espere pelo sol,
    notes: ''
  - original: cause it's setting on your hopes
    translation: pois ele se põe sobre suas esperanças
    notes: ''
  - original: Don't look far behind
    translation: Não olhe muito para trás
    notes: ''
  - original: for the shadows,
    translation: pelas sombras,
    notes: ''
  - original: they will stand...
    translation: elas permanecerão...
    notes: ''
  - original: Until the end!
    translation: Até o fim!
    notes: ''
