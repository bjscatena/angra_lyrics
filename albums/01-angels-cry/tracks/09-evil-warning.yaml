research:
  summary: Faixa vigorosa que alerta contra a passividade diante de um mundo quebrado, urgindo correr
    antes que o sol se ponha sobre as esperanças.
  themes:
  - liberdade
  - urgência
  - confronto
  context: Deu nome ao EP de 1994 e inclui arranjo de "Winter" (Vivaldi). Uma das preferidas de Matos
    para shows; versão alternativa de vocais aparece em reedições de Angels Cry.
