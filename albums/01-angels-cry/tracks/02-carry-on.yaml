# Carry On — Angels Cry (1993)
id: 01-angels-cry-02-carry-on
album_id: 01-angels-cry
track_number: 2
title: Carry On
language: en
authors:
- Andre Matos
duration: '5:05'
instrumental: false
lyrics:
- section: Intro
  lines:
  - original: Simple minded brain,
    translation: Cérebro de mente simples,
    notes: ''
  - original: For now you succumb
    translation: Por agora você sucumbe
    notes: ''
  - original: Nothing changes your way
    translation: Nada muda o seu caminho
    notes: ''
  - original: This worlds insists to be the same
    translation: Este mundo insiste em ser o mesmo
    notes: ''
  - original: Based on our mistakes
    translation: Baseado em nossos erros
    notes: ''
  - original: The flowers fade along the road
    translation: As flores murcham ao longo da estrada
    notes: ''
  - original: Don't blindfold your eyes,
    translation: Não venda seus olhos,
    notes: ''
  - original: So loneliness becomes the law of a senseless life
    translation: Para que a solidão se torne a lei de uma vida sem sentido
    notes: ''
- section: Verse 1
  lines:
  - original: Follow your steps and you will find
    translation: Siga seus passos e você encontrará
    notes: ''
  - original: The unknown ways are on your mind
    translation: Os caminhos desconhecidos estão em sua mente
    notes: ''
  - original: Need nothing else than just your pride to get there...
    translation: Não precisa de nada além do seu orgulho para chegar lá...
    notes: ''
  - original: Go!
    translation: Vá!
    notes: ''
- section: Verse 2
  lines:
  - original: Now you have to face another day
    translation: Agora você tem que encarar mais um dia
    notes: ''
  - original: You won't be alone
    translation: Você não estará sozinho
    notes: ''
  - original: This life is forcing us to stay - for how long?
    translation: Esta vida nos força a permanecer — por quanto tempo?
    notes: ''
  - original: Cold is the wind and thunder struck on a stormy night
    translation: Frio é o vento e o trovão ruge em uma noite tempestuosa
    notes: ''
  - original: But can't you see, I'm by your side
    translation: Mas você não vê, estou ao seu lado
    notes: ''
  - original: We are marching on!
    translation: Estamos marchando!
    notes: ''
- section: Pre-Chorus
  lines:
  - original: Follow your steps and you will find
    translation: Siga seus passos e você encontrará
    notes: ''
  - original: The unknown ways are on your mind
    translation: Os caminhos desconhecidos estão em sua mente
    notes: ''
  - original: Need nothing else than just your pride to get there...
    translation: Não precisa de nada além do seu orgulho para chegar lá...
    notes: ''
- section: Chorus
  lines:
  - original: So, carry on,
    translation: Então, siga em frente,
    notes: ''
  - original: There's a meaning to life
    translation: Há um significado para a vida
    notes: ''
  - original: Which someday we may find...
    translation: Que algum dia poderemos encontrar...
    notes: ''
  - original: Carry on, it's time to forget
    translation: Siga em frente, é hora de esquecer
    notes: ''
  - original: The remains from the past, to carry on
    translation: Os restos do passado, para seguir em frente
    notes: ''
