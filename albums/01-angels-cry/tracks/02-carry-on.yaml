research:
  summary: Hino de perseverança que encoraja a seguir em frente apesar das dificuldades, confiando que
    existe um sentido para a vida além das feridas do passado.
  themes:
  - superação
  - esperança
  - amizade
  context: Uma das composições mais emblemáticas de Matos no álbum de estreia; também apareceu no demo
    Reaching Horizons (1992) e em reedições/remixes. Tornou-se marca registrada da banda em shows ao longo
    de décadas.
  references:
  - title: DarkLyrics — Angels Cry (1993)
    url: http://www.darklyrics.com/lyrics/angra/angelscry.html
    type: database
    accessed: '2026-06-06'
  interpretation: A letra alterna conselho solitário ("simple minded brain") e promessa de companheirismo
    ("I'm by your side"), sugerindo superação coletiva — tema recorrente no power metal dos anos 1990.
