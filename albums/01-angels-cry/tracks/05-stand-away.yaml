research:
  summary: Balada épica que critica instituições religiosas e poderes opressores, pedindo distância do
    fogo destrutivo e descanso em paz.
  themes:
  - religião
  - opressão
  - solidão
  context: Única faixa do álbum com letra escrita por Bittencourt. Destaca-se pelo intro acústico, coros
    operáticos e extensão vocal de Matos. Aborda desilusão com a Igreja e autoridades que exploram a fé
    das massas.
