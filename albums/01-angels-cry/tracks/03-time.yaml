lyrics:
- section: Verse 1
  lines:
  - original: This time I wanna know
    translation: Desta vez quero saber
    notes: ''
  - original: what life means...
    translation: o que a vida significa...
    notes: ''
  - original: '...to live it again'
    translation: '...para vivê-la de novo'
    notes: ''
  - original: I'm looking forward, feel the
    translation: Olho adiante, sinto a
    notes: ''
  - original: light shine in my eyes...
    translation: luz brilhar em meus olhos...
    notes: ''
  - original: And now I know, my instincts
    translation: E agora sei, meus instintos
    notes: ''
  - original: were not wrong,
    translation: não estavam errados,
    notes: ''
  - original: and many things can be done
    translation: e muitas coisas podem ser feitas
    notes: ''
  - original: I don't believe now,
    translation: Não acredito agora,
    notes: ''
  - original: That I'm dreaming alone
    translation: Que estou sonhando sozinho
    notes: ''
- section: Verse 2
  lines:
  - original: Oh, we're searching for the love
    translation: Oh, estamos buscando o amor
    notes: ''
  - original: that everyone's got,
    translation: que todos possuem,
    notes: ''
  - original: but can't see (yeah)
    translation: mas não conseguem ver (yeah)
    notes: ''
  - original: Oh, beyond the flesh and blood
    translation: Oh, além da carne e do sangue
    notes: ''
  - original: there's so much hidden behind
    translation: há tanto escondido por trás
    notes: ''
  - original: as so much more we've gotta give...
    translation: e muito mais que temos de dar...
    notes: ''
- section: Bridge
  lines:
  - original: Sanity brings up the sadness
    translation: A sanidade traz a tristeza
    notes: ''
  - original: that keeps your illusions locked
    translation: que mantém suas ilusões trancadas
    notes: ''
  - original: in a little box
    translation: numa caixinha
    notes: ''
  - original: Fright comes, you find yourself lonely
    translation: O medo vem, você se vê solitário
    notes: ''
  - original: in a cage of conclusions
    translation: numa gaiola de conclusões
    notes: ''
  - original: crowding your mind
    translation: apertando sua mente
    notes: ''
  - original: You sit back bowing your head,
    translation: Você recua abaixando a cabeça,
    notes: ''
  - original: every answer - yes
    translation: toda resposta — sim
    notes: ''
  - original: Why don't you trust me
    translation: Por que você não confia em mim
    notes: ''
  - original: and shed out your fears,
    translation: e deixa sair seus medos,
    notes: ''
  - original: Running over
    translation: Correndo sobre
    notes: ''
  - original: the tears you've contained
    translation: as lágrimas que você conteve
    notes: ''
  - original: now cover up your eyes,
    translation: agora cobrem seus olhos,
    notes: ''
  - original: '- Is it good for you?'
    translation: — Isso é bom para você?
    notes: ''
- section: Pre-Chorus
  lines:
  - original: I will be here when fire burns!...
    translation: Estarei aqui quando o fogo arder!...
    notes: ''
  - original: Welcome on board
    translation: Bem-vindo a bordo
    notes: ''
  - original: over here is the ship of your life
    translation: aqui está o navio da sua vida
    notes: ''
  - original: So rotten
    translation: Tão podre
    notes: ''
  - original: that will cast away
    translation: que será lançado ao mar
    notes: ''
  - original: I'll be your sweet lullaby
    translation: Serei sua doce canção de ninar
    notes: ''
  - original: all the night
    translation: a noite toda
    notes: ''
  - original: And if you get lost
    translation: E se você se perder
    notes: ''
  - original: you can hold my hand...
    translation: pode segurar minha mão...
    notes: ''
- section: Chorus
  lines:
  - original: And I'll be here when fire burns
    translation: E estarei aqui quando o fogo arder
    notes: ''
  - original: (inside your heart)
    translation: (dentro do seu coração)
    notes: ''
  - original: Climb up the hills and mountains,
    translation: Suba as colinas e montanhas,
    notes: ''
  - original: don't forget what you've learned!
    translation: não esqueça o que aprendeu!
    notes: ''
  - original: Life make us feel
    translation: A vida nos faz sentir
    notes: ''
  - original: the time we cannot hold
    translation: o tempo que não podemos segurar
    notes: ''
  - original: Time make us live
    translation: O tempo nos faz viver
    notes: ''
  - original: a tale already told
    translation: um conto já contado
    notes: ''
  - original: Time make us heal
    translation: O tempo nos faz curar
    notes: ''
  - original: a feeling inside
    translation: um sentimento interior
    notes: ''
  - original: a feeling that lies in your heart
    translation: um sentimento que jaz no seu coração
    notes: ''
  - original: that we stole away...
    translation: que roubamos...
