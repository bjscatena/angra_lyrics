lyrics:
- section: Verse 1
  lines:
  - original: Cry in the night of the angel
    translation: Chorem na noite os anjos
    notes: ''
  - original: For their light will never shine
    translation: Pois sua luz jamais brilhará
    notes: ''
  - original: With their hearts so full of sorrow
    translation: Com corações tão cheios de tristeza
    notes: ''
  - original: Muddy waters all around
    translation: Águas lamacentas por toda parte
    notes: ''
  - original: The curtain falls
    translation: A cortina cai
    notes: ''
  - original: for helpless souls
    translation: para almas indefesas
    notes: ''
  - original: How they suffer swept aside
    translation: Como sofrem, varridas para o lado
    notes: ''
  - original: And the raging streams are flowing
    translation: E as correntes furiosas fluem
    notes: ''
  - original: with so little hope inside
    translation: com tão pouca esperança interior
    notes: ''
- section: Chorus
  lines:
  - original: (Is like)
    translation: (É como)
    notes: ''
  - original: Angels crying
    translation: Anjos chorando
    notes: ''
  - original: Can't take no more
    translation: Não aguentam mais
    notes: ''
  - original: Angels dying
    translation: Anjos morrendo
    notes: ''
  - original: capture their fall
    translation: capturam sua queda
    notes: ''
- section: Verse 2
  lines:
  - original: Try to see this misery
    translation: Tente ver esta miséria
    notes: ''
  - original: your future is not what you wished it to be
    translation: seu futuro não é o que você desejou que fosse
    notes: ''
  - original: So try to fly, the answer lies
    translation: Então tente voar, a resposta está
    notes: ''
  - original: in the angry darkened skies (angry darkened skies)
    translation: nos céus sombrios e furiosos (céus sombrios e furiosos)
    notes: ''
  - original: You just keep on standing in these fields
    translation: Você continua parado nestes campos
    notes: ''
  - original: all your life
    translation: a vida toda
    notes: ''
  - original: You sow the seeds that never grow
    translation: Você semeia sementes que nunca crescem
    notes: ''
  - original: No harvest comes such a strain
    translation: Nenhuma colheita vem, tamanho esforço
    notes: ''
  - original: to feed the few
    translation: para alimentar os poucos
    notes: ''
  - original: Still you're waiting, it's in vain...
    translation: Ainda você espera, é em vão...
    notes: ''
  - original: The change must come right now!
    translation: A mudança tem de vir agora!
    notes: ''
- section: Bridge
  lines:
  - original: Oh, see the sun in the sky
    translation: Oh, veja o sol no céu
    notes: ''
  - original: (from the dawn of destruction)
    translation: (desde o amanhecer da destruição)
    notes: ''
  - original: Free, free this chain from my heart... (chain, chain, chain)
    translation: Liberte, liberte esta corrente do meu coração... (corrente, corrente, corrente)
    notes: ''
  - original: Hear the cry of angels
    translation: Ouça o clamor dos anjos
    notes: ''
  - original: from this life you cannot hide
    translation: desta vida da qual você não pode se esconder
    notes: ''
  - original: The change may come tomorrow
    translation: A mudança pode vir amanhã
    notes: ''
  - original: for the solemn weeping eyes
    translation: para os olhos solenes e lacrimosos
    notes: ''
