  - original: Angels are crying and dying
    translation: Anjos estão chorando e morrendo
    notes: ''
  - original: There must be some way
    translation: Deve haver algum caminho
    notes: ''
  - original: endless you stray, still you pray
    translation: errante sem fim, ainda você reza
    notes: ''
  - original: for a better life
    translation: por uma vida melhor
    notes: ''
  - original: Nobody sees when a glimpse
    translation: Ninguém vê quando um vislumbre
    notes: ''
