research:
  summary: 'Epopeia que dá nome ao álbum: anjos que choram diante da miséria humana, incitando mudança
    e liberdade diante de um futuro que não corresponde aos sonhos.'
  themes:
  - injustiça social
  - esperança
  - metáfora bíblica
  context: Faixa-título composta por Bittencourt; inclui citação do 24º Capricho de Paganini no solo de
    guitarra. Tema central do disco e uma das músicas mais executadas da banda; ganhou remix no EP Evil
    Warning (1994).
