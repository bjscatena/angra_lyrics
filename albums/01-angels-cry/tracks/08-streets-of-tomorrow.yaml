lyrics:
- section: Verse 1
  lines:
  - original: Days of pounding emptiness
    translation: Dias de vazio esmagador
    notes: ''
  - original: Just so far away, no regret
    translation: Tão distantes, sem arrependimento
    notes: ''
  - original: to live beside the danger
    translation: de viver ao lado do perigo
    notes: ''
  - original: Running out of carelessness
    translation: Acabando com a despreocupação
    notes: ''
  - original: Still unlinked the tips of a bridge
    translation: Ainda desconectadas as pontas de uma ponte
    notes: ''
  - original: That gets no one to nowhere
    translation: Que não leva ninguém a lugar algum
    notes: ''
- section: Pre-Chorus
  lines:
  - original: Let me run away
    translation: Deixe-me fugir
    notes: ''
  - original: Freed from lies, I won't forget
    translation: Liberto das mentiras, não esquecerei
    notes: ''
  - original: Escaping from this chains
    translation: Escapando destas correntes
    notes: ''
  - original: I'll meet my love
    translation: Encontrarei meu amor
    notes: ''
  - original: Once again flying
    translation: Voando mais uma vez
    notes: ''
  - original: Clouds from heaven
    translation: Nuvens do céu
    notes: ''
- section: Chorus
  lines:
  - original: So, now?
    translation: Então, agora?
    notes: ''
  - original: Tell me how
    translation: Diga-me como
    notes: ''
  - original: To walk the streets of tomorrow
    translation: Caminhar pelas ruas de amanhã
    notes: ''
  - original: Someday, somehow
    translation: Algum dia, de algum modo
    notes: ''
  - original: Then we'll know
    translation: Então saberemos
    notes: ''
  - original: How things went wrong
    translation: Como as coisas deram errado
    notes: ''
  - original: And how?
    translation: E como?
    notes: ''
  - original: Tell me now
    translation: Diga-me agora
    notes: ''
  - original: To live in peace not forever
    translation: Viver em paz, não para sempre
    notes: ''
  - original: The moment remains
    translation: O momento permanece
    notes: ''
  - original: And flows...
    translation: E flui...
    notes: ''
  - original: Don't let it go!
    translation: Não deixe escapar!
    notes: ''
