research:
  summary: Balada melódica sobre fuga de mentiras e busca de paz, questionando como caminhar pelas ruas
    de um amanhã incerto.
  themes:
  - liberdade
  - incerteza
  - futuro
  context: Co-composição de Loureiro e Matos; uma das faixas que mostra a parceria criativa entre guitarrista
    e vocalista na fase inicial da banda.
