lyrics:
- section: Verse 1
  lines:
  - original: Out on the wiley, windy moors
    translation: Lá fora, nos charnecos ventosos e traiçoeiros
    notes: ''
  - original: We'd roll and fall in green
    translation: Rolávamos e caíamos na grama
    notes: ''
  - original: You had a temper, like my jealousy
    translation: Você tinha um temperamento, como minha ciúme
    notes: ''
  - original: Too hot, too greedy
    translation: Quente demais, ganancioso demais
    notes: ''
  - original: How could you leave me?
    translation: Como pôde me deixar?
    notes: ''
  - original: When I needed to possess you
    translation: Quando eu precisava possuir você
    notes: ''
  - original: I hated you, I loved you too...
    translation: Eu te odiava, eu te amava também...
    notes: ''
- section: Pre-Chorus
  lines:
  - original: Bad dreams in the night,
    translation: Pesadelos na noite,
    notes: ''
  - original: They told me I was going to loose the fight
    translation: Me disseram que eu ia perder a luta
    notes: ''
  - original: Leave behind my wuthering, wuthering,
    translation: Deixar para trás meu uivante, uivante,
    notes: ''
  - original: Wuthering heights
    translation: Morro dos Ventos Uivantes
    notes: ''
- section: Chorus
  lines:
