    translation: Volte para casa, estou tão fria
    notes: ''
  - original: Let me in-a-your window
    translation: Deixe-me entrar pela sua janela
    notes: ''
- section: Verse 2
  lines:
  - original: Oh, it gets dark, it gets lonely
    translation: Oh, fica escuro, fica solitário
    notes: ''
  - original: On the other side from you
    translation: Do outro lado de você
    notes: ''
  - original: I pine a lot, I find the lot
    translation: Eu languideço muito, acho que tudo
    notes: ''
  - original: Falls through without you
    translation: Desmorona sem você
    notes: ''
  - original: I'm coming back, love
    translation: Estou voltando, amor
    notes: ''
  - original: Cruel Heathcliff
    translation: Cruel Heathcliff
    notes: ''
  - original: My one dream, my only master...
    translation: Meu único sonho, meu único mestre...
    notes: ''
