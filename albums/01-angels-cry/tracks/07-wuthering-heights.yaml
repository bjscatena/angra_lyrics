research:
  summary: Cover do clássico de Kate Bush inspirado em "O Morro dos Ventos Uivantes", reinterpretado com
    a intensidade vocal de Matos e bateria de Thomas Nack.
  themes:
  - amor obsessivo
  - literatura
  - cover
  context: Kate Bush escreveu a música aos 18 anos, baseada no romance de Emily Brontë. Matos escolheu
    a faixa por admiração à original; Thomas Nack (Gamma Ray) tocou bateria por ser fã de Bush e dominar
    o groove da música.
