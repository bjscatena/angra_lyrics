lyrics:
- section: I — The Parting Words
  lines:
  - original: Years gone by - Awake again
    translation: Anos se foram — Desperto de novo
    notes: ''
  - original: In a glowing star - That shines so far
    translation: Numa estrela brilhante — Que brilha tão longe
    notes: ''
  - original: Lasting child - Remains inside
    translation: Criança duradoura — Permanece interior
    notes: ''
  - original: Playing around - A future denied
    translation: Brincando — Um futuro negado
    notes: ''
  - original: High overhead, dusk is insight.
    translation: Bem acima, o crepúsculo está próximo.
    notes: ''
  - original: Fumbling the mist
    translation: Tateando a névoa
    notes: ''
  - original: Lingering around...
    translation: Permanecendo por aí...
    notes: ''
- section: I — The Parting Words (continued)
  lines:
  - original: Blow,
    translation: Sopre,
    notes: ''
  - original: Carrying winds
    translation: Ventos carregadores
    notes: ''
  - original: Take me high
    translation: Levem-me alto
    notes: ''
  - original: Where I can see
    translation: Onde eu possa ver
    notes: ''
  - original: The hidden lights
    translation: As luzes ocultas
    notes: ''
  - original: That blink far beyond...
    translation: Que piscam bem longe...
    notes: ''
