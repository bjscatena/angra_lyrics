    notes: ''
- section: I — The Parting Words (final)
  lines:
  - original: And then
    translation: E então
    notes: ''
  - original: A painted dream
    translation: Um sonho pintado
    notes: ''
  - original: Colours that melt
    translation: Cores que se fundem
    notes: ''
  - original: Inside slender frames
    translation: Dentro de molduras esbeltas
    notes: ''
