lyrics:
- section: Verse 1
  lines:
  - original: I was living so out of control
    translation: Eu vivia tão fora de controle
    notes: ''
  - original: Like I was immortal
    translation: Como se fosse imortal
    notes: ''
  - original: No man of mercy
    translation: Nenhum homem de misericórdia
    notes: ''
  - original: Couldn't understand
    translation: Conseguia entender
    notes: ''
  - original: In the end there'll be resolution
    translation: No fim haverá resolução
    notes: ''
  - original: One's confined by their own conclusions
    translation: Cada um é confinado por suas próprias conclusões
    notes: ''
  - original: No forgiveness for sins we can't explain
    translation: Sem perdão para pecados que não podemos explicar
    notes: ''
  - original: So one sided
    translation: Tão unilateral
    notes: ''
- section: Pre-Chorus
  lines:
  - original: Paintings in the gallery of life
    translation: Pinturas na galeria da vida
    notes: ''
  - original: Passing by before my eyes
    translation: Passando diante dos meus olhos
    notes: ''
  - original: Moments we caught in frames
    translation: Momentos que capturamos em molduras
    notes: ''
  - original: Are all that remain
    translation: São tudo o que resta
    notes: ''
- section: Chorus
  lines:
  - original: Dead man on display
    translation: Homem morto em exposição
    notes: ''
- section: Verse 2
  lines:
  - original: In the mirror all that I can see
    translation: No espelho tudo o que posso ver
    notes: ''
  - original: Are the eyes of a stranger
    translation: São os olhos de um estranho
    notes: ''
  - original: Just staring back and assessing me
    translation: Apenas olhando de volta e me avaliando
    notes: ''
  - original: Then I fall to the ground in agony
    translation: Então caio no chão em agonia
    notes: ''
  - original: I surrender
    translation: Eu me rendo
    notes: ''
  - original: They remember a past existence
    translation: Lembram de uma existência passada
    notes: ''
  - original: All was new and the end was distant
    translation: Tudo era novo e o fim era distante
    notes: ''
  - original: Saw me cower with no persistence
    translation: Me viram encolher sem persistência
    notes: ''
  - original: Now I'm only a shell
    translation: Agora sou apenas uma casca
    notes: ''
- section: Pre-Chorus (repeat)
  lines:
  - original: Paintings in the gallery of life
    translation: Pinturas na galeria da vida
    notes: ''
  - original: Passing by before my eyes
    translation: Passando diante dos meus olhos
    notes: ''
  - original: Moments we caught in frames
    translation: Momentos que capturamos em molduras
    notes: ''
  - original: Are all that remain
    translation: São tudo o que resta
    notes: ''
- section: Chorus (repeat)
  lines:
  - original: Dead man on display
    translation: Homem morto em exposição
    notes: ''
- section: Bridge
  lines:
  - original: We are only portraits on a wall
    translation: Somos apenas retratos numa parede
    notes: ''
  - original: Nothing's forever, nothing's forever
    translation: Nada é para sempre, nada é para sempre
    notes: ''
- section: Final
  lines:
  - original: Pictures from the gallery of life
    translation: Imagens da galeria da vida
    notes: ''
  - original: Passing by before my eyes
    translation: Passando diante dos meus olhos
    notes: ''
  - original: Moments we caught in frames
    translation: Momentos que capturamos em molduras
    notes: ''
  - original: And all that remains
    translation: E tudo o que resta
    notes: ''
  - original: Is the memory
    translation: É a memória
    notes: ''
  - original: God have mercy, I have lost my way
    translation: Deus tenha misericórdia, perdi meu caminho
    notes: ''
  - original: Nothing can bring me back
    translation: Nada pode me trazer de volta
    notes: ''
  - original: I must accept my fate
    translation: Devo aceitar meu destino
    notes: ''
