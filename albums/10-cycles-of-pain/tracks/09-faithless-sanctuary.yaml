lyrics:
- section: Verse 1
  lines:
  - original: I remember a simpler time for which I still yearn
    translation: Lembro de um tempo mais simples por que ainda anseio
    notes: ''
  - original: Willow trees sway by the lake, memories like ashes burn
    translation: Salgueiros balançam à beira do lago, memórias queimam como cinzas
    notes: ''
  - original: Seasons passed and the years went by, dreams without an end
    translation: Estações passaram e os anos se foram, sonhos sem fim
    notes: ''
  - original: Every day the sun would shine, bliss running through my hands
    translation: Todo dia o sol brilhava, felicidade correndo entre minhas mãos
    notes: ''
  - original: Somewhere down my beaten path
    translation: Em algum lugar no meu caminho castigado
    notes: ''
  - original: Shadows were freed from my cage
    translation: Sombras foram libertadas da minha gaiola
    notes: ''
  - original: I gave in and then let go
    translation: Cedi e então soltei
    notes: ''
  - original: Surrendered to the unknown
    translation: Rendi-me ao desconhecido
    notes: ''
  - original: This bird has flown
    translation: Este pássaro voou
    notes: ''
- section: Chorus
  lines:
  - original: I can close my eyes, ghosts are always there
    translation: Posso fechar os olhos, fantasmas estão sempre lá
    notes: ''
  - original: I can't hide, shadows are everywhere
    translation: Não posso me esconder, sombras estão em todo lugar
    notes: ''
  - original: We'll get knocked down, put aside our fears
    translation: Seremos derrubados, deixemos de lado nossos medos
    notes: ''
  - original: We don't need no sympathy
    translation: Não precisamos de simpatia
    notes: ''
  - original: The cross we bear
    translation: A cruz que carregamos
    notes: ''
  - original: A faithless sanctuary
    translation: Um santuário sem fé
    notes: ''
  - original: Blind help the blind, lead the way
    translation: Cegos ajudam cegos, mostrem o caminho
    notes: ''
  - original: To the light, so out of sight
    translation: Para a luz, tão fora de vista
    notes: ''
- section: Verse 2
  lines:
  - original: I can close my eyes, ghosts are always there
    translation: Posso fechar os olhos, fantasmas estão sempre lá
    notes: ''
  - original: I can't hide, shadows are everywhere
    translation: Não posso me esconder, sombras estão em todo lugar
    notes: ''
  - original: Live and learn, nothing in return
    translation: Viver e aprender, nada em troca
    notes: ''
  - original: Hope is no concern, I found the truth at last
    translation: A esperança não importa, encontrei a verdade por fim
    notes: ''
- section: Bridge
  lines:
  - original: Please don't listen to a word I said
    translation: Por favor não ouça uma palavra do que disse
    notes: ''
  - original: Listen to the voice inside instead
    translation: Ouça a voz interior em vez disso
    notes: ''
  - original: Take what you have, you've got to live in the moment
    translation: Tome o que tem, você tem que viver o momento
    notes: ''
  - original: Tear off those chains that confine you
    translation: Arranque essas correntes que o confinam
    notes: ''
  - original: Nothing will lead you astray anymore
    translation: Nada o desviará mais
    notes: ''
  - original: Please don't listen to a word I said
    translation: Por favor não ouça uma palavra do que disse
    notes: ''
  - original: Listen to the voice inside instead
    translation: Ouça a voz interior em vez disso
    notes: ''
  - original: '''Cause the truth''s not in the words you''ve read'
    translation: Porque a verdade não está nas palavras que leu
    notes: ''
  - original: Nevermind the past, just look ahead
    translation: Esqueça o passado, apenas olhe adiante
    notes: ''
- section: Chorus (final)
  lines:
