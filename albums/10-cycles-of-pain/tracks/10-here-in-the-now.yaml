  lines:
  - original: Inside your worried mind
    translation: Dentro da sua mente preocupada
    notes: ''
  - original: Counting every beat of your heart
    translation: Contando cada batida do seu coração
    notes: ''
  - original: Trying to fit into this world
    translation: Tentando encaixar-se neste mundo
    notes: ''
  - original: You're still young and life's a journey
    translation: Você ainda é jovem e a vida é uma jornada
    notes: ''
  - original: Nothing really matters 'til you start
    translation: Nada realmente importa até você começar
    notes: ''
  - original: Things you do will define who you are
    translation: As coisas que faz definirão quem você é
    notes: ''
  - original: Wise men try to understand
    translation: Homens sábios tentam entender
    notes: ''
  - original: And not to judge their fellow man at all
    translation: E não julgar seu semelhante de forma alguma
    notes: ''
  - original: Just try
    translation: Apenas tente
    notes: ''
- section: Chorus
