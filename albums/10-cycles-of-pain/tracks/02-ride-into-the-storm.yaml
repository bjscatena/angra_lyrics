    notes: ''
- section: Bridge
  lines:
  - original: This night, so quiet, no haze, calmness all around
    translation: Esta noite, tão quieta, sem neblina, calma por toda parte
    notes: ''
  - original: No fear, hope is near, follow the guiding light
    translation: Sem medo, a esperança está perto, siga a luz guia
    notes: ''
  - original: Onwards, to the eye, straight line, dive into the mayhem
    translation: Em frente, ao olho, linha reta, mergulhe no caos
    notes: ''
  - original: No trial, no deep denial, justice served
    translation: Sem julgamento, sem negação profunda, justiça feita
    notes: ''
