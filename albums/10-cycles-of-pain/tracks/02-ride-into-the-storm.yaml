# Ride into the Storm — Cycles of Pain (2023)
id: 10-cycles-of-pain-02-ride-into-the-storm
album_id: 10-cycles-of-pain
track_number: 2
title: Ride into the Storm
language: en
authors:
- Dennis Ward
- Bruno Valverde
duration: '6:12'
instrumental: false
lyrics:
- section: Intro (Latin)
  lines:
  - original: Divinum Iudicium
    translation: Divinum Iudicium
    notes: ''
  - original: Tempestas vocata est
    translation: Tempestas vocata est
    notes: ''
  - original: Praeparate
    translation: Praeparate
    notes: ''
- section: Verse 1
  lines:
  - original: We are the beasts, we are the saviors too
    translation: Somos as feras, somos os salvadores também
    notes: ''
  - original: Looking out across the land to nowhere
    translation: Olhando a terra até o nada
    notes: ''
  - original: There is a force to reckon with
    translation: Há uma força com quem se defrontar
    notes: ''
  - original: (Divided)
    translation: (Divididos)
    notes: ''
  - original: It's only human nature
    translation: É apenas a natureza humana
    notes: ''
  - original: And what has been shall never be again
    translation: E o que foi jamais será de novo
    notes: ''
  - original: Just dismiss the way we suffer, there is more than life at stake
    translation: Ignore a forma como sofremos, há mais em jogo do que a vida
    notes: ''
- section: Chorus
  lines:
  - original: There is a way, I know
    translation: Há um caminho, eu sei
    notes: ''
  - original: We change our forms and grow
    translation: Mudamos de forma e crescemos
    notes: ''
  - original: The winds prevail, advance and sail into the sun
    translation: Os ventos prevalecem, avançam e velejam em direção ao sol
    notes: ''
  - original: There is no rain or snow
    translation: Não há chuva nem neve
    notes: ''
  - original: To shroud the afterglow
    translation: Para encobrir o brilho residual
    notes: ''
  - original: A new crusade, unrest will fade, we're marching on
    translation: Uma nova cruzada, a inquietação se dissipará, marchamos
    notes: ''
  - original: Ride into the storm
    translation: Cavalgar na tempestade
    notes: ''
- section: Verse 2
  lines:
  - original: The air is static, you can smell the burn
    translation: O ar está estático, você sente o cheiro da queima
    notes: ''
  - original: Of a thousand points of light and thunder
    translation: De mil pontos de luz e trovão
    notes: ''
  - original: The clouds of years of hate will soon dispel
    translation: As nuvens de anos de ódio logo se dissiparão
    notes: ''
  - original: To illuminate our minds and to free the truth again
    translation: Para iluminar nossas mentes e libertar a verdade outra vez
    notes: ''
  - original: We are the soldiers of the blessed
    translation: Somos os soldados dos abençoados
    notes: ''
  - original: (United)
    translation: (Unidos)
    notes: ''
  - original: Controlling circumstances
    translation: Controlando as circunstâncias
    notes: ''
