research:
  summary: Single de abertura com intro latina que contrasta dualidade humana — feras e salvadores — e convoca a enfrentar
    a tempestade como transformação coletiva.
  themes:
  - tempestade
  - dualidade humana
  - transformação
  - latim
  context: Segunda faixa e primeiro single de Cycles of Pain; letra de Dennis Ward, música de Ward e Bruno Valverde. Coro
    extenso com Fernanda Lira, BJ, Angel Sberse e outros.
  references:
  - title: Metal Kingdom — Cycles of Pain (2023)
    url: https://www.metalkingdom.net/band/angra-31
    type: database
    accessed: '2026-06-06'
  interpretation: A metáfora da tempestade representa crise e renascimento; divididos somos feras, unidos soldados da luz.
