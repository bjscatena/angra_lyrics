# Cycles of Pain — Cycles of Pain (2023)
id: 10-cycles-of-pain-08-cycles-of-pain
album_id: 10-cycles-of-pain
track_number: 8
title: Cycles of Pain
language: en
authors:
- Rafael Bittencourt
- Fabio Lione
duration: '5:13'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: You wake up alone again
    translation: Você acorda sozinho de novo
    notes: ''
  - original: It's hard to get out of bed
    translation: É difícil sair da cama
    notes: ''
  - original: Your mind is blank
    translation: Sua mente está em branco
    notes: ''
  - original: Your heart is black
    translation: Seu coração está negro
    notes: ''
  - original: All these fears that you can't explain
    translation: Todos esses medos que você não consegue explicar
    notes: ''
  - original: When nothing seems to make sense
    translation: Quando nada parece fazer sentido
    notes: ''
  - original: A shallow grave you're buried in
    translation: Numa cova rasa em que você está enterrado
    notes: ''
  - original: Everything goes wrong and you're lonely
    translation: Tudo dá errado e você está solitário
    notes: ''
  - original: Try to control
    translation: Tente controlar
    notes: ''
  - original: Put up a fight
    translation: Lute
    notes: ''
  - original: Lying helpless in the dark
    translation: Deitado impotente no escuro
    notes: ''
  - original: Everything goes wrong and you're desperate
    translation: Tudo dá errado e você está desesperado
    notes: ''
  - original: Taking a life
    translation: Tirando uma vida
    notes: ''
  - original: Won't make it right
    translation: Não tornará as coisas certas
    notes: ''
  - original: Hide your tears
    translation: Esconda suas lágrimas
    notes: ''
- section: Pre-Chorus
  lines:
  - original: The battle of everyday
    translation: A batalha do dia a dia
    notes: ''
  - original: Pretend it's all gone away
    translation: Finja que tudo se foi
    notes: ''
  - original: The agony of broken dreams
    translation: A agonia de sonhos quebrados
    notes: ''
  - original: The hours are all the same
    translation: As horas são todas iguais
    notes: ''
  - original: And misery wants to stay
    translation: E a miséria quer ficar
    notes: ''
  - original: Tortures me
    translation: Me tortura
    notes: ''
- section: Chorus
  lines:
  - original: Everything goes wrong and you're lonely
    translation: Tudo dá errado e você está solitário
    notes: ''
  - original: Just try to control
    translation: Apenas tente controlar
    notes: ''
  - original: Put up a fight
    translation: Lute
    notes: ''
  - original: It's so hard for everyone
    translation: É tão difícil para todos
    notes: ''
  - original: Everything goes wrong and you're desperate
    translation: Tudo dá errado e você está desesperado
    notes: ''
  - original: Avoiding yourself
    translation: Evitando a si mesmo
    notes: ''
  - original: Taking the blame
    translation: Assumindo a culpa
    notes: ''
  - original: Here it comes again
    translation: Lá vem de novo
    notes: ''
  - original: Cycles of pain, burning my heart
    translation: Ciclos de dor, queimando meu coração
    notes: ''
  - original: Screaming in rage won't tear it apart
    translation: Gritar de raiva não o despedaçará
    notes: ''
- section: Bridge
  lines:
  - original: Cycles of pain, burning my heart
    translation: Ciclos de dor, queimando meu coração
    notes: ''
  - original: Lost in the dark
    translation: Perdido no escuro
    notes: ''
  - original: When there is no ground, I fall so deep
    translation: Quando não há chão, caio tão fundo
    notes: ''
  - original: All the angels sing a song but I can't hear
    translation: Todos os anjos cantam uma canção mas não consigo ouvir
    notes: ''
  - original: Stand up, be strong now, be brave for me
    translation: Levante-se, seja forte agora, seja corajoso por mim
    notes: ''
- section: Chorus (final)
  lines:
  - original: Cycles of pain, burning my heart
    translation: Ciclos de dor, queimando meu coração
    notes: ''
  - original: Screaming in rage won't tear it apart
    translation: Gritar de raiva não o despedaçará
    notes: ''
  - original: Walking alone, lost in the dark
    translation: Caminhando sozinho, perdido no escuro
    notes: ''
  - original: Cycles of pain, helpless despair
    translation: Ciclos de dor, desespero impotente
    notes: ''
  - original: Try to escape from all that's there
    translation: Tente escapar de tudo o que está ali
    notes: ''
  - original: Cycles of pain, burning my heart
    translation: Ciclos de dor, queimando meu coração
    notes: ''
  - original: But I will survive
    translation: Mas sobreviverei
    notes: ''
  - original: I was lost and lonely, but I know I will survive
    translation: Estava perdido e solitário, mas sei que sobreviverei
    notes: ''
research:
