lyrics:
- section: Verse 1
  lines:
  - original: Here I am, torn down to pieces
    translation: Aqui estou, reduzido a pedaços
    notes: ''
  - original: And from where I stand
    translation: E de onde estou
    notes: ''
  - original: Rock bottom made me stronger
    translation: O fundo do poço me fez mais forte
    notes: ''
  - original: Even when the days seemed longer
    translation: Mesmo quando os dias pareciam mais longos
    notes: ''
  - original: For all kinds of stormy weather
    translation: Para todo tipo de tempo tempestuoso
    notes: ''
  - original: I had enough
    translation: Eu tive o suficiente
    notes: ''
  - original: I had enough to make my fears my strength
    translation: Tive o suficiente para fazer meus medos virarem força
    notes: ''
  - original: And now you're back
    translation: E agora você voltou
    notes: ''
- section: Chorus
  lines:
  - original: To take another piece of me
    translation: Para levar outro pedaço de mim
    notes: ''
  - original: Take another piece and think I'm falling
    translation: Leve outro pedaço e pense que estou caindo
    notes: ''
  - original: Take your chance I've waited for this moment
    translation: Aproveite sua chance, esperei por este momento
    notes: ''
  - original: Take another piece of me
    translation: Leve outro pedaço de mim
    notes: ''
  - original: Take another piece of me, I'm warning
    translation: Leve outro pedaço de mim, estou avisando
    notes: ''
  - original: Take your chance I'm ready for this moment to rise again
    translation: Aproveite sua chance, estou pronto para este momento de renascer
    notes: ''
  - original: I'll rise again
    translation: Renascerei
    notes: ''
- section: Verse 2
  lines:
  - original: There I was
    translation: Lá estava eu
    notes: ''
  - original: An ordinary man struggling to get along
    translation: Um homem comum lutando para seguir em frente
    notes: ''
  - original: I wonder where you were when I was
    translation: Me pergunto onde você estava quando eu estava
    notes: ''
  - original: Breaking all the chains around me
    translation: Quebrando todas as correntes ao meu redor
    notes: ''
  - original: Trying to find a place for myself in this world
    translation: Tentando encontrar um lugar para mim neste mundo
    notes: ''
  - original: And I can't wait to see you come again
    translation: E mal posso esperar para vê-lo voltar
    notes: ''
  - original: To feel my fire
    translation: Para sentir meu fogo
    notes: ''
