- section: Interlude
  lines:
  - original: Calm tide ahead
    translation: Maré calma à frente
    notes: ''
  - original: Strong tide ahead
    translation: Maré forte à frente
    notes: ''
  - original: When you think you know it
    translation: Quando você acha que sabe
    notes: ''
  - original: Life's a tide of changes!
    translation: A vida é uma maré de mudanças!
    notes: ''
- section: Candomblé Chant (Portuguese)
