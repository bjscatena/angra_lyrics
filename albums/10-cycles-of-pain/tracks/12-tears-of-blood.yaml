# Tears of Blood — Cycles of Pain (2023)
id: 10-cycles-of-pain-12-tears-of-blood
album_id: 10-cycles-of-pain
track_number: 12
title: Tears of Blood
language: en
authors:
- Rafael Bittencourt
- Fabio Lione
duration: '5:35'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: Some say I'm just a foolish man
    translation: Alguns dizem que sou apenas um homem tolo
    notes: ''
  - original: With hopes and dreams
    translation: Com esperanças e sonhos
    notes: ''
  - original: I never thought I'd fall in love
    translation: Nunca pensei que me apaixonaria
    notes: ''
  - original: Not the way I did for you
    translation: Do jeito que me apaixonei por você
    notes: ''
  - original: You were the angel in my life
    translation: Você era o anjo na minha vida
    notes: ''
  - original: All I could see
    translation: Tudo o que eu podia ver
    notes: ''
  - original: You were the stars that lit my night
    translation: Você era as estrelas que iluminavam minha noite
    notes: ''
  - original: Still, I can't believe it's true
    translation: Ainda assim, não consigo acreditar que é verdade
    notes: ''
- section: Pre-Chorus
  lines:
  - original: What I did, I did for you
    translation: O que fiz, fiz por você
    notes: ''
  - original: I only pity for your soul here from my grave
    translation: Só compadeço da sua alma aqui da minha cova
    notes: ''
  - original: I hope you crawl your way to hell
    translation: Espero que rasteje até o inferno
    notes: ''
  - original: I hope you rot in a prison cell
    translation: Espero que apodreça numa cela
    notes: ''
  - original: And I don't believe you, uh uh
    translation: E não acredito em você, uh uh
    notes: ''
  - original: You were always such a fool, uh
    translation: Você sempre foi tão tola, uh
    notes: ''
  - original: But I can't believe it's true
    translation: Mas não consigo acreditar que é verdade
    notes: ''
- section: Chorus
  lines:
  - original: Raining down in tears of blood
    translation: Chovendo lágrimas de sangue
    notes: ''
  - original: Haunted by the ghost of my revenge
    translation: Assombrado pelo fantasma da minha vingança
    notes: ''
  - original: Still, I drown in tears of blood
    translation: Ainda me afogo em lágrimas de sangue
    notes: ''
  - original: Nothing but regret flows in my veins
    translation: Nada além de arrependimento flui nas minhas veias
    notes: ''
- section: Bridge
  lines:
  - original: Raining down in tears of blood
    translation: Chovendo lágrimas de sangue
    notes: ''
  - original: Haunted by regret, sorrow and pain
    translation: Assombrado por arrependimento, tristeza e dor
    notes: ''
  - original: Here I drown in tears of blood
    translation: Aqui me afogo em lágrimas de sangue
    notes: ''
  - original: Shadows of regret won't go away
    translation: Sombras de arrependimento não vão embora
    notes: ''
  - original: All my sorrows terrify me and won't go away
    translation: Todas as minhas tristezas me aterrorizam e não vão embora
    notes: ''
  - original: In the dark I drift alone, a soul in pain
    translation: No escuro derivo sozinho, uma alma em dor
    notes: ''
  - original: Please, give freedom to my soul
    translation: Por favor, dê liberdade à minha alma
    notes: ''
  - original: The dreadful pain won't go away
    translation: A dor terrível não vai embora
    notes: ''
research:
  summary: Balada sombria de traição amorosa narrada da cova — vingança, arrependimento e lágrimas de sangue.
  themes:
  - traição
  - vingança
  - amor
  - morte
  context: Faixa de encerramento; feat. Amanda Somerville e piano de Juliana D'Agostini.
  references:
  - title: Metal Kingdom — Cycles of Pain (2023)
