lyrics:
- section: Parte em Português
  lines:
  - original: Aurora fria, a lua devolvia o sol
    translation: Cold dawn, the moon returned the sun
    notes: ''
  - original: Prum mundo tão real
    translation: To such a real world
    notes: ''
  - original: O corpo em pé e a alma embaixo do lençol
    translation: The body standing and the soul under the sheet
    notes: ''
  - original: Procurando forças pra chorar
    translation: Searching for strength to cry
    notes: ''
  - original: Olhe Deus por seu filho pecador
    translation: Look God upon your sinful child
    notes: ''
  - original: A vida seca, não havia espaço para ilusão
    translation: The dry life, there was no room for illusion
    notes: ''
  - original: Brincava de lutar
    translation: Played at fighting
    notes: ''
  - original: E vivendo entre o caos e a confusão
    translation: And living between chaos and confusion
    notes: ''
  - original: Eu nunca achei o meu lugar
    translation: I never found my place
    notes: ''
  - original: O sol nasceu para iluminar a escuridão
    translation: The sun rose to illuminate the darkness
    notes: ''
  - original: Tudo mudou
    translation: Everything changed
    notes: ''
- section: Parte em Inglês
  lines:
  - original: Another word of wisdom to save the day
    translation: Outra palavra de sabedoria para salvar o dia
    notes: ''
  - original: Another life to know
    translation: Outra vida para conhecer
    notes: ''
  - original: There is a universe of endless possibilities
    translation: Há um universo de possibilidades infinitas
    notes: ''
  - original: Another change to grow
    translation: Outra chance de crescer
    notes: ''
  - original: Found my way through the wind and the cold
    translation: Encontrei meu caminho através do vento e do frio
    notes: ''
  - original: I lie awake, as the gods of world take control
    translation: Fico acordado, enquanto os deuses do mundo assumem o controle
    notes: ''
- section: Chorus
  lines:
  - original: Lost in the wide horizon
    translation: Perdido no amplo horizonte
    notes: ''
  - original: Set my gaze to the distant past
    translation: Fixo meu olhar no passado distante
    notes: ''
  - original: And hide from the glistening blinding light
    translation: E me escondo da luz ofuscante e cintilante
    notes: ''
  - original: Have I lost to a higher power?
    translation: Perdi para um poder superior?
    notes: ''
  - original: Try my best just to comprehend
    translation: Faço o meu melhor apenas para compreender
    notes: ''
  - original: And the hope flows like water through my hands
    translation: E a esperança flui como água entre meus dedos
    notes: ''
  - original: Then I wane for a moment and I surrender
    translation: Então definho por um momento e me rendo
    notes: ''
- section: Bridge
  lines:
  - original: Talk to me 'cause my pride is crawling
    translation: Fale comigo porque meu orgulho rasteja
    notes: ''
  - original: Answer me, I am losing all control?
    translation: Responda-me, estou perdendo todo o controle?
    notes: ''
  - original: The angels are falling
    translation: Os anjos estão caindo
    notes: ''
  - original: Comfort me when my faith is dying
    translation: Console-me quando minha fé está morrendo
    notes: ''
  - original: Follow me to the end of time, you know
    translation: Siga-me até o fim dos tempos, você sabe
    notes: ''
  - original: The angels are falling
    translation: Os anjos estão caindo
    notes: ''
  - original: The angels are calling
    translation: Os anjos estão chamando
    notes: ''
- section: Chorus (final)
  lines:
  - original: Lost in the wide horizon
    translation: Perdido no amplo horizonte
    notes: ''
  - original: Set my gaze to the distant past
    translation: Fixo meu olhar no passado distante
    notes: ''
  - original: And hide from the glistening blinding light
    translation: E me escondo da luz ofuscante e cintilante
    notes: ''
  - original: Have I lost to a higher power?
    translation: Perdi para um poder superior?
    notes: ''
  - original: Try my best just to comprehend
    translation: Faço o meu melhor apenas para compreender
    notes: ''
  - original: And the hope flows like water through my hands
    translation: E a esperança flui como água entre meus dedos
    notes: ''
  - original: Like the clouds fading out of my mind
    translation: Como nuvens desvanecendo da minha mente
    notes: ''
  - original: I just cherish the moment and smile
    translation: Apenas valorizo o momento e sorrio
    notes: ''
