instrumental_description: Intro instrumental com coro latino que estabelece o conceito do álbum — cyclus doloris (ciclo da
  dor). Arranjo orquestral breve com voces de Tefo Mion e coro, funcionando como prelúdio dramático antes de "Ride into the
  Storm". Apesar das frases latinas cantadas, a faixa é tratada como instrumental no disco.
