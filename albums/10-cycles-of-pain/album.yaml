history:
  summary: Cycles of Pain é o décimo álbum de estúdio da Angra e o primeiro em cinco anos após ØMNI (2018). Lançado em 3 de
    novembro de 2023 pela Atomic Fire Records, o disco marca o retorno da banda ao power/progressive metal clássico com produção,
    mixagem e masterização de Dennis Ward. O título — latim cyclus doloris — permeia faixas sobre impermanência, dor cotidiana,
    desigualdade social brasileira e resiliência.
  recording: 'Produzido por Dennis Ward (Helloween, Magnum). Participações especiais: Lenine em "Vida Seca"; Vanessa Moreno
    em "Tide of Changes – Part II" e "Here in the Now"; Amanda Somerville e Juliana D''Agostini (piano) em "Tears of Blood".
    Coros extensos em "Ride into the Storm" e "Cyclus Doloris". Arte de Erick Pasqua e Jonathan Canuto.'
  concept: 'O álbum explora ciclos de sofrimento e transformação: intro latina Cyclus Doloris; dualidade humana em Ride into
    the Storm; autoexposição em Dead Man on Display; impermanência na suíte Tide of Changes; crítica à meritocracia em Vida
    Seca (PT/EN); manipulação política em Gods of the World; depressão cotidiana no título Cycles of Pain; crise de fé em
    Faithless Sanctuary; presença e empatia em Here in the Now; resistência apocalíptica em Generation Warriors; traição e
    vingança em Tears of Blood.'
  reception: 'Recepção positiva da crítica especializada; álbum ranqueado entre os melhores de metal de 2023 no Metal Kingdom
    (#46 do ano). Singles com videoclipes: Ride into the Storm, Tide of Changes, Vida Seca, Gods of the World e Here in the
    Now. Consolida a era Fabio Lione/Marcelo Barbosa como sucessora natural de ØMNI.'
