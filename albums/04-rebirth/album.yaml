history:
  summary: |
    Rebirth é o quarto álbum de estúdio da Angra e marca o retorno triunfante da banda após
    a saída de Andre Matos e a reformulação completa da formação em 2000. Com Edu Falaschi nos
    vocais, a banda entregou um disco que equilibra power metal melódico, metal progressivo e
    referências neoclássicas — consolidando a nova era da Angra e sendo frequentemente citado
    como um dos melhores álbuns de power metal dos anos 2000 (Metal Hammer, 15º melhor de todos
    os tempos em 2019).
  recording: |
    Gravado entre junho e agosto de 2001 no House of Audio (Karlsdorf-Neuthard, Alemanha) e no
    Anonimato Studios (Brasil), com produção, engenharia e mixagem de Dennis Ward. Participações
    especiais incluem Gunter Werno (teclados), Roman Mekinulov (violoncelo), Douglas Las Casas
    (percussão) e o Grupo Woyekè (vozes de maracatu em "Unholy Wars"). A faixa "Visions Prelude"
    adapta o Prelúdio Op. 28 n.º 20 em dó menor de Chopin. Masterização por Jürgen Lusky.
  concept: |
    O título e a capa simbolizam renascimento após crise: nova formação, nova identidade vocal e
    renovação artística sem abandonar a virtuosidade e o epicismo da Angra. As letras (majoritariamente
    de Rafael Bittencourt) exploram esperança pós-apocalíptica, conflitos morais, redenção pessoal
    e crítica social — do hino "Nova Era" à epopeia bilingue "Unholy Wars", passando por baladas
    introspectivas como "Rebirth" e "Running Alone".
  reception: |
    Rebirth recebeu críticas muito positivas (Metal Storm 8,6/10; Blabbermouth 8,5/10) e alcançou
    a 18ª posição no Oricon japonês e a 74ª na França. Considerado ponto de virada na carreira
    da banda, o álbum provou que a Angra podia sobreviver e prosperar após a saída de Matos,
    abrindo caminho para Temple of Shadows e a consolidação da formação Falaschi.
