lyrics:
- section: Verse 1
  lines:
  - original: Cooling breeze from a summer day
    translation: Brisa refrescante de um dia de verão
    notes: ''
  - original: Hearing echoes from your heart
    translation: Ouvindo ecos do seu coração
    notes: ''
  - original: Learning how to recompose the words
    translation: Aprendendo a recomposer as palavras
    notes: ''
  - original: Let time just fly
    translation: Deixe o tempo simplesmente voar
    notes: ''
  - original: Joyfull sea-gulls roaming on the shore
    translation: Gaivotas alegres vagando na praia
    notes: ''
  - original: Not a single note would sound
    translation: Nenhuma nota soaria
    notes: ''
  - original: Raise my head after I dry my face
    translation: Ergo a cabeça depois de secar o rosto
    notes: ''
  - original: Let time just fly
    translation: Deixe o tempo simplesmente voar
    notes: ''
- section: Pre-Chorus
  lines:
  - original: Recalling, retreating
    translation: Recordando, recuando
    notes: ''
  - original: Returning, retrieving
    translation: Retornando, recuperando
    notes: ''
  - original: A small talk your missing
    translation: Uma conversa que você sente falta
    notes: ''
  - original: More clever but older now
    translation: Mais esperto, mas mais velho agora
    notes: ''
  - original: A leader, a learner
    translation: Um líder, um aprendiz
    notes: ''
  - original: A lawful beginner
    translation: Um iniciante obediente
    notes: ''
  - original: A lodger of lunacy
    translation: Um hóspede da loucura
    notes: ''
  - original: So lucid in a jungle
    translation: Tão lúcido numa selva
    notes: ''
  - original: A helper, a sinner
    translation: Um auxiliador, um pecador
    notes: ''
  - original: A scarecrow's agonyzing smile
    translation: O sorriso agonizante de um espantalho
    notes: ''
- section: Chorus
  lines:
  - original: Oh! Minutes go round and round
    translation: Oh! Minutos giram e giram
    notes: ''
  - original: Inside my head
    translation: Dentro da minha cabeça
    notes: ''
  - original: Oh! My chest will now explode
    translation: Oh! Meu peito agora vai explodir
    notes: ''
  - original: Falling into pieces
    translation: Despedaçando-se
    notes: ''
  - original: Rain breaks on the ground-blood!
    translation: A chuva quebra no chão — sangue!
    notes: ''
  - original: One minute forever
    translation: Um minuto para sempre
    notes: ''
  - original: A sinner regretting
    translation: Um pecador arrependido
    notes: ''
  - original: My vulgar misery ends
    translation: Minha miséria vulgar termina
    notes: ''
- section: Outro
  lines:
  - original: (And I) ride the winds of a brand new day
    translation: (E eu) cavalgo os ventos de um dia totalmente novo
    notes: ''
  - original: High where mountain's stand
    translation: Alto onde as montanhas se erguem
    notes: ''
  - original: Found my hope and pride again
    translation: Encontrei minha esperança e orgulho outra vez
    notes: ''
  - original: Rebirth of a man
    translation: Renascimento de um homem
    notes: ''
  - original: Time to fly...
    translation: Hora de voar...
    notes: ''
