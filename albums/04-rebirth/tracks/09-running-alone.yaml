# Running Alone — Rebirth (2001)
id: 04-rebirth-09-running-alone
album_id: 04-rebirth
track_number: 9
title: Running Alone
language: en
authors:
- Rafael Bittencourt
duration: '7:14'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: When the brave fought
    translation: Quando os bravos lutaram
    notes: ''
  - original: On the land of freedom for the men
    translation: Na terra da liberdade pelos homens
    notes: ''
  - original: Now the bells of hope are ringing
    translation: Agora os sinos da esperança estão tocando
    notes: ''
  - original: Angels cry again
    translation: Anjos choram outra vez
    notes: ''
  - original: The goddess of wind was mad, oh no!
    translation: A deusa do vento estava furiosa, oh não!
    notes: ''
  - original: Spreading the fire
    translation: Espalhando o fogo
    notes: ''
  - original: Rushing our destiny (and) from now
    translation: Acelerando nosso destino (e) a partir de agora
    notes: ''
  - original: Dividing us all.
    translation: Dividindo a todos nós.
    notes: ''
  - original: Visions of steady land
    translation: Visões de terra firme
    notes: ''
  - original: Cheering the sight
    translation: Celebrando a visão
    notes: ''
  - original: Orders to wait until the night
    translation: Ordens para esperar até a noite
    notes: ''
- section: Chorus 1
  lines:
  - original: Answer me, What happened to your life?
    translation: Responda-me, o que aconteceu com a sua vida?
    notes: ''
  - original: Answer me, what do you hide?
    translation: Responda-me, o que você esconde?
    notes: ''
- section: Verse 2
  lines:
  - original: The storm made us angry, I don't know!
    translation: A tempestade nos deixou furiosos, não sei!
    notes: ''
  - original: Spreading the fear
    translation: Espalhando o medo
    notes: ''
  - original: Old friends like enemies, be strong!
    translation: Velhos amigos como inimigos, seja forte!
    notes: ''
  - original: And hide all your tears
    translation: E esconda todas as suas lágrimas
    notes: ''
  - original: Revolting the high command
    translation: Revolta contra o alto comando
    notes: ''
  - original: Don't let it drown
    translation: Não deixe afogar
    notes: ''
  - original: Captain took off before the dawn.
    translation: O capitão decolou antes do amanhecer.
    notes: ''
- section: Chorus 2
  lines:
  - original: Answer me, What happened to your life?
    translation: Responda-me, o que aconteceu com a sua vida?
    notes: ''
  - original: Answer me, what do you hide?
    translation: Responda-me, o que você esconde?
    notes: ''
  - original: Can't you see Salvation without fight?
    translation: Você não vê salvação sem luta?
    notes: ''
  - original: Can't you see it? That you are blind
    translation: Você não vê? Que você está cego
    notes: ''
- section: Bridge
  lines:
  - original: Under the sun
    translation: Sob o sol
    notes: ''
  - original: In a solitary world
    translation: Num mundo solitário
    notes: ''
  - original: I am running alone
    translation: Estou correndo sozinho
    notes: ''
  - original: Scars on my face
    translation: Cicatrizes no meu rosto
    notes: ''
  - original: Weary hands from digging dirt
    translation: Mãos cansadas de cavar terra
    notes: ''
  - original: I was dying all alone
    translation: Eu estava morrendo completamente sozinho
    notes: ''
  - original: Am running? Where am I?
    translation: Estou correndo? Onde estou?
    notes: ''
  - original: Where has everyone gone this time?
    translation: Para onde todos foram desta vez?
    notes: ''
  - original: Left my future far behind
    translation: Deixei meu futuro muito para trás
    notes: ''
  - original: I am nothing but the sole survivor
    translation: Não sou nada além do único sobrevivente
    notes: ''
- section: Outro
  lines:
  - original: Under the sun
    translation: Sob o sol
    notes: ''
  - original: I still see this world burning
    translation: Ainda vejo este mundo queimando
    notes: ''
  - original: Scars on my face shows the eyes of a man running
    translation: Cicatrizes no meu rosto mostram os olhos de um homem correndo
    notes: ''
research:
  summary: 'Narrativa de guerra e abandono: o protagonista sobrevive enquanto líderes fogem, questionando salvação, lealdade e solidão.'
  themes:
  - guerra
  - abandono
  - sobrevivência
  context: Uma das faixas mais longas e dramáticas do álbum; letra de Bittencourt com crescendo emocional e clímax solitário.
  references:
