research:
  summary: Epopeia em duas partes que une maracatu pernambucano e power metal épico, criticando guerras motivadas por orgulho e ausência de perdão.
  themes:
  - guerra
  - perdão
  - identidade brasileira
  context: Parte I incorpora o Grupo Woyekè e letras de maracatu; Parte II retoma o inglês épico de Bittencourt. Uma das faixas mais ambiciosas e emblemáticas de Rebirth.
  interpretation: O contraste entre tradição afro-brasileira e metáfora bíblica de "guerras santas" questiona ciclos de violência histórica e colonial.
