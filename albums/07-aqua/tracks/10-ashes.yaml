lyrics:
- section: Verse 1
  lines:
  - original: Our revels now are ended
    translation: Nossas festas agora terminaram
    notes: ''
  - original: We were actors? We were spirits?
    translation: Éramos atores? Éramos espíritos?
    notes: ''
  - original: Melted into air
    translation: Derretidos no ar
    notes: ''
  - original: Now I lift my spell
    translation: Agora eu levanto meu feitiço
    notes: ''
  - original: Forgiveness I embrace
    translation: Perdão eu abraço
    notes: ''
  - original: Heaven sent hell away
    translation: O céu afastou o inferno
    notes: ''
  - original: All my life
    translation: Toda a minha vida
    notes: ''
  - original: As a dream
    translation: Como um sonho
    notes: ''
  - original: With open eyes I'll restart
    translation: De olhos abertos recomeçarei
    notes: ''
- section: Verse 2
  lines:
  - original: I was blind and deaf
    translation: Eu era cego e surdo
    notes: ''
  - original: Until the day of wakening came
    translation: Até que veio o dia do despertar
    notes: ''
  - original: I had faith in evil
    translation: Eu tinha fé no mal
    notes: ''
  - original: In his palace of no blame
    translation: No palácio dele sem culpa
    notes: ''
  - original: All this world around me
    translation: Todo este mundo ao meu redor
    notes: ''
  - original: I created on my own
    translation: Eu criei por conta própria
    notes: ''
  - original: And now it's time
    translation: E agora é hora
    notes: ''
  - original: To free this island and be gone
    translation: De libertar esta ilha e partir
    notes: ''
- section: Chorus
  lines:
  - original: All my life like ashes in my hand
    translation: Toda a minha vida como cinzas na minha mão
    notes: ''
  - original: I'll forgive and prosper 'till the end
    translation: Perdoarei e prosperarei até o fim
    notes: ''
  - original: The magic of stars now filling my heart
    translation: A magia das estrelas agora enchendo meu coração
    notes: ''
  - original: Like a blaze
    translation: Como uma chama
    notes: ''
  - original: Time, now it's time!
    translation: Tempo, agora é hora!
    notes: ''
  - original: Feels like ashes all my life!
    translation: Parece cinzas toda a minha vida!
    notes: ''
- section: Verse 3
  lines:
  - original: I'll restart
    translation: Recomeçarei
    notes: ''
  - original: I was blind and deaf
    translation: Eu era cego e surdo
    notes: ''
  - original: Until the day of wakening came
    translation: Até que veio o dia do despertar
    notes: ''
  - original: I had faith in evil
    translation: Eu tinha fé no mal
    notes: ''
  - original: In his palace of no blame
    translation: No palácio dele sem culpa
    notes: ''
  - original: All this world around me
    translation: Todo este mundo ao meu redor
    notes: ''
  - original: I created on my own
    translation: Eu criei por conta própria
    notes: ''
  - original: And now it's time
    translation: E agora é hora
    notes: ''
  - original: To free this island and be gone
    translation: De libertar esta ilha e partir
    notes: ''
- section: Bridge
  lines:
  - original: Lie at mercy all my enemies
    translation: Deitem-se à mercê, todos os meus inimigos
    notes: ''
  - original: I'll forgive and leave across the sea
    translation: Perdoarei e partirei pelo mar
    notes: ''
  - original: We are such a stuff as dreams are made on
    translation: Somos feitos de tal substância como a dos sonhos
    notes: ''
  - original: Set me free
    translation: Liberte-me
    notes: ''
  - original: I'll carry on!
    translation: Seguirei em frente!
    notes: ''
  - original: Carry on!
    translation: Siga em frente!
    notes: ''
  - original: This end is my start
    translation: Este fim é meu começo
    notes: ''
  - original: We are such a stuff as dreams are made on
    translation: Somos feitos de tal substância como a dos sonhos
    notes: ''
  - original: And I'm gone
    translation: E eu parto
    notes: ''
research:
  summary: Encerramento do álbum e da saga shakespeariana — Prospero dissolve o feitiço, perdoa inimigos e parte da ilha, citando Prospero em A Tempestade.
  themes:
  - perdão
  - encerramento
  - sonho
  - liberdade
  context: "Composição de Kiko Loureiro; piano de Maria Ilmoniemi e arranjos de Felipe Grytz. A citação \"We are such a stuff as dreams are made on\" é verbatim de Shakespeare."
  interpretation: "\"Ashes\" metaforiza a vida efêmera e o renúncio ao poder mágico — o epílogo de Prospero como modelo de redenção e reintegração humana."
