# Arising Thunder — Aqua (2010)
id: 07-aqua-02-arising-thunder
album_id: 07-aqua
track_number: 2
title: Arising Thunder
language: en
authors:
- Edu Falaschi
- Kiko Loureiro
duration: '4:52'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: Time for your reflection
    translation: Hora da sua reflexão
    notes: ''
  - original: What's the promise you have made?
    translation: Qual é a promessa que você fez?
    notes: ''
  - original: Destruction of your pride and reconstruction of my name
    translation: Destruição do seu orgulho e reconstrução do meu nome
    notes: ''
  - original: You betrayed me where's your bravery?
    translation: Você me traiu, onde está a sua coragem?
    notes: ''
  - original: Now you face your doom
    translation: Agora você enfrenta a sua ruína
    notes: ''
  - original: Your fate will be traced by the spear that went tearing through
    translation: O seu destino será traçado pela lança que atravessou tudo
    notes: ''
- section: Verse 2
  lines:
  - original: When you hear the winds of revenge
    translation: Quando você ouvir os ventos da vingança
    notes: ''
  - original: All of the distance and the chains
    translation: Toda a distância e as correntes
    notes: ''
  - original: You put around my damned soul
    translation: Que você pôs em volta da minha alma amaldiçoada
    notes: ''
  - original: Right now it's all finished
    translation: Agora está tudo acabado
    notes: ''
  - original: I'm just building your new world
    translation: Estou apenas construindo o seu novo mundo
    notes: ''
  - original: While you navigate in peace
    translation: Enquanto você navega em paz
    notes: ''
  - original: And glance at lands you will control
    translation: E olha para terras que você controlará
    notes: ''
  - original: Bewitched you cannot see the route
    translation: Enfeitiçado, você não consegue ver a rota
    notes: ''
  - original: And hell where you will go
    translation: E o inferno para onde você irá
    notes: ''
- section: Bridge
  lines:
  - original: When you hear the winds of revenge
    translation: Quando você ouvir os ventos da vingança
    notes: ''
  - original: You will see the goddess crying
    translation: Você verá a deusa chorando
    notes: ''
  - original: And the boats will sink and now
    translation: E os barcos afundarão e agora
    notes: ''
  - original: You play my secret game
    translation: Você joga o meu jogo secreto
    notes: ''
- section: Chorus
  lines:
  - original: Arising Thunder!
    translation: Trovão Ascendente!
    notes: ''
  - original: Welcome to me, you fall alone
    translation: Bem-vindo a mim, você cai sozinho
    notes: ''
  - original: Stand up and face me in a fight!
    translation: Levante-se e me enfrente numa luta!
    notes: ''
  - original: Drowning in tears deep in the storm
    translation: Afogando-se em lágrimas no fundo da tempestade
    notes: ''
  - original: Once again, once again!
    translation: Mais uma vez, mais uma vez!
    notes: ''
  - original: Go! Look out!
    translation: Vai! Cuidado!
    notes: ''
