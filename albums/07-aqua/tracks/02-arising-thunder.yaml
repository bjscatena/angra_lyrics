research:
  summary: Faixa de abertura vocal que personifica a vingança de Prospero contra os usurpadores, com refrão explosivo e clima de tempestade marítima.
  themes:
  - vingança
  - traição
  - tempestade
  - A Tempestade
  context: Single do álbum com videoclipe; letra de Edu Falaschi, música de Falaschi e Kiko Loureiro. Estabelece o conflito central do conceito shakespeariano.
  interpretation: Prospero confronta aqueles que o exilaram, usando metáforas de navegação, encantamento e trovão — o "Arising Thunder" como manifestação do poder retornado.
  references:
  - title: DarkLyrics — Aqua (2010)
    url: http://www.darklyrics.com/lyrics/angra/aqua.html
    type: database
    accessed: '2026-06-06'
