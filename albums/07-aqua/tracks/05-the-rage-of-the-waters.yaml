# The Rage of the Waters — Aqua (2010)
id: 07-aqua-05-the-rage-of-the-waters
album_id: 07-aqua
track_number: 5
title: The Rage of the Waters
language: en
authors:
- Rafael Bittencourt
- Ricardo Confessori
- Felipe Andreoli
duration: '5:33'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: Rise of the tides, breaking the hush
    translation: Subida das marés, quebrando o silêncio
    notes: ''
  - original: Far in the distance it's heard
    translation: Longe ao longe se ouve
    notes: ''
  - original: Watery eyes, feelings disturbed
    translation: Olhos lacrimejantes, sentimentos perturbados
    notes: ''
  - original: Face the troubled waters
    translation: Enfrente as águas agitadas
    notes: ''
  - original: Soaking the earth, kissing the sand
    translation: Encharcando a terra, beijando a areia
    notes: ''
  - original: Your feelings seem to overflow
    translation: Seus sentimentos parecem transbordar
    notes: ''
  - original: Running in streams, out of control
    translation: Correndo em riachos, fora de controle
    notes: ''
  - original: A wave is on its way
    translation: Uma onda está a caminho
    notes: ''
  - original: It will collide against your soul
    translation: Colidirá contra a sua alma
    notes: ''
  - original: When your fears are all tumbling in disorder
    translation: Quando seus medos caem todos desordenados
    notes: ''
  - original: In the ocean of new emotions
    translation: No oceano de novas emoções
    notes: ''
- section: Chorus
  lines:
  - original: In the rage of the waters
    translation: Na fúria das águas
    notes: ''
  - original: Wild surging, transformations, molding our lives
    translation: Surto selvagem, transformações, moldando nossas vidas
    notes: ''
  - original: It's the age of the waters
    translation: É a era das águas
    notes: ''
  - original: Stirring up the patterns of our minds
    translation: Agitando os padrões de nossas mentes
    notes: ''
- section: Verse 2
  lines:
  - original: So long, it took me to learn
    translation: Tanto tempo levou para eu aprender
    notes: ''
  - original: Surging waves can take all your hope
    translation: Ondas impetuosas podem levar toda a sua esperança
    notes: ''
  - original: But when the torment ends, comes the calm
    translation: Mas quando o tormento termina, vem a calmaria
    notes: ''
  - original: There's no reason to despair, no!
    translation: Não há razão para desesperar, não!
    notes: ''
- section: Chorus (reprise)
  lines:
  - original: In the rage of the waters
    translation: Na fúria das águas
    notes: ''
  - original: Wild surging, transformations, molding our lives
    translation: Surto selvagem, transformações, moldando nossas vidas
    notes: ''
  - original: It's the age of the waters
    translation: É a era das águas
    notes: ''
  - original: Stirring up the patterns of our minds
    translation: Agitando os padrões de nossas mentes
    notes: ''
- section: Chorus (extended)
  lines:
  - original: In the rage of the waters
    translation: Na fúria das águas
    notes: ''
  - original: Where the tides are turning, feelings are running, molding our lives
    translation: Onde as marés se voltam, sentimentos correm, moldando nossas vidas
    notes: ''
  - original: It's the age of the waters
    translation: É a era das águas
    notes: ''
  - original: Boiling the fears we've kept inside, changing the direction of mankind
    translation: Fervendo os medos que guardamos dentro, mudando a direção da humanidade
    notes: ''
research:
  summary: Hino elementar sobre o poder transformador da água — da tempestade à calmaria — como metáfora central do álbum e do ciclo emocional humano.
  themes:
  - água
  - transformação
  - medo
  - calmaria
  context: Letra de Rafael Bittencourt; música de Bittencourt, Confessori e Andreoli. Orquestração de Fabrizio Di Sarno; uma das faixas mais épicas do disco.
  interpretation: A água como personagem ativo que molda destinos — eco direto da declaração de Bittencourt sobre o elemento central de A Tempestade.
