duration: '5:15'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: I always was a lower being
    translation: Sempre fui um ser inferior
    notes: ''
  - original: Not much, I'm just a beast
    translation: Pouco mais, sou apenas uma fera
    notes: ''
  - original: You might think I'm the lowest of the low
    translation: Você pode pensar que sou o mais baixo dos baixos
    notes: ''
  - original: But there is something you should know.
    translation: Mas há algo que você deveria saber.
    notes: ''
  - original: Long before you came
    translation: Muito antes de você chegar
    notes: ''
  - original: You'd have found me here, and never begged for your help
    translation: Você me teria encontrado aqui, e nunca pediria sua ajuda
    notes: ''
  - original: This old land will be mine once again
    translation: Esta terra antiga será minha outra vez
    notes: ''
  - original: And all my sacrifice will be worth the price and never again
    translation: E todo meu sacrifício valerá o preço e nunca mais
    notes: ''
  - original: I'll be a monster in your eyes
    translation: Serei um monstro aos seus olhos
    notes: ''
- section: Verse 2
  lines:
  - original: You took my freedom
    translation: Você tomou minha liberdade
    notes: ''
  - original: And shaped it into your servant
    translation: E a moldou em seu servo
    notes: ''
  - original: You taught me your tongue
    translation: Você me ensinou sua língua
    notes: ''
  - original: Denying me the word Lord o' mine for so long
    translation: Negando-me a palavra Senhor meu por tanto tempo
    notes: ''
  - original: Now comes the time to regain my land
    translation: Agora chega a hora de reconquistar minha terra
    notes: ''
  - original: And Miranda will see
    translation: E Miranda verá
    notes: ''
  - original: All my sacrifice, will be worth the price
    translation: Todo meu sacrifício valerá o preço
    notes: ''
  - original: And never again I'll be a monster in her eyes
    translation: E nunca mais serei um monstro aos olhos dela
    notes: ''
- section: Bridge
  lines:
  - original: I'll be a monster in your eyes
    translation: Serei um monstro aos seus olhos
    notes: ''
  - original: I'll be a monster in your eyes
    translation: Serei um monstro aos seus olhos
    notes: ''
  - original: Please, be not afraid
    translation: Por favor, não tenha medo
    notes: ''
  - original: By this isle's sounds in your ears
    translation: Pelos sons desta ilha em seus ouvidos
    notes: ''
  - original: When I have waked, after a long sleep
    translation: Quando eu tiver despertado, após um longo sono
    notes: ''
  - original: The clouds I was dreaming I cry to dream of again
    translation: As nuvens que sonhava eu choro por sonhar de novo
    notes: ''
  - original: Lord o' mine for so long
    translation: Senhor meu por tanto tempo
    notes: ''
  - original: Now comes the time to regain my land
    translation: Agora chega a hora de reconquistar minha terra
    notes: ''
  - original: And Miranda will see
    translation: E Miranda verá
    notes: ''
  - original: All my sacrifice, will be worth the price
    translation: Todo meu sacrifício valerá o preço
    notes: ''
  - original: Forever I'll say
    translation: Para sempre direi
    notes: ''
  - original: My stolen paradise
    translation: Meu paraíso roubado
    notes: ''
  - original: Will be worth the price
    translation: Valerá o preço
    notes: ''
  - original: And no longer I'll be a monster in her eyes
    translation: E não serei mais um monstro aos olhos dela
    notes: ''
- section: Outro
  lines:
  - original: I'll be a monster in her eyes
    translation: Serei um monstro aos olhos dela
    notes: ''
  - original: I'm just a monster in her eyes
    translation: Sou apenas um monstro aos olhos dela
    notes: ''
research:
  summary: Monólogo de Caliban que reclama a ilha usurpada por Prospero e anseia ser visto por Miranda não como monstro, mas como legítimo senhor da terra.
  themes:
  - Caliban
  - Miranda
  - colonização
  - identidade
  context: Letra e música de Rafael Bittencourt; referências explícitas a Shakespeare (Caliban, Miranda, Prospero como "Lord o' mine"). Piano e orquestração de Maria Ilmoniemi e Nei Medeiros.
  interpretation: A peça examina o outro marginalizado — Caliban ensinado a linguagem do colonizador mas negado humanidade — e seu desejo de redenção aos olhos de Miranda.
  references:
  - title: DarkLyrics — Aqua (2010)
    url: http://www.darklyrics.com/lyrics/angra/aqua.html
    type: database
    accessed: '2026-06-06'
