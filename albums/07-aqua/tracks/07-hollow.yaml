research:
  summary: Faixa sombria sobre vazio existencial, ilusões e fúria — ecoando a condição de Caliban e personagens aprisionados em mentiras e desejos destrutivos.
  themes:
  - vazio
  - ilusão
  - vingança
  - tempo
  context: Letra de Felipe Andreoli; música de Bittencourt e Andreoli. Cordas de Amon Lima e Yaniel Matos; uma das composições mais pesadas do álbum.
  interpretation: O refrão "Hollow" condensa a sensação de pertencer a um mundo falso — paralelo à existência marginalizada de Caliban na ilha de Prospero.
