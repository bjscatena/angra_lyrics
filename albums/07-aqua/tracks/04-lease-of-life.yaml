lyrics:
- section: Verse 1
  lines:
  - original: Where do you came from?
    translation: De onde você veio?
    notes: ''
  - original: I hear an angel song
    translation: Ouço uma canção de anjo
    notes: ''
  - original: It seems to be a call, Eros's chant of love
    translation: Parece ser um chamado, canto de amor de Eros
    notes: ''
  - original: Take me through the storm
    translation: Leve-me pela tempestade
    notes: ''
  - original: When you came from afar
    translation: Quando você veio de longe
    notes: ''
  - original: It took so long
    translation: Demorou tanto
    notes: ''
  - original: Spirit brought me life, A passion at first sight
    translation: O espírito me trouxe vida, uma paixão à primeira vista
    notes: ''
  - original: Lend thy hand, my heart
    translation: Empreste tua mão, meu coração
    notes: ''
- section: Verse 2
  lines:
  - original: Nymphs dance around the isle
    translation: Ninfas dançam ao redor da ilha
    notes: ''
  - original: A phantom screams and haunt me all the time
    translation: Um fantasma grita e me assombra o tempo todo
    notes: ''
  - original: Then you come
    translation: Então você vem
    notes: ''
  - original: Like an angel from the skies
    translation: Como um anjo dos céus
    notes: ''
  - original: Princess of my dreams
    translation: Princesa dos meus sonhos
    notes: ''
  - original: I wonder why you are gone
    translation: Me pergunto por que você se foi
    notes: ''
  - original: Someday you'll return
    translation: Algum dia você voltará
    notes: ''
- section: Verse 3
  lines:
  - original: Where do you come from?
    translation: De onde você vem?
    notes: ''
  - original: Faraway? Beyond?
    translation: Longe? Além?
    notes: ''
  - original: Virgin as a diamond
    translation: Virgem como um diamante
    notes: ''
  - original: Precious like a child
    translation: Preciosa como uma criança
    notes: ''
  - original: Lend thy hand, my heart
    translation: Empreste tua mão, meu coração
    notes: ''
- section: Chorus
  lines:
  - original: We've got to believe we'll join our lives
    translation: Temos que acreditar que uniremos nossas vidas
    notes: ''
  - original: Over the vengeance, treason and lies
    translation: Acima da vingança, traição e mentiras
    notes: ''
  - original: We can be one, we can restart
    translation: Podemos ser um, podemos recomeçar
    notes: ''
  - original: Forgive my mistakes (time will tell)
    translation: Perdoe meus erros (o tempo dirá)
    notes: ''
  - original: Forgive my mistakes, someday
    translation: Perdoe meus erros, algum dia
    notes: ''
- section: Outro
  lines:
  - original: Since I arrive on this shore
    translation: Desde que cheguei a esta costa
    notes: ''
  - original: I've seen all my past (someday)
    translation: Vi todo o meu passado (algum dia)
    notes: ''
  - original: A new force come from the source
    translation: Uma nova força vem da fonte
    notes: ''
  - original: A new lease of life
    translation: Uma nova concessão de vida
    notes: ''
research:
  summary: Balada romântica que explora o amor entre Ferdinand e Miranda na ilha, pedindo perdão e prometendo recomeço além da vingança.
  themes:
  - amor
  - perdão
  - renascimento
  - Miranda
  context: Single com videoclipe; composição integral de Edu Falaschi. Piano de Maria Ilmoniemi e arranjos de Felipe Grytz reforçam o clima lírico.
  interpretation: O título "Lease of Life" (concessão de vida) sugere uma segunda chance existencial — o amor como força que transcende a trama de vingança de Prospero.
