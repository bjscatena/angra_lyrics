# Awake from Darkness — Aqua (2010)
id: 07-aqua-03-awake-from-darkness
album_id: 07-aqua
track_number: 3
title: Awake from Darkness
language: en
authors:
- Felipe Andreoli
- Edu Falaschi
- Rafael Bittencourt
duration: '5:54'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: Out in the dark I roam onward to meet my fate
    translation: Lá fora no escuro eu vagueio em direção ao meu destino
    notes: ''
  - original: Time's an illusion today
    translation: O tempo é uma ilusão hoje
    notes: ''
  - original: Away from all I know, a trail that is filled with pain
    translation: Longe de tudo que conheço, um caminho cheio de dor
    notes: ''
  - original: Feeling the lifeless taste ahead
    translation: Sentindo o gosto sem vida à frente
    notes: ''
  - original: I wish for no more than air
    translation: Eu não desejo nada além de ar
    notes: ''
- section: Chorus
  lines:
  - original: Flashes of clearness cross my eyes, disclosing power
    translation: Clarões de lucidez cruzam meus olhos, revelando poder
    notes: ''
  - original: The tides will hurry my return
    translation: As marés apressarão o meu retorno
    notes: ''
  - original: Now in the blackness I see light, I will not cower
    translation: Agora na escuridão eu vejo luz, não me encolherei
    notes: ''
  - original: I contemplate life with helpless faith
    translation: Contemplo a vida com fé impotente
    notes: ''
- section: Verse 2
  lines:
  - original: Master of my design I am, awake from darkness
    translation: Mestre do meu desígnio eu sou, desperto da escuridão
    notes: ''
  - original: Pages of wisdom turn, mind over matter reigns
    translation: Páginas de sabedoria se viram, mente sobre matéria reina
    notes: ''
  - original: My fear won't lead me astray
    translation: Meu medo não me desviará
    notes: ''
- section: Chorus (reprise)
  lines:
  - original: Flashes of clearness cross my eyes, disclosing power
    translation: Clarões de lucidez cruzam meus olhos, revelando poder
    notes: ''
  - original: The tides will hurry my return
    translation: As marés apressarão o meu retorno
    notes: ''
  - original: Now in the blackness I see light, I will not cower
    translation: Agora na escuridão eu vejo luz, não me encolherei
    notes: ''
  - original: I contemplate life with helpless faith
    translation: Contemplo a vida com fé impotente
    notes: ''
- section: Verse 3
  lines:
  - original: I seek the quiet night, over the crushing waves
    translation: Busco a noite silenciosa, sobre as ondas esmagadoras
    notes: ''
  - original: I imagine thoughts on golden rays and days when I'll rise again
    translation: Imagino pensamentos em raios dourados e dias em que ressurgirei
    notes: ''
  - original: I am Awake from darkness
    translation: Estou desperto da escuridão
    notes: ''
- section: Chorus (reprise)
  lines:
  - original: Flashes of clearness cross my eyes, disclosing power
    translation: Clarões de lucidez cruzam meus olhos, revelando poder
    notes: ''
  - original: The tides will hurry my return
    translation: As marés apressarão o meu retorno
    notes: ''
  - original: Now in the blackness I see light, I will not cower
    translation: Agora na escuridão eu vejo luz, não me encolherei
    notes: ''
  - original: I contemplate life with helpless faith
    translation: Contemplo a vida com fé impotente
    notes: ''
- section: Bridge
  lines:
  - original: A broken dignity an upsurge soon to be
    translation: Uma dignidade quebrada, uma ascensão em breve
    notes: ''
  - original: Within these books I find my hope and liberty
    translation: Nestes livros encontro minha esperança e liberdade
    notes: ''
- section: Chorus (final)
  lines:
