duration: '0:59'
instrumental: true
instrumental_description: |
  Intro instrumental com coral latino e arranjo orquestral que evoca as águas em movimento.
  O título referencia o antífono "Viderunt te aquæ" (As águas te viram) — texto litúrgico
  associado à criação e ao poder das águas — estabelecendo o elemento central do álbum
  conceitual baseado em A Tempestade antes da primeira faixa vocal "Arising Thunder".
research:
  summary: Prelúdio coral-instrumental que anuncia o tema aquático e shakespeariano de Aqua, unindo tradição sacra latina ao power metal progressivo.
  themes:
  - água
  - prelúdio
  - coral latino
  - A Tempestade
  context: Primeira faixa do álbum; composta por Rafael Bittencourt com participação de cordas (Amon Lima, Yaniel Matos), coros e orquestração de Nei Medeiros. O latim dialoga com o conceito elemental do disco.
