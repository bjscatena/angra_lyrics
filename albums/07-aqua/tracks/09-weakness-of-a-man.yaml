lyrics:
- section: Verse 1
  lines:
  - original: By the shore, on an island
    translation: À beira-mar, numa ilha
    notes: ''
  - original: I can hear, our sea of sorrow
    translation: Posso ouvir, nosso mar de tristeza
    notes: ''
  - original: With no harm with no disgrace
    translation: Sem mal, sem desgraça
    notes: ''
  - original: I am planting the seeds of tomorrow
    translation: Estou plantando as sementes do amanhã
    notes: ''
  - original: In my circle I will reign
    translation: No meu círculo eu reinarei
    notes: ''
  - original: I was left behind betrayed
    translation: Fui deixado para trás, traído
    notes: ''
  - original: Oh yeah!
    translation: Oh yeah!
    notes: ''
- section: Verse 2
  lines:
  - original: Dark backward, abyss of time
    translation: Escuro retroativo, abismo do tempo
    notes: ''
  - original: Right in front of my eyes
    translation: Bem diante dos meus olhos
    notes: ''
  - original: Evil nature destroyed my trust
    translation: Natureza maligna destruiu minha confiança
    notes: ''
  - original: All their scheming will end up as dust
    translation: Todas as suas tramas acabarão em pó
    notes: ''
  - original: In my circle I will reign
    translation: No meu círculo eu reinarei
    notes: ''
  - original: I will rise against my enemies
    translation: Me erguerei contra meus inimigos
    notes: ''
  - original: Now come away to your master
    translation: Agora venha ao seu mestre
    notes: ''
  - original: Bring through the air all your magic
    translation: Traga pelo ar toda a sua magia
    notes: ''
  - original: I'll bless and curse you till the end
    translation: Abençoarei e amaldiçoarei você até o fim
    notes: ''
  - original: Set your whole self aflame
    translation: Incendeie todo o seu ser
    notes: ''
- section: Verse 3
  lines:
  - original: Foolish visions in my angry dreams
    translation: Visões tolas em meus sonhos furiosos
    notes: ''
  - original: Bringing vengeance to my shore
    translation: Trazendo vingança à minha costa
    notes: ''
  - original: Now my wisdom shows a different scene
    translation: Agora minha sabedoria mostra uma cena diferente
    notes: ''
  - original: There is not love for us all
    translation: Não há amor para todos nós
    notes: ''
- section: Chorus
  lines:
  - original: All this time my mind was in the past
    translation: Todo esse tempo minha mente esteve no passado
    notes: ''
  - original: Furious footprints in this sand
    translation: Pegadas furiosas nesta areia
    notes: ''
  - original: Now living has revealed at last
    translation: Agora viver revelou finalmente
    notes: ''
  - original: All the weakness of a man
    translation: Toda a fraqueza de um homem
    notes: ''
- section: Verse 4
  lines:
  - original: Turbulent tides
    translation: Marés turbulentas
    notes: ''
  - original: All the waters seem so rough
    translation: Todas as águas parecem tão agitadas
    notes: ''
  - original: Keep your faith because the calm will return
    translation: Mantenha sua fé porque a calmaria retornará
    notes: ''
  - original: I've been longing for this tide to turn
    translation: Anseio que esta maré se vire
    notes: ''
  - original: Bringing vengeance to my shore
    translation: Trazendo vingança à minha costa
    notes: ''
  - original: Time has passed and this is what I've learned
    translation: O tempo passou e isto é o que aprendi
    notes: ''
  - original: There is not love for us all
    translation: Não há amor para todos nós
    notes: ''
- section: Chorus (reprise)
  lines:
  - original: All this time my mind was in the past
    translation: Todo esse tempo minha mente esteve no passado
    notes: ''
  - original: Angry footprints in this sand
    translation: Pegadas furiosas nesta areia
    notes: ''
  - original: Now living has revealed at last
    translation: Agora viver revelou finalmente
    notes: ''
  - original: All the weakness of a man
    translation: Toda a fraqueza de um homem
    notes: ''
research:
  summary: Epopeia introspectiva em que Prospero reconhece que a vingança consumiu seu passado e que a fraqueza humana — inclusive a sua — impede o amor universal.
  themes:
  - fraqueza
  - vingança
  - sabedoria
  - Prospero
  context: Letra de Bittencourt e Loureiro; uma das faixas mais longas do álbum. Coros extensos e percussão de Guga Machado reforçam o clima épico-marítimo.
  interpretation: "O título resume a epifania de Prospero: dominar a magia não elimina a vulnerabilidade humana — preparando o terreno para o perdão final de \"Ashes\"."
