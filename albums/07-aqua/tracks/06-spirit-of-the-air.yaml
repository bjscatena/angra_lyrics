# Spirit of the Air — Aqua (2010)
id: 07-aqua-06-spirit-of-the-air
album_id: 07-aqua
track_number: 6
title: Spirit of the Air
language: en
authors:
- Edu Falaschi
- Kiko Loureiro
duration: '5:22'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: Deep in the ocean, mermaids are crying
    translation: No fundo do oceano, sereias estão chorando
    notes: ''
  - original: Oh, Lord King of thunder, magic surrounds You
    translation: Oh, Senhor Rei do trovão, magia Te cerca
    notes: ''
  - original: Oh, Lord
    translation: Oh, Senhor
    notes: ''
  - original: On the island, land of the elves of the hills
    translation: Na ilha, terra dos elfos das colinas
    notes: ''
  - original: Ariel's wind, blow the sails into a war
    translation: Vento de Ariel, sopre as velas para a guerra
    notes: ''
  - original: Before You can say, "Spirit! Come and go!"
    translation: Antes que possas dizer, "Espírito! Vai e vem!"
    notes: ''
  - original: My Lord
    translation: Meu Senhor
    notes: ''
  - original: I'll bring the tempest, I won't even question
    translation: Trazerei a tempestade, nem sequer questionarei
    notes: ''
  - original: I'll be gone in a trip of a toe
    translation: Estarei longe num piscar de olhos
    notes: ''
  - original: Inside of your rage, now I'm trapped again
    translation: Dentro da Tua fúria, agora estou preso de novo
    notes: ''
  - original: Cloven pine was my prison for a decade
    translation: Pinheiro rachado foi minha prisão por uma década
    notes: ''
- section: Chorus
  lines:
  - original: Groves and standing lakes
    translation: Bosques e lagos parados
    notes: ''
  - original: Island of dreams where You reside
    translation: Ilha dos sonhos onde Tu resides
    notes: ''
  - original: Spirit of the air
    translation: Espírito do ar
    notes: ''
  - original: You throw your tricks and spells
    translation: Lanças tuas artimanhas e feitiços
    notes: ''
  - original: And claim for your freedom once denied
    translation: E reclamas tua liberdade outrora negada
    notes: ''
  - original: It's no good watch the skies through someone else's eyes
    translation: Não adianta ver os céus pelos olhos de outra pessoa
    notes: ''
  - original: I'm a soul of freedom, Lord of the wisdom
    translation: Sou uma alma de liberdade, Senhor da sabedoria
    notes: ''
  - original: A creature of nature, I drag 'em to the ocean
    translation: Uma criatura da natureza, arrasto-os para o oceano
    notes: ''
- section: Chorus (reprise)
  lines:
  - original: Groves and standing lakes
    translation: Bosques e lagos parados
    notes: ''
  - original: Island of dreams where You reside
    translation: Ilha dos sonhos onde Tu resides
    notes: ''
  - original: Spirit of the air
    translation: Espírito do ar
    notes: ''
  - original: You throw your tricks and spells
    translation: Lanças tuas artimanhas e feitiços
    notes: ''
  - original: And claim for your freedom once denied
    translation: E reclamas tua liberdade outrora negada
    notes: ''
  - original: It's no good watch the skies through someone else's eyes
    translation: Não adianta ver os céus pelos olhos de outra pessoa
    notes: ''
- section: Outro
  lines:
  - original: Through someone else's eyes...
    translation: Pelos olhos de outra pessoa...
    notes: ''
research:
  summary: Faixa que personifica Ariel, o espírito do ar aprisionado no pinheiro rachado, servindo Prospero enquanto anseia por liberdade.
  themes:
  - Ariel
  - liberdade
  - magia
  - servidão
  context: Letra de Edu Falaschi, música de Falaschi e Loureiro. Referências diretas a Shakespeare ("Cloven pine", "Spirit of the air") ancoram o conceito do álbum.
  interpretation: Ariel como voz ambivalente — obediente ao "Lord King of thunder" (Prospero) mas consciente de que observa o mundo "through someone else's eyes".
  references:
