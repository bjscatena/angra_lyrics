research:
  summary: Canção de ninar sombria que contrasta inocência infantil (crianças, maçãs, jardim)
    com imagens de abutre, carne e Lúcifer — encerrando o álbum com melancolia e perda de pureza.
  themes:
  - inocência
  - perda
  - Lúcifer
  - melancolia
  context: Composta por Kiko Loureiro e Rafael Bittencourt; faixa de encerramento mais curta e
    intimista de Holy Land. O título provocativo ("Lullaby for Lucifer") sugere embalar o mal
    ou a queda, ecoando simbolicamente a destruição do paraíso americano narrada ao longo do disco.
  interpretation: |
    A recusa em alimentar o abutre com "algo de que preciso" preserva o último
    resquício de humanidade; as lágrimas escondidas no final sugerem luto pela inocência perdida
    — do Éden ao Brasil colonizado.
