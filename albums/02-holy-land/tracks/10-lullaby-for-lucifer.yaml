lyrics:
- section: Verse 1
  lines:
  - original: On the sand, by the sea
    translation: Na areia, à beira-mar
    notes: ''
  - original: I left my heart to shed my grief
    translation: Deixei meu coração para derramar minha dor
    notes: ''
  - original: 'A vulture came begging me:'
    translation: 'Um abutre veio me implorar:'
