research:
  summary: Ritual xamânico indígena narrado em primeira pessoa, com máscaras, fogueiras, folhas
    curativas e cantos coletivos — evocando a espiritualidade nativa da Amazônia antes da colonização.
  themes:
  - xamanismo
  - ritual
  - espiritualidade indígena
  - tradição oral
  context: Composta por Andre Matos; incorpora samples de fala e sons do álbum "Música Popular do
    Norte n°4". A faixa complementa "Holy Land" ao mostrar a cosmovisão indígena que o colonizador
    encontraria — e destruiria.
  interpretation: O contraste entre corpo congelando e alma aquecida reflete o transe xamânico;
    as vozes em coro representam a comunidade unida contra demônios, feras e invasores.
