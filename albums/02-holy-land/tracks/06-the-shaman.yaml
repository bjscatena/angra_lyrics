lyrics:
- section: Verse 1
  lines:
  - original: Oh boys, I've seen the old man;
    translation: Oh rapazes, vi o velho;
    notes: ''
  - original: Straw mask around the forehead
    translation: Máscara de palha na testa
    notes: ''
  - original: The blaze, a blast and the awakening dead
    translation: A chama, uma explosão e os mortos despertando
    notes: ''
  - original: (The magic seeds will spread...)
    translation: (As sementes mágicas se espalharão...)
    notes: ''
  - original: The bleeding warrior, he has fought
    translation: O guerreiro sangrento, ele lutou
    notes: ''
  - original: (Healing leaves, piranha teeth, nobody leaves this place 'till the dawn!)
    translation: (Folhas curativas, dentes de piranha, ninguém deixa este lugar até o amanhecer!)
    notes: ''
  - original: Against the passion, for the love
    translation: Contra a paixão, pelo amor
    notes: ''
  - original: (Serpent skin, a savage scream, don't you believe, it grows and grows...)
    translation: (Pele de serpente, um grito selvagem, não acredite, cresce e cresce...)
    notes: ''
- section: Pre-Chorus
  lines:
  - original: "Oh boys, it's all so easy:"
    translation: "Oh rapazes, é tudo tão fácil:"
    notes: ''
  - original: Warm up the soul
    translation: Aqueça a alma
    notes: ''
  - original: While the body is freezin'!
    translation: Enquanto o corpo congela!
    notes: ''
  - original: ... - I swear it!
    translation: ... — Eu juro!
    notes: ''
- section: Verse 2
  lines:
  - original: Against the men for the land,
    translation: Contra os homens pela terra,
    notes: ''
  - original: Against the beast to survive
    translation: Contra a fera para sobreviver
    notes: ''
  - original: Against the demons to keep the faith
    translation: Contra os demônios para manter a fé
    notes: ''
  - original: (The spirits and the fate...)
    translation: (Os espíritos e o destino...)
    notes: ''
  - original: A word - together they will shout!
    translation: Uma palavra — juntos gritarão!
    notes: ''
  - original: (Run and pray if you're afraid you better stay away from it all!)
    translation: (Corra e reze se tiver medo, é melhor ficar longe de tudo!)
    notes: ''
  - original: A rumble shakes up all the ground
    translation: Um estrondo sacode toda a terra
    notes: ''
  - original: (Start to sing, to turn and spin, get rid of all your sins right now!...)
    translation: (Comece a cantar, a girar e rodar, livre-se de todos os seus pecados agora!...)
    notes: ''
- section: Pre-Chorus (repeat)
  lines:
  - original: "Oh boys, it's all so easy:"
    translation: "Oh rapazes, é tudo tão fácil:"
    notes: ''
  - original: Warm up the soul
    translation: Aqueça a alma
    notes: ''
  - original: While the body is freezin'!
    translation: Enquanto o corpo congela!
    notes: ''
- section: Bridge
  lines:
  - original: A word - together they will shout!
    translation: Uma palavra — juntos gritarão!
    notes: ''
  - original: (Healing leaves, piranha teeth, nobody leaves this place 'till the dawn!)
    translation: (Folhas curativas, dentes de piranha, ninguém deixa este lugar até o amanhecer!)
    notes: ''
  - original: Against the passion, for the love
    translation: Contra a paixão, pelo amor
    notes: ''
  - original: (Start to sing, to turn and spin, get rid of all your sins right now!...)
    translation: (Comece a cantar, a girar e rodar, livre-se de todos os seus pecados agora!...)
    notes: ''
- section: Outro
  lines:
  - original: "Oh boys, it's all so easy:"
    translation: "Oh rapazes, é tudo tão fácil:"
    notes: ''
  - original: Warm up the soul...
    translation: Aqueça a alma...
    notes: ''
  - original: Still we can hope a single word together;
    translation: Ainda podemos esperar uma única palavra juntos;
    notes: ''
  - original: Warm up the soul...
    translation: Aqueça a alma...
    notes: ''
  - original: '- Boys, I swear I''ve been there!'
