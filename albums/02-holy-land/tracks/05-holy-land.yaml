research:
  summary: Title track que celebra o Brasil pré-colonial como "terra santa", fundindo influências
    indígenas, folclóricas e eruditas — com taiko, percussão brasileira e arranjos clássicos
    simbolizando a Europa e as Américas em diálogo.
  themes:
  - Brasil
  - espiritualidade indígena
  - colonização
  - identidade
  context: Composta por Andre Matos; incorpora trechos de taiko do álbum "Ondekoza New" e percussão
    gravada no Djembe Studio. Rafael Bittencourt descreveu a faixa como síntese das influências
    brasileiras e clássicas do disco. É o coração conceitual do álbum.
  interpretation: |
    "Deuses de madeira" e "sangue sagrado" evocam navios europeus e sacrifício
    indígena; o eu lírico pede para receber as cicatrizes da terra, assumindo empatia com o
    território colonizado.
