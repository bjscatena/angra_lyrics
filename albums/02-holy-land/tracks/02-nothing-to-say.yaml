research:
  summary: Epopeia sobre a conquista europeia de terras "virgens", a destruição de culturas pagãs
    e a culpa do colonizador que, ao retornar, não encontra palavras para justificar o horror vivido.
  themes:
  - colonização
  - culpa
  - conquista
  - silêncio
  context: Desenvolvida a partir de um riff de bateria criado por Ricardo Confessori por volta de 1994
    numa propriedade rural de Rafael Bittencourt. A faixa ditaria o som do álbum inteiro e tornou-se
    uma das mais aclamadas da banda. O riff de uma nota na abertura é icônico.
  interpretation: |
    O refrão "Nothing to say!" encapsula o mutismo moral do conquistador diante das
    consequências — mares de sangue, deuses pagãos mortos e consciência enterrada.
