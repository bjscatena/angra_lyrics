research:
  summary: Balada melancólica sobre o fim de um relacionamento, onde o eu lírico pede que a
    ex-amante finja não sentir tristeza, reconhecendo que não há retorno ao início e que a vida
    foi desperdiçada em espera.
  themes:
  - término
  - solidão
  - fingimento
  - arrependimento
  context: Escrita por Rafael Bittencourt com letra de Andre Matos; lançada como single do álbum.
    Uma das faixas mais acessíveis e melódicas de Holy Land, contrastando com a densidade épica
    das composições anteriores.
  interpretation: |
    "Make believe" funciona como imperativo irônico — pedir que a outra pessoa
    finja indiferença quando ambos sabem que a dor é real e irreversível.
