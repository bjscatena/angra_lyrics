lyrics:
- section: Verse 1
  lines:
  - original: Somehow I turn around and see
    translation: De algum modo me viro e vejo
    notes: ''
  - original: My nerves break down inside
    translation: Meus nervos desmoronam por dentro
    notes: ''
  - original: Maybe you might know much more than me
    translation: Talvez você saiba muito mais do que eu
    notes: ''
  - original: So tell me what is right to say
    translation: Então diga-me o que é certo dizer
    notes: ''
  - original: Down the weakness of my soul
