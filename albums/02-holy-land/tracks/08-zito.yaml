    notes: ''
  - original: Now you've got your voice, Your own speech
    translation: Agora você tem sua voz, seu próprio discurso
    notes: ''
  - original: Don't wait 'till someone else agress
    translation: Não espere até que alguém mais agreda
    notes: ''
- section: Chorus
