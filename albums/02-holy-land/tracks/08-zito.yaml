research:
  summary: Crítica à modernidade e à Zona de Interesse Turístico e Outros (Z.I.T.O.) — convite a
    abandonar crenças e responsabilidades artificiais para reconectar-se com a natureza e a
    pureza adolescente de sentir a vida como ela é.
  themes:
  - natureza
  - modernidade
  - liberdade
  - espiritualidade
  context: Z.I.T.O. é sigla criada por Rafael Bittencourt para "Zona de Interesse Turístico e Outros",
    satirizando a mercantilização do Brasil. A faixa marca a transição do álbum-conceito histórico
    para uma reflexão sobre o presente (fim do século XX).
  interpretation: |
    "Nadar nu de crenças" propõe despir-se das estruturas sociais impostas; os
    anjos que choraram referem-se à perda espiritual, mas o refrão exorta a fazê-los cantar de novo.
  references:
