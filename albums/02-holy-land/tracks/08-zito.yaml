    translation: Nadando nu de crenças
    notes: ''
  - original: And responsibilities
    translation: E responsabilidades
    notes: ''
  - original: Just feel the sea of bliss
    translation: Apenas sinta o mar de beatitude
    notes: ''
  - original: Mother nature brings to me
    translation: A mãe natureza traz a mim
    notes: ''
  - original: In fantastic purity
    translation: Em fantástica pureza
    notes: ''
  - original: Everything I need
    translation: Tudo o que preciso
    notes: ''
  - original: Like a teenager discovery
    translation: Como a descoberta de um adolescente
    notes: ''
  - original: What's more delightful than this?
    translation: O que há de mais delicioso do que isto?
    notes: ''
  - original: Try to remember how good it was
    translation: Tente lembrar como era bom
    notes: ''
  - original: Feeling the life as it is
    translation: Sentindo a vida como ela é
    notes: ''
  - original: To believe!
    translation: Acreditar!
    notes: ''
- section: Verse 2
  lines:
  - original: New world was born out of man's dreams
    translation: Novo mundo nasceu dos sonhos do homem
    notes: ''
  - original: Now we walk on our own
