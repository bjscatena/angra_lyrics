research:
  summary: Epopeia de dez minutos sobre a expedição da caravela Carolina IV, fundindo navegação
    colonial, candomblé (Iemanjá, Janaína), lamento pelo marinheiro perdido e retorno espiritual
    ao mar — uma das composições mais ambiciosas da Angra.
  themes:
  - navegação
  - colonização
  - candomblé
  - mar
  - morte
  context: Escrita por toda a formação; inclui solo de flauta citando/variação de "Bebê" de
    Hermeto Pascoal (Paulo Bento). O refrão "Carolina IV took a river to the sky" referencia
    a expedição portuguesa e a tragédia a bordo. Lançada como single e frequentemente encerrava
    shows da era Matos.
  interpretation: |
    O contraste entre "Deus salve a Rainha" e Iemanjá sintetiza o choque cultural
    da colonização; o marinheiro que não retorna representa o custo humano dos sonhos de descoberta.
