research:
  summary: Balada melancólica sobre distância emocional num relacionamento à beira-mar, onde o eu
    lírico busca liberdade nas ondas enquanto reconhece a solidão compartilhada e a impossibilidade
    de reparar falhas imediatas.
  themes:
  - solidão
  - distância
  - mar
  - relacionamento
  context: Composta por Matos, Loureiro e Confessori; uma das faixas mais introspectivas do álbum,
    contrastando com a grandiosidade épica de "Nothing to Say" e "Carolina IV". Lançada também
    como single promocional.
  interpretation: As velas contra o céu azul funcionam como metáfora de navegação emocional — o
    mar promete liberdade, mas a distância entre os amantes pode ser maior do que aparenta.
