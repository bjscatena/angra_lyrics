    translation: Agora deixe-me ir
    notes: ''
  - original: Away across the sea,
    translation: Para longe, além do mar,
    notes: ''
  - original: The waves can't be as high
    translation: As ondas não podem ser tão altas
    notes: ''
  - original: As they pretend to be
    translation: Quanto fingem ser
    notes: ''
  - original: And now I know
    translation: E agora sei
    notes: ''
  - original: In my heart, I won't forget
