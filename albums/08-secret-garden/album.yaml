history:
  summary: |
    Secret Garden é o oitavo álbum de estúdio da Angra e marca a estreia de Fabio Lione nos
    vocais principais após a saída de Edu Falaschi, além do retorno de Ricardo Confessori na
    bateria. Lançado em dezembro de 2014 no Japão e em janeiro de 2015 no Brasil e na Europa,
    o disco foi gravado em agosto de 2014 na Fascination Street Studios (Örebro, Suécia) com
    produção de Jens Bogren e pré-produção de Roy Z. É também o último álbum de estúdio com
    Kiko Loureiro antes de sua saída para o Megadeth.
  recording: |
    Gravado em agosto de 2014 na Fascination Street Studios, Örebro, Suécia. Produção e
    gravação por Jens Bogren; pré-produção por Roy Z. Arte de capa concebida e criada por
    Rodrigo Bastos Didier, com co-concepção de Rafael Bittencourt. Participações especiais:
    Simone Simons (Epica) em "Secret Garden" e Doro Pesch em "Crushing Room". A edição
    japonesa padrão (VICP-65276) contém 10 faixas; edições europeias e digitais incluem
    "Synchronicity II" (cover de The Police) como faixa bônus.
  concept: |
    O álbum explora temas de renascimento interior, dualidade da mente, superação emocional
    e busca espiritual — o "jardim secreto" como refúgio simbólico. "Newborn Me" abre com
    conflito entre os hemisférios cerebrais e renascimento pessoal; "Black Hearted Soul" une
    coral latino a power metal sobre proteção emocional; "Final Light" e "Storm of Emotions"
    tratam de autoconhecimento e coragem diante das emoções; "Violet Sky" examina o passado
    irremediável; o título "Secret Garden" (balada com Simone Simons) personifica o paraíso
    íntimo; "Upper Levels" e "Crushing Room" ampliam a reflexão existencial; "Perfect Symmetry"
    e "Silent Call" fecham com mensagem universal e epifania sob o sol da meia-noite sueca.
  reception: |
    Secret Garden alcançou a 20ª posição no Oricon japonês, 174ª na França (SNEP) e 195ª
    na Bélgica (Ultratop Wallonia). Críticas destacaram a integração de Fabio Lione e a
    diversidade entre faixas progressivas e power metal clássico, embora alguns críticos
    considerassem a segunda metade menos consistente. Singles "Black Hearted Soul" e
    "Secret Garden" tiveram videoclipes; o disco preparou o terreno para ØMNI (2018).
