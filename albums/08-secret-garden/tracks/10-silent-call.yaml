lyrics:
- section: Verse 1
  lines:
  - original: I find myself lost in the Swedish night
    translation: Encontro-me perdido na noite sueca
    notes: ''
  - original: Sunset it's crying in the sky
    translation: O pôr do sol está chorando no céu
    notes: ''
  - original: Suddenly I see a new horizon
    translation: De repente vejo um novo horizonte
    notes: ''
  - original: And I began to wonder why?
    translation: E começo a me perguntar por quê?
    notes: ''
- section: Pre-Chorus
  lines:
  - original: New day, sunrise
    translation: Novo dia, nascer do sol
    notes: ''
  - original: Sound the trumpets of the dawn
    translation: Soem as trombetas da aurora
    notes: ''
  - original: Far away, for a while I hear the angels
    translation: Ao longe, por um instante ouço os anjos
    notes: ''
  - original: Silent Call
    translation: Chamado Silencioso
    notes: ''
  - original: Oooh, the Silent Call
    translation: Oooh, o Chamado Silencioso
    notes: ''
- section: Verse 2
  lines:
  - original: All the answers to this dubious mysteries
    translation: Todas as respostas a estes mistérios duvidosos
    notes: ''
  - original: In the magic midnight sun
    translation: No sol mágico da meia-noite
    notes: ''
  - original: I got an old bag full of recent memories
    translation: Tenho uma velha bolsa cheia de memórias recentes
    notes: ''
  - original: Many laughs and many cries
    translation: Muitas risadas e muitos prantos
    notes: ''
- section: Pre-Chorus 2
  lines:
  - original: New day, sunrise
    translation: Novo dia, nascer do sol
    notes: ''
  - original: Sound the trumpets of the dawn
    translation: Soem as trompetas da aurora
    notes: ''
  - original: Far away, for a while I hear the angels
    translation: Ao longe, por um instante ouço os anjos
    notes: ''
  - original: Silent Call
    translation: Chamado Silencioso
    notes: ''
  - original: Oooh, the Silent Call
    translation: Oooh, o Chamado Silencioso
    notes: ''
- section: Bridge
  lines:
  - original: Oooh, Spread my wings and fly
    translation: Oooh, abro minhas asas e voo
    notes: ''
  - original: Only guided by faith
    translation: Apenas guiado pela fé
    notes: ''
  - original: Through the darkness or light
    translation: Através da escuridão ou da luz
    notes: ''
  - original: May have the "whys?"
    translation: Podem existir os "porquês?"
    notes: ''
  - original: It's always the same
    translation: É sempre o mesmo
    notes: ''
  - original: It's always there
    translation: Está sempre lá
    notes: ''
  - original: Night and Day
    translation: Noite e Dia
    notes: ''
  - original: The Silent Call
    translation: O Chamado Silencioso
    notes: ''
research:
  summary: Encerramento introspectivo com vocais de Bittencourt sobre o sol da meia-noite sueca e o chamado silencioso dos
    anjos.
  themes:
  - Suécia
  - epifania
  - fé
  - misticismo
  context: Composição e vocais principais de Rafael Bittencourt. Faixa de encerramento gravada durante as sessões em Örebro;
    homenagem à paisagem nórdica.
  interpretation: O 'Silent Call' representa respostas intuitivas que chegam na quietude — guiado pela fé através da escuridão
    ou da luz.
