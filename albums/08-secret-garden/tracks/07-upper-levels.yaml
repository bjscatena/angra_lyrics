title: Upper Levels
language: en
authors:
- Rafael Bittencourt
- Kiko Loureiro
- Felipe Andreoli
- Fabio Lione
duration: '6:28'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: You've been there for so long.
    translation: Você esteve lá por tanto tempo.
    notes: ''
  - original: Have you found all the choices you have?
    translation: Você encontrou todas as escolhas que tem?
    notes: ''
  - original: Once you know what to do,
    translation: Uma vez que você sabe o que fazer,
    notes: ''
  - original: Have your thoughts on the way you behave
    translation: Teve seus pensamentos sobre a forma como se comporta
    notes: ''
- section: Pre-Chorus
  lines:
  - original: Open your eyes now.
    translation: Abra seus olhos agora.
    notes: ''
  - original: Don't be afraid
    translation: Não tenha medo
    notes: ''
  - original: Find the connection knowing yours and others' fate
    translation: Encontre a conexão conhecendo o seu destino e o dos outros
    notes: ''
  - original: Call it divine or call it insane
    translation: Chame de divino ou chame de insano
    notes: ''
  - original: I say life is flowing much beyond your veins
    translation: Digo que a vida flui muito além das suas veias
    notes: ''
- section: Verse 2
  lines:
  - original: Take the best that you have
    translation: Aproveite o melhor que você tem
    notes: ''
  - original: Realize that your talents are there
    translation: Perceba que seus talentos estão lá
    notes: ''
  - original: What you aim for so much
    translation: Aquilo que você almeja tanto
    notes: ''
  - original: Tell me, why do you want it so bad?
    translation: Diga-me, por que você o deseja tanto?
    notes: ''
- section: Bridge
  lines:
  - original: The father the star
    translation: O pai a estrela
    notes: ''
  - original: The tinier the grain of sand
    translation: Quanto menor o grão de areia
    notes: ''
  - original: They came from the same start
    translation: Eles vieram do mesmo começo
    notes: ''
  - original: And will be led towards the same end
    translation: E serão conduzidos ao mesmo fim
    notes: ''
  - original: What's the image of you?
    translation: Qual é a imagem de você?
    notes: ''
  - original: Exactly how do you picture yourself?
    translation: Exatamente como você se imagina?
    notes: ''
- section: Pre-Chorus 2
  lines:
  - original: Open your eyes now.
    translation: Abra seus olhos agora.
    notes: ''
  - original: Don't be afraid
    translation: Não tenha medo
    notes: ''
  - original: Find the connection knowing yours and others' fate
    translation: Encontre a conexão conhecendo o seu destino e o dos outros
    notes: ''
  - original: Call it divine or call it insane
    translation: Chame de divino ou chame de insano
    notes: ''
  - original: I say life is flowing much beyond your veins
    translation: Digo que a vida flui muito além das suas veias
    notes: ''
- section: Outro
  lines:
  - original: Much beyond the time, far beyond the space
    translation: Muito além do tempo, longe além do espaço
    notes: ''
  - original: Something you can feel within but never understand
    translation: Algo que você pode sentir por dentro, mas nunca compreender
    notes: ''
