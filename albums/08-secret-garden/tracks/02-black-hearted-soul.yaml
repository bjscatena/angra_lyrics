  lines:
  - original: Christus rectus
    translation: Cristo reto
    notes: ''
  - original: Anima nostro semen
    translation: Semente da nossa alma
    notes: ''
  - original: Oh, miserere nobis
    translation: Oh, tende misericórdia de nós
    notes: ''
  - original: Gloria in excelsis
    translation: Glória nas alturas
    notes: ''
  - original: Omnipotens dominus
    translation: Senhor onipotente
    notes: ''
  - original: Primoris Agnus Dei
    translation: Primogênito, Cordeiro de Deus
    notes: ''
  - original: Christus rectus
    translation: Cristo reto
    notes: ''
  - original: Dona nobis pacem
    translation: Dá-nos a paz
    notes: ''
- section: Verse 1
  lines:
  - original: Now my monster is awake
    translation: Agora meu monstro está despertado
    notes: ''
  - original: Had no tears for my mistakes
    translation: Não tive lágrimas pelos meus erros
    notes: ''
  - original: Still I know I have a lot to learn
    translation: Ainda assim sei que tenho muito a aprender
    notes: ''
  - original: I can see it through your eyes
    translation: Posso ver isso através dos seus olhos
    notes: ''
  - original: All your demons in disguise
    translation: Todos os seus demônios disfarçados
    notes: ''
  - original: I'll protect myself on garden heart
    translation: Protegerei a mim mesmo no coração-jardim
    notes: ''
- section: Pre-Chorus
  lines:
  - original: Won't be a fool no more
    translation: Não serei mais um tolo
    notes: ''
  - original: Won't fall into your trap
    translation: Não cairei na sua armadilha
    notes: ''
  - original: You control your evil side
    translation: Você controla o seu lado maligno
    notes: ''
  - original: And I do the same with mine
    translation: E eu faço o mesmo com o meu
    notes: ''
  - original: Just a one to lead control of me
    translation: Apenas um para liderar o controle de mim
    notes: ''
  - original: Won't fall into your curse
    translation: Não cairei na sua maldição
    notes: ''
  - original: I see you everywhere
    translation: Vejo você em todo lugar
    notes: ''
- section: Chorus
  lines:
  - original: Go!
    translation: Vá!
    notes: ''
  - original: Black hearted soul!
    translation: Alma de coração negro!
    notes: ''
  - original: Won't you fly all away from tonight?
    translation: Não voará para longe desta noite?
    notes: ''
  - original: Find your way through the rainbow of darkness
    translation: Encontre o seu caminho através do arco-íris da escuridão
    notes: ''
  - original: Go on to light!
    translation: Siga em direção à luz!
    notes: ''
  - original: Won't you go? Black hearted soul?
    translation: Não irá? Alma de coração negro?
    notes: ''
  - original: You will fly all away from our dream
    translation: Você voará para longe do nosso sonho
    notes: ''
  - original: Find your way through the rainbow of darkness
    translation: Encontre o seu caminho através do arco-íris da escuridão
    notes: ''
  - original: Go on to light!
    translation: Siga em direção à luz!
    notes: ''
