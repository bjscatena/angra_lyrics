lyrics:
- section: Verse 1
  lines:
  - original: Now all the secrets you have learned
    translation: Agora todos os segredos que você aprendeu
    notes: ''
  - original: Got to be shared with everyone around
    translation: Precisam ser compartilhados com todos ao redor
    notes: ''
  - original: It's by your acts that the things that you know
    translation: É pelos seus atos que as coisas que você sabe
    notes: ''
  - original: Turn into facts and build a bridge of love.
    translation: Se tornam fatos e constroem uma ponte de amor.
    notes: ''
  - original: And once you understand
    translation: E uma vez que você compreende
    notes: ''
  - original: So simple and profound
    translation: Tão simples e profundo
    notes: ''
  - original: The future's in your hands
    translation: O futuro está em suas mãos
    notes: ''
  - original: Go spread the word around
    translation: Vá espalhar a palavra
    notes: ''
- section: Chorus
  lines:
  - original: Stars are calling you
    translation: Estrelas estão chamando você
    notes: ''
  - original: With a message to the world
    translation: Com uma mensagem para o mundo
    notes: ''
  - original: Telling how our soul will survive
    translation: Dizendo como nossa alma sobreviverá
    notes: ''
  - original: Perfect symmetry
    translation: Simetria perfeita
    notes: ''
  - original: Give the message to the world
    translation: Dê a mensagem ao mundo
    notes: ''
  - original: Share your love and reach for the skies
    translation: Compartilhe seu amor e alcance os céus
    notes: ''
- section: Verse 2
  lines:
  - original: Why do you refuse to trust?
    translation: Por que você se recusa a confiar?
    notes: ''
  - original: Your tiny mind against the universe
    translation: Sua mente minúscula contra o universo
    notes: ''
  - original: And all the rest of you
    translation: E todo o resto de vocês
    notes: ''
  - original: Who are laughing at me now
    translation: Que estão rindo de mim agora
    notes: ''
  - original: What's said might not be true
    translation: O que foi dito pode não ser verdade
    notes: ''
  - original: Go see what will be found
    translation: Vá ver o que será encontrado
    notes: ''
