research:
  summary: Faixa de abertura sobre conflito interior, dualidade cerebral e renascimento pessoal diante do medo e da esperança.
  themes:
  - renascimento
  - dualidade
  - esperança
  - autoconhecimento
  context: Letra de Rafael Bittencourt; música de Loureiro, Bittencourt, Andreoli e Lione. Estabelece o tom introspectivo
    do álbum com Fabio Lione estreando nos vocais principais.
  interpretation: Metáfora do embate entre razão e emoção culminando no 'newborn me' — uma versão renovada do eu emergindo
    do abismo interior.
