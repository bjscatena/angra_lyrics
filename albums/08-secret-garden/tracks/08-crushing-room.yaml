lyrics:
- section: Verse 1
  lines:
  - original: These days I can not find
    translation: Estes dias não consigo encontrar
    notes: ''
  - original: A way back of the dark
    translation: Um caminho de volta da escuridão
    notes: ''
  - original: I lost my senses
    translation: Perdi meus sentidos
    notes: ''
  - original: In my reflection a shadow of the man
    translation: No meu reflexo uma sombra do homem
    notes: ''
  - original: I'm just a stranger to myself
    translation: Sou apenas um estranho para mim mesmo
    notes: ''
- section: Pre-Chorus
  lines:
  - original: No, the silence, is coming!
    translation: Não, o silêncio está chegando!
    notes: ''
- section: Chorus
  lines:
  - original: Please don't cry again
    translation: Por favor, não chore de novo
    notes: ''
  - original: Please don't shed the tear
    translation: Por favor, não derrame a lágrima
    notes: ''
  - original: '''Cause I can''t bear to face what I did'
    translation: Porque não suporto encarar o que fiz
    notes: ''
  - original: Let me take your hand
    translation: Deixe-me pegar sua mão
    notes: ''
  - original: Please let me back to your side
    translation: Por favor, deixe-me voltar ao seu lado
    notes: ''
  - original: In your eyes I see what I've become!
    translation: Em seus olhos vejo no que me tornei!
    notes: ''
- section: Verse 2
  lines:
  - original: This room without you
    translation: Este quarto sem você
    notes: ''
  - original: Becomes way too small
    translation: Fica pequeno demais
    notes: ''
  - original: I feel its crushing my brain
    translation: Sinto que está esmagando meu cérebro
    notes: ''
  - original: My broken mirrors, glass on the floor
    translation: Meus espelhos quebrados, vidro no chão
    notes: ''
  - original: Scattered pieces of my soul!
    translation: Pedaços espalhados da minha alma!
    notes: ''
- section: Pre-Chorus 2
  lines:
  - original: No, the silence, keeps coming!
    translation: Não, o silêncio continua chegando!
    notes: ''
- section: Chorus 2
  lines:
  - original: Please don't cry again
    translation: Por favor, não chore de novo
    notes: ''
  - original: Please don't shed the tear
    translation: Por favor, não derrame a lágrima
    notes: ''
  - original: '''Cause I can''t bear to face what I did'
    translation: Porque não suporto encarar o que fiz
    notes: ''
  - original: Let me take your hand
    translation: Deixe-me pegar sua mão
    notes: ''
  - original: Please let me back to your side
    translation: Por favor, deixe-me voltar ao seu lado
    notes: ''
  - original: In your eyes I see the man I am!
    translation: Em seus olhos vejo o homem que sou!
    notes: ''
- section: Bridge
  lines:
  - original: Don't hide your face, don't hide away
    translation: Não esconda seu rosto, não se esconda
    notes: ''
  - original: Oh don't you hide from me!
    translation: Oh, não se esconda de mim!
    notes: ''
  - original: I look to you for my relief
    translation: Olho para você em busca do meu alívio
    notes: ''
  - original: Please take me out of here!
    translation: Por favor, tire-me daqui!
    notes: ''
  - original: I came to my wrong turn
    translation: Cheguei ao meu desvio errado
    notes: ''
  - original: I failed bid you to give me fate
    translation: Falhei em pedir que me desse o destino
    notes: ''
  - original: So hear me!
    translation: Então me ouça!
    notes: ''
