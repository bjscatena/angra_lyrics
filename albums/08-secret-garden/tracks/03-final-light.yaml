research:
  summary: Balada progressiva sobre busca de respostas cósmicas e a luz final como caminho, não como destino.
  themes:
  - cosmos
  - busca
  - perseverança
  - filosofia
  context: Letra de Felipe Andreoli; música creditada à banda. Faixa contemplativa no terço inicial do álbum.
  interpretation: A 'final light' simboliza o processo contínuo de queda e reerguimento — o fim nunca chega porque a jornada
    é o próprio sentido.
