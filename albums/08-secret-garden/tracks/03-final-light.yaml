lyrics:
- section: Verse 1
  lines:
  - original: You take the time to find a way
    translation: Você leva tempo para encontrar um caminho
    notes: ''
  - original: And through it seems so clear
    translation: E através dele parece tão claro
    notes: ''
  - original: A silent wonder still remains
    translation: Uma maravilha silenciosa ainda permanece
    notes: ''
  - original: Is there more for me to learn?
    translation: Há mais para eu aprender?
    notes: ''
  - original: Massive universe, save me once again
    translation: Universo imenso, salve-me mais uma vez
    notes: ''
- section: Chorus
  lines:
  - original: All the answers only led us to the edge
    translation: Todas as respostas apenas nos levaram à beira
    notes: ''
  - original: A final light never came and never will
    translation: Uma luz final nunca veio e nunca virá
    notes: ''
  - original: So we fall and rise and walk again
    translation: Então caímos, nos erguemos e caminhamos de novo
    notes: ''
  - original: The matter still prevails
    translation: A matéria ainda prevalece
    notes: ''
  - original: The final light is the path and not the end
    translation: A luz final é o caminho e não o fim
    notes: ''
  - original: It's not the end
    translation: Não é o fim
    notes: ''
- section: Verse 2
  lines:
  - original: I take my time to understand
    translation: Levo meu tempo para entender
    notes: ''
  - original: The matter in my hands
    translation: A matéria em minhas mãos
    notes: ''
  - original: On an ordinary day
    translation: Em um dia comum
    notes: ''
  - original: Mystery veiled by the dawn
    translation: Mistério velado pelo amanhecer
    notes: ''
  - original: Presents itself again
    translation: Apresenta-se novamente
    notes: ''
  - original: A never fading flame
    translation: Uma chama que nunca se apaga
    notes: ''
