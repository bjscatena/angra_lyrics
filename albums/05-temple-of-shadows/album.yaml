history:
  summary: |
    Temple of Shadows é o quinto álbum de estúdio da Angra e o primeiro álbum conceitual completo
    da formação Edu Falaschi. Lançado em setembro de 2004, consolida a nova era iniciada com Rebirth
    ao entregar uma epopeia progressiva de 66 minutos sobre o Caçador de Sombras — um cruzado do
    século XI que questiona a Igreja Católica e busca uma verdade espiritual além do fanatismo.
    O disco foi classificado pela Loudwire como o 21º melhor álbum de power metal de todos os tempos.
  recording: |
    Gravado entre janeiro e julho de 2004 no Mosh Studios (São Paulo, Brasil) e no House of Audio
    (Karlsdorf-Neuthard, Alemanha), com produção, engenharia e mixagem de Dennis Ward — o mesmo
    produtor de Rebirth. Masterização por Jürgen Lusky. Participações especiais incluem Kai Hansen
    (vocais em "The Temple of Hate"), Hansi Kürsch (vocais em "Winds of Destination"), Sabine Edelsbacher
    (vocais em "No Pain for the Dead" e backing em "Spread Your Fire"), Milton Nascimento (dueto em
    "Late Redemption") e Fábio Laguna (teclados e orquestração em "Morning Star"). A arte de capa,
    conceito de Rafael Bittencourt, foi executada por Isabel de Amorim com fotografia de Marcelo Rossi.
  concept: |
    As 13 faixas contam a saga do Shadow Hunter, escrita por Rafael Bittencourt: um cruzado escolhido
    por um rabino cego para espalhar uma nova fé, perseguido como herege, amando uma mulher muçulmana,
    perdendo a família no massacre de Jerusalém (1099), fundando uma nova religião de paz e morrendo
    em busca de redenção tardia. O álbum explora gnose, ateísmo místico, perdão de Satanás, crítica
    à Igreja e reconciliação entre cristianismo e islamismo — temas que ecoam do latim de "Spread Your
    Fire" ao dueto português-inglês de "Late Redemption", fechando com o instrumental "Gate XIII" que
    recapitula temas musicais do disco como ciclo eterno da vida.
  reception: |
    Temple of Shadows recebeu críticas muito positivas (Metal Archives 93%; Blabbermouth; AllMusic)
    e alcançou a 10ª posição no ABPD brasileiro, 22ª no Oricon japonês e 110ª na França. Considerado
    um dos álbuns mais ambiciosos da Angra, o disco elevou o padrão narrativo e progressivo da banda
    e preparou o terreno para Aurora Consurgens, embora a complexidade do conceito tenha dividido
    ouvintes casuais de fãs dedicados ao power metal épico.
