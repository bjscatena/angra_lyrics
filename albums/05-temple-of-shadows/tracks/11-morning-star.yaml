research:
  summary: Ao despertar ferido, o Shadow Hunter vê a Estrela da Manhã e é acolhido por uma família muçulmana; Laura cuida
    de seus ferimentos.
  themes:
  - estrela da manhã
  - redenção
  - decisão
  context: Décima primeira faixa; a estrela de seis pontas une cruz e tridente. Os dois homens que o carregam são irmãos;
    Laura será sua amante e curandeira.
