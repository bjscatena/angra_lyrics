    type: database
    accessed: '2026-06-06'
  - title: Temple of Shadows (album) — Wikipedia
    url: https://en.wikipedia.org/wiki/Temple_of_Shadows
    type: article
    accessed: '2026-06-06'
  interpretation: A mistura PT/EN reflete a síntese cultural da narrativa — cruzado brasileiro em terra muçulmana, aceitando
    o silêncio eterno como redenção.
