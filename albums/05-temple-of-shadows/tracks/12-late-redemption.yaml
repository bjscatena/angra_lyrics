research:
  summary: Nos últimos momentos de vida, o Shadow Hunter entrega corpo e alma ao Anjo da Morte, buscando redenção tardia em
    dueto com Milton Nascimento.
  themes:
  - morte
  - redenção
  - dueto bilíngue
  context: Décima segunda faixa; Milton Nascimento canta em português enquanto Edu Falaschi canta em inglês. O protagonista
    ainda questiona 'Estava certo? Estava errado?'
  references:
