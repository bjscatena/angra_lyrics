research:
  summary: O cruzado encontra um rabino cego que o proclama escolhido por Deus e o incita a espalhar o fogo da nova fé, questionando
    a dualidade bem/mal e a natureza de Satanás.
  themes:
  - escolhido divino
  - gnose
  - fogo sagrado
  context: Segunda faixa da saga; o rabino entrega ao Shadow Hunter um livro de páginas em branco e o convoca a queimar templos
    e espalhar a verdade. Inclui trechos em latim litúrgico.
  references:
  - title: DarkLyrics — Temple of Shadows (2004)
    url: http://www.darklyrics.com/lyrics/angra/templeofshadows.html
    type: database
    accessed: '2026-06-06'
  - title: Temple of Shadows (album) — Wikipedia
    url: https://en.wikipedia.org/wiki/Temple_of_Shadows
    type: article
    accessed: '2026-06-06'
  interpretation: 'A canção inaugura a teologia heterodoxa do álbum: Lúcifer e Satanás como facetas da criação divina, não
    inimigos absolutos.'
