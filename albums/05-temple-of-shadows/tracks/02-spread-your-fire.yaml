lyrics:
- section: Verse 1
  lines:
  - original: Woke up to life not long ago
    translation: Acordei para a vida não há muito tempo
    notes: ''
  - original: You think your mind is in control?
    translation: Você acha que sua mente está no controle?
    notes: ''
  - original: God will take it back someday
    translation: Deus a tomará de volta algum dia
    notes: ''
  - original: It's not so hard to understand
    translation: Não é tão difícil de entender
    notes: ''
  - original: They say the world has good and bad
    translation: Dizem que o mundo tem o bem e o mal
    notes: ''
  - original: Father Universe brings Love and Hate
    translation: O Pai Universo traz Amor e Ódio
    notes: ''
- section: Chorus
  lines:
  - original: Glorious - You'll lead the way
    translation: Glorioso — Você liderará o caminho
    notes: ''
  - original: To free the world from these chains
    translation: Para libertar o mundo dessas correntes
    notes: ''
  - original: Glorious - Your story now begins, Oh!
    translation: Glorioso — Sua história agora começa, Oh!
    notes: ''
  - original: Fire!
    translation: Fogo!
    notes: ''
  - original: Unleash the angel of the Light
    translation: Liberte o anjo da Luz
    notes: ''
  - original: Thank him for bringing us to life
    translation: Agradeça a ele por nos trazer à vida
    notes: ''
  - original: Lucifer is just a name!
    translation: Lúcifer é apenas um nome!
    notes: ''
  - original: We are the only ones to blame
    translation: Somos os únicos culpados
    notes: ''
  - original: Just look around, I'm not insane!
    translation: Olhe ao redor, não estou louco!
    notes: ''
  - original: Satan is a child of our God
    translation: Satanás é um filho do nosso Deus
    notes: ''
- section: Bridge
  lines:
  - original: Glorious - Don't be afraid
    translation: Glorioso — Não tenha medo
    notes: ''
  - original: To lead the way with thy sword
    translation: De liderar o caminho com tua espada
    notes: ''
  - original: Glorious - You are the chosen one. Go!
    translation: Glorioso — Você é o escolhido. Vá!
    notes: ''
- section: Latin Chorus
  lines:
  - original: Spread your fire
    translation: Espalhe seu fogo
    notes: ''
  - original: Salve ara, salve victima
    translation: Salve o altar, salve a vítima
