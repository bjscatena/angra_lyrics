research:
  summary: O viúvo enterre a esposa e os filhos, consolando-se com a ideia de que os mortos estão livres da dor mortal.
  themes:
  - luto
  - morte
  - consolo
  context: Oitava faixa; continuação direta do massacre. Sabine Edelsbacher (Edenbridge) canta co-vocais. O protagonista contempla
    o rosto pálido do filho no caixão.
