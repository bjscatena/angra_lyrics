# Angels and Demons — Temple of Shadows (2004)
id: 05-temple-of-shadows-03-angels-and-demons
album_id: 05-temple-of-shadows
track_number: 3
title: Angels and Demons
language: en
authors:
- Kiko Loureiro
- Edu Falaschi
- Rafael Bittencourt
duration: '4:12'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: Dreams -- sensations you prove
    translation: Sonhos — sensações que você prova
    notes: ''
  - original: Are taken from nature
    translation: São tiradas da natureza
    notes: ''
  - original: You find those emotions are true in your mind
    translation: Você descobre que essas emoções são verdadeiras em sua mente
    notes: ''
  - original: Fight against the kingdom of fear
    translation: Lute contra o reino do medo
    notes: ''
  - original: Sooner or later they'll try to convince you are wrong
    translation: Mais cedo ou mais tarde tentarão convencê-lo de que está errado
    notes: ''
  - original: But I'm sure..
    translation: Mas tenho certeza..
    notes: ''
  - original: We're just Crawling Angels and Demons disguised
    translation: Estamos apenas rastejando, Anjos e Demônios disfarçados
    notes: ''
  - original: The truth you don't know so try to be sure
    translation: A verdade que você não conhece, então tente ter certeza
    notes: ''
  - original: When your Angels and Demons arise
    translation: Quando seus Anjos e Demônios surgirem
    notes: ''
- section: Verse 2
  lines:
  - original: 'Face the Truth: God is not love!'
    translation: 'Enfrente a Verdade: Deus não é amor!'
    notes: ''
  - original: Feel as fluid as life, Love is a rainbow
    translation: Sinta-se tão fluido quanto a vida, o Amor é um arco-íris
    notes: ''
  - original: As much as it seems to be real
    translation: Por mais que pareça real
    notes: ''
  - original: It's all in your mind
    translation: Está tudo em sua mente
    notes: ''
  - original: Sooner or later I'm gonna convince that
    translation: Mais cedo ou mais tarde vou convencer que
    notes: ''
  - original: The truth is a lie
    translation: A verdade é uma mentira
    notes: ''
  - original: There's no Judge when we die
    translation: Não há Juiz quando morremos
    notes: ''
  - original: Only dust
    translation: Apenas pó
    notes: ''
  - original: We're just Crawling Angels and Demons disguised
    translation: Estamos apenas rastejando, Anjos e Demônios disfarçados
    notes: ''
  - original: The truth you don't know so try to be sure
    translation: A verdade que você não conhece, então tente ter certeza
    notes: ''
  - original: When your Angels and Demons arise
    translation: Quando seus Anjos e Demônios surgirem
    notes: ''
- section: Bridge
  lines:
  - original: But we're still not sure which way we should go
    translation: Mas ainda não temos certeza de qual caminho seguir
    notes: ''
  - original: When the Angels and Demons disguise
    translation: Quando os Anjos e Demônios se disfarçam
    notes: ''
  - original: Just confusing our brains with their lies
    translation: Apenas confundindo nossos cérebros com suas mentiras
    notes: ''
  - original: Enticing emotions
    translation: Emoções sedutoras
    notes: ''
  - original: Revolting devotions
    translation: Devoções revoltantes
    notes: ''
  - original: The Angels and Demons telling me lies!
    translation: Os Anjos e Demônios me contando mentiras!
    notes: ''
research:
  summary: 'Perseguido pela Igreja como herege, o Shadow Hunter expõe sua Teoria da Luz: anjos e demônios se disfarçam, Deus
    não é amor e não há juiz após a morte.'
  themes:
  - herege
  - gnose
  - ateísmo místico
  context: Terceira faixa; o protagonista é capturado, torturado e condenado à morte após proclamar sua doutrina diante dos
    cardeais e do Papa.
  references:
  - title: DarkLyrics — Temple of Shadows (2004)
    url: http://www.darklyrics.com/lyrics/angra/templeofshadows.html
    type: database
    accessed: '2026-06-06'
  - title: Temple of Shadows (album) — Wikipedia
    url: https://en.wikipedia.org/wiki/Temple_of_Shadows
    type: article
    accessed: '2026-06-06'
  interpretation: 'A letra articula o núcleo filosófico do álbum: a rejeição de verdades absolutas e a percepção de que bem
    e mal são construções humanas.'
