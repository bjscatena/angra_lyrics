lyrics:
- section: Verse 1
  lines:
  - original: I lay my eyes in the past
    translation: Poso meus olhos no passado
    notes: ''
  - original: From the first day to the last
    translation: Do primeiro dia ao último
    notes: ''
  - original: Several things we had to learn
    translation: Várias coisas tivemos que aprender
    notes: ''
  - original: Countless mistakes from times of yore
    translation: Incontáveis erros de tempos antigos
    notes: ''
  - original: Now we restart, we recreate
    translation: Agora recomeçamos, recriamos
    notes: ''
  - original: Your present is your fate
    translation: Seu presente é seu destino
    notes: ''
  - original: Don't turn your backs on mankind!
    translation: Não virem as costas à humanidade!
    notes: ''
  - original: Only yourselves you wanna save
    translation: Apenas a si mesmos querem salvar
    notes: ''
  - original: Ignorance burns just like a fire
    translation: A ignorância queima como um fogo
    notes: ''
  - original: Consuming people on its flame
    translation: Consumindo pessoas em sua chama
    notes: ''
  - original: Fellow creatures, so wonderful!
    translation: Companheiros criaturas, tão maravilhosos!
    notes: ''
  - original: So different and so grand
    translation: Tão diferentes e tão grandiosos
    notes: ''
- section: Chorus
  lines:
  - original: Sprouts of time
    translation: Brotos do tempo
    notes: ''
  - original: The roots evolving
    translation: As raízes evoluindo
    notes: ''
  - original: The seeds for the future were scattered yesterday
    translation: As sementes do futuro foram espalhadas ontem
    notes: ''
  - original: Tomorrow's harvest field we plant today
    translation: O campo da colheita de amanhã plantamos hoje
    notes: ''
  - original: Your crown will ever last
    translation: Sua coroa durará para sempre
    notes: ''
  - original: The tall trees of life
    translation: As altas árvores da vida
    notes: ''
  - original: (Life experience)
    translation: (Experiência de vida)
    notes: ''
  - original: Break your shell reach the light!
    translation: Quebre sua casca, alcance a luz!
    notes: ''
  - original: (Mind and sould)
    translation: (Mente e alma)
    notes: ''
  - original: Find your path to the skies
    translation: Encontre seu caminho para os céus
    notes: ''
  - original: (Will come around on a thunder sound)
    translation: (Virá com o som do trovão)
    notes: ''
  - original: Raging with power and fury the new born world
    translation: Furiosa com poder e fúria, o mundo recém-nascido
    notes: ''
  - original: Sprouts of time
    translation: Brotos do tempo
    notes: ''
  - original: The roots evolving
    translation: As raízes evoluindo
    notes: ''
  - original: The seeds from the past branching out
    translation: As sementes do passado ramificando-se
    notes: ''
  - original: Growing forever
    translation: Crescendo para sempre
    notes: ''
  - original: Hands on heart
    translation: Mãos no coração
    notes: ''
  - original: Embrace each other
    translation: Abrace uns aos outros
    notes: ''
  - original: The dances, the faces, the smiles
    translation: As danças, os rostos, os sorrisos
    notes: ''
  - original: Behind the past
    translation: Por trás do passado
    notes: ''
  - original: New seasons bring the chance
    translation: Novas estações trazem a chance
    notes: ''
  - original: To start again
    translation: De recomeçar
    notes: ''
  - original: Tall trees will ever last
    translation: Árvores altas durarão para sempre
    notes: ''
  - original: The circles of life
    translation: Os círculos da vida
    notes: ''
