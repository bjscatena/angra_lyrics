instrumental_description: |
  Intro instrumental que abre a saga do Shadow Hunter com atmosfera medieval e orquestral.
  O título latino "Deus Le Volt" (Deus o quer / Deus assim o quer) era o grito de guerra
  dos cruzados — estabelecendo o cenário histórico e religioso do álbum conceitual antes
  da primeira faixa vocal "Spread Your Fire".
