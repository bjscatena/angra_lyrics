research:
  summary: O Shadow Hunter, ferido na conquista de Xerigordon, busca redenção enquanto descobre a morte da família e questiona
    a fé cruzadista.
  themes:
  - guerra santa
  - perda
  - questionamento religioso
  context: Sétima faixa; o título dá nome ao protagonista. Uma cigana lê suas cartas e avisa que o amor o desviará do caminho.
    Referências a Eclesiastes (Vanitas vanitatum).
