  - original: Blood is flowing on the ground
    translation: Sangue flui no chão
    notes: ''
  - original: Like a river branching red lines
    translation: Como um rio ramificando linhas vermelhas
    notes: ''
  - original: Anguish is all around
    translation: Angústia está por toda parte
    notes: ''
  - original: Hope yielding to despair
    translation: Esperança cedendo ao desespero
    notes: ''
  - original: Life is a circumstance
    translation: A vida é uma circunstância
    notes: ''
  - original: Any minute slips away
    translation: Qualquer minuto escapa
    notes: ''
  - original: God, please look upon us all
    translation: Deus, por favor olhe para todos nós
    notes: ''
  - original: Do you give a damn?
    translation: Você se importa?
    notes: ''
  - original: Dancing in the air
    translation: Dançando no ar
    notes: ''
  - original: Spinning leaves in circles giving pleasure to my eyes
    translation: Folhas girando em círculos dando prazer aos meus olhos
    notes: ''
  - original: Sadden my delight
    translation: Entristecem meu deleite
    notes: ''
  - original: When the joy is over laying scattered on the ground
    translation: Quando a alegria acaba espalhada no chão
    notes: ''
  - original: Oh! The sun will rise
