    notes: ''
  - original: The beginning of creation
    translation: O início da criação
    notes: ''
  - original: Oh! Into the skies
    translation: Oh! Para os céus
    notes: ''
  - original: On the Winds of Destination
    translation: Nos Ventos do Destino
    notes: ''
  - original: Carry us away...
    translation: Nos levam embora...
    notes: ''
- section: Verse 2
  lines:
  - original: Secret ark of Solomon
    translation: Arca secreta de Salomão
    notes: ''
  - original: Hidden in the temple wreck... for the king
    translation: Escondida nas ruínas do templo... para o rei
    notes: ''
  - original: Many years and centuries
    translation: Muitos anos e séculos
    notes: ''
  - original: Till seven knights from the order
    translation: Até sete cavaleiros da ordem
    notes: ''
  - original: Down the tunnels of the past
    translation: Pelos túneis do passado
    notes: ''
  - original: Learning from the undisclosed... all the way!
    translation: Aprendendo com o não revelado... o tempo todo!
    notes: ''
  - original: Holding dreams on zealous hands
    translation: Segurando sonhos em mãos zelosas
    notes: ''
  - original: All those archives
    translation: Todos aqueles arquivos
    notes: ''
  - original: Lost and wasted
    translation: Perdidos e desperdiçados
    notes: ''
  - original: Somewhere in the battle fields
    translation: Em algum lugar nos campos de batalha
    notes: ''
  - original: Farewell to common world
    translation: Adeus ao mundo comum
    notes: ''
  - original: Templars are watching and guarding the scrolls
    translation: Templários vigiam e guardam os pergaminhos
    notes: ''
  - original: Shields of faith the knights behold
    translation: Escudos de fé que os cavaleiros contemplam
    notes: ''
  - original: All Manuscripts of the sacred laws are there
    translation: Todos os manuscritos das leis sagradas estão lá
    notes: ''
  - original: Dancing in the air
    translation: Dançando no ar
    notes: ''
  - original: Spinning leaves in circles
    translation: Folhas girando em círculos
    notes: ''
  - original: Giving pleasure to my eyes
    translation: Dando prazer aos meus olhos
    notes: ''
  - original: '...arise!'
    translation: '...ergam-se!'
    notes: ''
  - original: Oh! The sun will rise
    translation: Oh! O sol nascerá
    notes: ''
  - original: The beginning of creation
    translation: O início da criação
    notes: ''
  - original: Oh! Into the skies
    translation: Oh! Para os céus
    notes: ''
  - original: On the Winds of Destination
    translation: Nos Ventos do Destino
    notes: ''
