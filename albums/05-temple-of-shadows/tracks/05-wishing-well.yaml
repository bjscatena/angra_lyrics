# Wishing Well — Temple of Shadows (2004)
id: 05-temple-of-shadows-05-wishing-well
album_id: 05-temple-of-shadows
track_number: 5
title: Wishing Well
language: en
authors:
- Edu Falaschi
- Rafael Bittencourt
duration: '4:01'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: Close your eyes, what do you see?
    translation: Feche os olhos, o que você vê?
    notes: ''
  - original: Takes a while to believe
    translation: Leva um tempo para acreditar
    notes: ''
  - original: Feel the wind kissing your chin
    translation: Sinta o vento beijando seu queixo
    notes: ''
  - original: Hold your cries make your wish
    translation: Segure seus gritos, faça seu desejo
    notes: ''
  - original: Dream away, breath...
    translation: Sonhe, respire...
    notes: ''
  - original: Why did it take so long to understand?
    translation: Por que demorou tanto para entender?
    notes: ''
  - original: Black sheep of the flock will soon be banned
    translation: A ovelha negra do rebanho logo será banida
    notes: ''
  - original: Don't lose your hope, wish away
    translation: Não perca sua esperança, deseje
    notes: ''
- section: Chorus
  lines:
  - original: (Journey to the sacred ground of Dreamland)
    translation: (Jornada ao solo sagrado da Terra dos Sonhos)
    notes: ''
  - original: To one's heart's content I'll be free again
    translation: Até o contentamento do coração, serei livre novamente
    notes: ''
  - original: (Visions telling secrets on the Dreamland)
    translation: (Visões contando segredos na Terra dos Sonhos)
    notes: ''
  - original: And my fortune ends in the Wishing Well
    translation: E minha fortuna termina no Poço dos Desejos
    notes: ''
- section: Verse 2
  lines:
  - original: Close your eyes what do you feel?
    translation: Feche os olhos, o que você sente?
    notes: ''
  - original: Hold your cries keep it still
    translation: Segure seus gritos, mantenha a calma
    notes: ''
  - original: Where am I? Why am I here?
    translation: Onde estou? Por que estou aqui?
    notes: ''
  - original: Reasons where Reasons why
    translation: Razões onde Razões por quê
    notes: ''
- section: Bridge
  lines:
  - original: Oh! Who knows the truth in this world?
    translation: Oh! Quem conhece a verdade neste mundo?
    notes: ''
  - original: Close your eyes, what do you see?
    translation: Feche os olhos, o que você vê?
    notes: ''
  - original: Make your dreams come true again
    translation: Faça seus sonhos se tornarem realidade novamente
    notes: ''
  - original: Where am I? Why am I here?
    translation: Onde estou? Por que estou aqui?
    notes: ''
  - original: Dreaming is believing, your wishing well
    translation: Sonhar é acreditar, seu poço dos desejos
    notes: ''
research:
  summary: Vignette onírica em que o rabino reaparece nos sonhos do caçador, ensinando que a fé importa mais que o templo
    ou o poço dos desejos.
  themes:
  - fé
  - sonhos
  - esperança
  context: Quinta faixa; interlúdio narrativo separado da batalha iminente. O rabino afirma que Deus não tem lar fixo — está
    em toda parte.
