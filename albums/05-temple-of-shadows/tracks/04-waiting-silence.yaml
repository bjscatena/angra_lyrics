research:
  summary: O Shadow Hunter se apaixona por uma mulher muçulmana, tem dois filhos e vive dividido entre o destino profético
    e a felicidade familiar, às vésperas do ataque cruzado.
  themes:
  - amor
  - conflito interior
  - destino
  context: Quarta faixa; quatro anos após o encontro com o rabino, o protagonista preenche o livro em branco com seus sonhos
    e revelações enquanto a ansiedade do silêncio que precede o massacre se aproxima.
  references:
  - title: DarkLyrics — Temple of Shadows (2004)
    url: http://www.darklyrics.com/lyrics/angra/templeofshadows.html
    type: database
    accessed: '2026-06-06'
  - title: Temple of Shadows (album) — Wikipedia
    url: https://en.wikipedia.org/wiki/Temple_of_Shadows
    type: article
    accessed: '2026-06-06'
  interpretation: O amor familiar torna-se a maior ameaça à missão do caçador — tema que retorna em 'The Shadow Hunter' e
    'Morning Star'.
