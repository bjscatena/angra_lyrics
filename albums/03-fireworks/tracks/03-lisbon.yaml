    translation: Veja, os pássaros voltaram...
    notes: ''
  - original: At the docks and everywhere
    translation: Nas docas e em todo lugar
    notes: ''
  - original: Here in Lisbon, realized
    translation: Aqui em Lisboa, percebi
    notes: ''
  - original: This whole world so strange and divine
    translation: Que este mundo inteiro é tão estranho e divino
    notes: ''
