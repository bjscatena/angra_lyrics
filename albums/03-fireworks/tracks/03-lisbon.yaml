lyrics:
- section: Verse 1
  lines:
  - original: Everynight I say a prayer
    translation: Toda noite eu faço uma oração
    notes: ''
  - original: 'Look at me: nobody cares'
    translation: 'Olhe para mim: ninguém se importa'
    notes: ''
  - original: Just a mirror, passing by...
    translation: Apenas um espelho, passando...
    notes: ''
  - original: 'Looked inside:'
    translation: 'Olhei por dentro:'
    notes: ''
  - original: I've lost my pride...!
    translation: Perdi meu orgulho...!
    notes: ''
- section: Verse 2
  lines:
  - original: Stay with me not for so long
    translation: Fique comigo não por muito tempo
    notes: ''
  - original: "It's alright: no needs, no hope"
    translation: "Está tudo bem: sem necessidades, sem esperança"
    notes: ''
  - original: Such a miracle, looking back...
    translation: Que milagre, olhando para trás...
    notes: ''
  - original: Time gone by, and life wasn't bad...!
    translation: O tempo passou, e a vida não era ruim...!
    notes: ''
- section: Pre-Chorus
  lines:
  - original: Lord, light my way
    translation: Senhor, ilumine meu caminho
    notes: ''
  - original: Fill these withered, careless hands...
    translation: Preencha estas mãos ressequidas e descuidadas...
    notes: ''
- section: Chorus
  lines:
  - original: Oh, skies are falling down
    translation: Oh, os céus estão caindo
