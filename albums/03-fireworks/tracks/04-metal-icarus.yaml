research:
  summary: Hino power metal que reimagina o mito de Ícaro como "Metal Icarus" — figura que queima as asas no sol repetidamente, entre euforia e luto.
  themes:
  - mito de Ícaro
  - hubris
  - luto
  - metal
  context: Música de Bittencourt, Loureiro e Confessori; letra de Rafael Bittencourt. Uma das faixas mais energéticas e populares de Fireworks, frequentemente presente em setlists da era Matos.
  interpretation: Ícaro metamorfoseado em metáfora do excesso rock/metal — voar alto demais, perder quem se ama, mas ainda reviver a sensação de voo ao fechar os olhos.
