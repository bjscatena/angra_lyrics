lyrics:
- section: Verse 1
  lines:
  - original: Day by day
    translation: Dia após dia
    notes: ''
  - original: Wheels keep turning round
    translation: As rodas continuam girando
    notes: ''
  - original: And everynight
    translation: E toda noite
    notes: ''
  - original: Many restless creatures longing for the dawn
    translation: Muitas criaturas inquietas anseiam pelo amanhecer
    notes: ''
  - original: To heal away
    translation: Para curar
    notes: ''
  - original: Their eternal pain...
    translation: Sua dor eterna...
    notes: ''
- section: Verse 2
  lines:
  - original: Hope the saints arrive
    translation: Espera que os santos cheguem
    notes: ''
  - original: Bringing the signs
    translation: Trazendo os sinais
    notes: ''
  - original: Of treasures to be found
    translation: De tesouros a serem encontrados
    notes: ''
  - original: Now we walk alone
    translation: Agora caminhamos sozinhos
    notes: ''
  - original: And we've got to know
    translation: E precisamos saber
    notes: ''
  - original: The secrets all around
    translation: Os segredos por toda parte
    notes: ''
  - original: Breaking our hearts of stone,
    translation: Quebrando nossos corações de pedra,
    notes: ''
  - original: Tasting our lives,
    translation: Provando nossas vidas,
    notes: ''
  - original: Setting us free to decide...
    translation: Nos libertando para decidir...
    notes: ''
- section: Chorus
  lines:
  - original: '"Wings Of Reality, Take me higher and higher'
    translation: '"Asas da Realidade, leve-me cada vez mais alto'
    notes: ''
  - original: Show me the way to be
    translation: Mostre-me o caminho para ser
    notes: ''
  - original: Free forever with you...'
    translation: Livre para sempre com você..."'
    notes: ''
  - original: I guess I've found my way
    translation: Acho que encontrei meu caminho
    notes: ''
  - original: Everyday growing stronger
    translation: Cada dia ficando mais forte
    notes: ''
  - original: So many words to say,
    translation: Tantas palavras a dizer,
    notes: ''
  - original: So many things to do...
    translation: Tantas coisas a fazer...
    notes: ''
- section: Bridge
  lines:
  - original: The ghosts get closer to many fears
    translation: Os fantasmas se aproximam de muitos medos
    notes: ''
  - original: A beast has awakened here inside...
    translation: Uma fera despertou aqui dentro...
    notes: ''
  - original: All we don't know, nobody knows!
    translation: Tudo o que não sabemos, ninguém sabe!
    notes: ''
  - original: ...And the pay back is coming someday!!
    translation: ...E a retribuição virá algum dia!!
    notes: ''
research:
  summary: Abertura épica que contrasta rotina cotidiana e dor existencial com a busca por liberdade espiritual, culminando em um refrão sobre "asas da realidade".
  themes:
  - busca espiritual
  - liberdade
  - dor existencial
  context: Primeira faixa vocal de Fireworks; letra e música de Andre Matos. Estabelece o tom introspectivo do álbum após Holy Land, com arranjo orquestral e produção de Chris Tsangarides.
  interpretation: A metáfora das "asas da realidade" sugere elevação além do sofrimento cotidiano, enquanto a fera interior e o "payback" introduzem tensão entre esperança e consequências kármicas.
