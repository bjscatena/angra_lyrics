# Petrified Eyes — Fireworks (1998)
id: 03-fireworks-02-petrified-eyes
album_id: 03-fireworks
track_number: 2
title: Petrified Eyes
language: en
authors:
- Chris Tsangarides
- Rafael Bittencourt
duration: '6:05'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: We're armed and ready to attack
    translation: Estamos armados e prontos para atacar
    notes: ''
  - original: To strike the city of all desires
    translation: Para atingir a cidade de todos os desejos
    notes: ''
  - original: Then calm the waves that lead to passion
    translation: Depois acalmar as ondas que levam à paixão
    notes: ''
  - original: When all reality turns back to ashes
    translation: Quando toda a realidade volta a cinzas
    notes: ''
  - original: Over the hills, across the sea
    translation: Sobre as colinas, através do mar
    notes: ''
  - original: Into the abyss of a bygone time
    translation: Para o abismo de um tempo passado
    notes: ''
  - original: Lest we forget what really matters
    translation: Para que não esqueçamos o que realmente importa
    notes: ''
  - original: And the bewildered look up to the sky
    translation: E os desorientados olham para o céu
    notes: ''
- section: Chorus
  lines:
  - original: Fallen comrades lay on the ground
    translation: Camaradas caídos jazem no chão
    notes: ''
  - original: Victors in death they make no sound
    translation: Vencedores na morte, não emitem som
    notes: ''
  - original: Petrify my eyes
    translation: Petrifique meus olhos
    notes: ''
  - original: Behold the sights of battle lost
    translation: Contemple os espetáculos da batalha perdida
    notes: ''
  - original: In this unchanging world
    translation: Neste mundo imutável
    notes: ''
  - original: What does the poor life of a warrior cost?
    translation: Quanto custa a pobre vida de um guerreiro?
    notes: ''
  - original: Oh can't you see
    translation: Oh, você não vê
    notes: ''
  - original: Many faces from God's own races are waiting
    translation: Muitos rostos das próprias raças de Deus estão esperando
    notes: ''
  - original: To fight the good fight
    translation: Para lutar a boa luta
    notes: ''
  - original: Even thought the animals of time have passed you by you still don't see
    translation: Mesmo que os animais do tempo tenham passado por você, você ainda não vê
    notes: ''
  - original: Oh, you won't see
    translation: Oh, você não verá
    notes: ''
  - original: They've petrified your eyes
    translation: Eles petrificaram seus olhos
    notes: ''
- section: Verse 2
  lines:
  - original: Deep desires of mine
    translation: Desejos profundos meus
    notes: ''
  - original: Dark thoughts tirannize my mind
    translation: Pensamentos sombrios tiranizam minha mente
    notes: ''
  - original: When will this torture end
    translation: Quando terminará esta tortura
    notes: ''
  - original: Into the mire, to battle again
    translation: Para o atoleiro, para a batalha outra vez
    notes: ''
research:
  summary: Balada épica sobre guerras, morte e olhos petrificados diante do horror — letra co-escrita pelo produtor Chris Tsangarides com música de Rafael Bittencourt.
  themes:
  - guerra
  - morte
  - cegueira moral
  context: Segunda faixa do álbum; uma das raras colaborações de Tsangarides nas letras da Angra. Orquestração reforça o clima bélico e trágico.
  interpretation: '"Petrified Eyes" funciona como crítica à indiferença diante do conflito — guerreiros mortos em silêncio enquanto os vivos permanecem cegos ao custo humano da violência.'
  references:
  - title: DarkLyrics — Fireworks (1998)
    url: http://www.darklyrics.com/lyrics/angra/fireworks.html
