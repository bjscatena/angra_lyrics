# Mystery Machine — Fireworks (1998)
id: 03-fireworks-06-mystery-machine
album_id: 03-fireworks
track_number: 6
title: Mystery Machine
language: en
authors:
- Chris Tsangarides
- Ricardo Confessori
- Rafael Bittencourt
- Kiko Loureiro
