lyrics:
- section: Verse 1
  lines:
  - original: I see the stars in your eyes
    translation: Vejo as estrelas em seus olhos
    notes: ''
  - original: Portraying my face in the future
    translation: Retratando meu rosto no futuro
    notes: ''
  - original: Nice is the weather outside
    translation: Agradável é o tempo lá fora
    notes: ''
  - original: But I'll stay at home
    translation: Mas ficarei em casa
    notes: ''
  - original: Oh! Waiting for the rain...
    translation: Oh! Esperando pela chuva...
    notes: ''
- section: Verse 2
  lines:
  - original: Memories of when we were young
    translation: Memórias de quando éramos jovens
    notes: ''
  - original: Wishing so bad to be older
    translation: Desejando tanto ser mais velhos
    notes: ''
  - original: Now you may look to the past
    translation: Agora você pode olhar para o passado
    notes: ''
  - original: The only way forward
    translation: O único caminho adiante
    notes: ''
  - original: ...Lighting up another cigarette
    translation: ...Acendendo outro cigarro
    notes: ''
  - original: Playing cool while cracking up inside
    translation: Fingindo estar bem enquanto desmorona por dentro
    notes: ''
  - original: Saying hi to people's like saying goodbye
    translation: Dizer oi às pessoas é como dizer adeus
    notes: ''
  - original: Laughing, but wishing to cry
    translation: Rindo, mas desejando chorar
    notes: ''
- section: Chorus
  lines:
  - original: Gentle change of tides
    translation: Mudança suave das marés
    notes: ''
  - original: Upcoming days
    translation: Dias que se aproximam
    notes: ''
  - original: Oh, the spirits of a new horizon fall
    translation: Oh, os espíritos de um novo horizonte caem
    notes: ''
  - original: Into old dreams
    translation: Em sonhos antigos
    notes: ''
- section: Verse 3
  lines:
  - original: Standing here howling at the storm
    translation: Ficando aqui uivando para a tempestade
    notes: ''
  - original: Shouting how life could be perfect
    translation: Gritando como a vida poderia ser perfeita
    notes: ''
  - original: Well, then the walls have to fall
    translation: Bem, então os muros precisam cair
    notes: ''
  - original: To start it again
    translation: Para recomeçar
    notes: ''
