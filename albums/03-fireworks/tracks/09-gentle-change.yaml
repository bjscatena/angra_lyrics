research:
  summary: Balada introspectiva sobre envelhecimento, nostalgia e mudanças graduais — desejar ser mais velho na juventude e só encontrar o passado como caminho adiante.
  themes:
  - passagem do tempo
  - nostalgia
  - melancolia
  context: Letra de Rafael Bittencourt; música co-escrita com Mariutti e Confessori. Tom mais acústico e contemplativo antes do fechamento energético do álbum.
  interpretation: '"Gentle change of tides" contrasta com a ruptura interna (cracking up inside) — transformações externas suaves mascaram labirintos emocionais onde novos horizontes caem em sonhos antigos.'
