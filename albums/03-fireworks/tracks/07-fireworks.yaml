lyrics:
- section: Verse 1
  lines:
  - original: It's New Year Day; Looking up to the sky
    translation: É Ano-Novo; Olhando para o céu
    notes: ''
  - original: We all await for the fireworks to fly
    translation: Todos aguardamos os fogos de artifício voarem
    notes: ''
  - original: And I hold you
    translation: E eu te abraço
    notes: ''
  - original: And I stand by you now...
    translation: E fico ao seu lado agora...
    notes: ''
- section: Verse 2
  lines:
  - original: Over the bay darkness breaks to a glow
    translation: Sobre a baía a escuridão se rompe em um brilho
    notes: ''
  - original: But still the sands keep on running too slow
    translation: Mas a areia ainda continua escorrendo devagar demais
    notes: ''
  - original: And I love you
    translation: E eu te amo
    notes: ''
  - original: And I care for you now...
    translation: E me importo com você agora...
    notes: ''
- section: Pre-Chorus
  lines:
  - original: Green comes after white
    translation: Verde vem depois do branco
    notes: ''
  - original: Night turns to day into the fire
    translation: A noite vira dia dentro do fogo
    notes: ''
  - original: Look at our dreams flying away
    translation: Olhe nossos sonhos voando embora
    notes: ''
  - original: Climbing up higher
    translation: Subindo cada vez mais alto
    notes: ''
- section: Verse 3
  lines:
  - original: Along the shore timeless faces reflect
    translation: Ao longo da costa rostos atemporais refletem
    notes: ''
  - original: The innocence of childhood never left
    translation: A inocência da infância que nunca partiu
    notes: ''
  - original: And I miss you
    translation: E eu sinto sua falta
    notes: ''
  - original: And I cry for you now...
    translation: E choro por você agora...
    notes: ''
- section: Pre-Chorus (repeat)
  lines:
  - original: Green comes after white
    translation: Verde vem depois do branco
    notes: ''
  - original: Night turns to day into the fire
    translation: A noite vira dia dentro do fogo
    notes: ''
  - original: Look at our dreams flying away
    translation: Olhe nossos sonhos voando embora
    notes: ''
  - original: Climbing up higher
    translation: Subindo cada vez mais alto
    notes: ''
- section: Bridge
  lines:
  - original: And the ones who we trust
    translation: E aqueles em quem confiamos
    notes: ''
  - original: And the moments of joy
    translation: E os momentos de alegria
    notes: ''
  - original: Mirrored there is a glow
    translation: Refletidos ali há um brilho
    notes: ''
  - original: That will dazzle our eyes
    translation: Que deslumbrará nossos olhos
    notes: ''
  - original: Here is my heart, in my soul
    translation: Aqui está meu coração, em minha alma
    notes: ''
  - original: Sharing the miracle of Hope
    translation: Compartilhando o milagre da Esperança
    notes: ''
  - original: In my heart, in my mind, in my soul...
    translation: Em meu coração, em minha mente, em minha alma...
    notes: ''
  - original: Stay hand in hand, stay with me
    translation: Fique de mãos dadas, fique comigo
    notes: ''
  - original: Love is the keys to believe
    translation: O amor é a chave para acreditar
    notes: ''
  - original: In our hearts, in our minds, in our souls!
    translation: Em nossos corações, em nossas mentes, em nossas almas!
    notes: ''
- section: Outro
  lines:
  - original: ...But now no matter what I say,
    translation: ...Mas agora, não importa o que eu diga,
    notes: ''
  - original: Just look at the fireworks!
    translation: Apenas olhe os fogos de artifício!
    notes: ''
research:
  summary: Title track que usa fogos de artifício de Ano-Novo como metáfora de instantes luminosos, amor, infância perdida e esperança efêmera junto à baía.
  themes:
  - celebração
  - amor
  - infância
  - efemeridade
  context: Faixa central do álbum e uma das mais emotivas da era Matos; co-escrita por toda a formação. Orquestração e refrão grandioso encapsulam o conceito do disco.
  interpretation: A alternância entre "I hold you" e "I miss you" sugere memória afetiva — presença e ausência simultâneas diante de um espetáculo que dura segundos mas ilumina a noite inteira.
