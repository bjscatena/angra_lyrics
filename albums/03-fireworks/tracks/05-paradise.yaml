# Paradise — Fireworks (1998)
id: 03-fireworks-05-paradise
album_id: 03-fireworks
track_number: 5
title: Paradise
language: en
authors:
- Andre Matos
- Rafael Bittencourt
- Kiko Loureiro
duration: '7:38'
instrumental: false
lyrics:
- section: Verse 1
  lines:
  - original: Since the time of the ancients
    translation: Desde o tempo dos antigos
    notes: ''
  - original: When gladiators fought
    translation: Quando gladiadores lutavam
    notes: ''
  - original: Turning movements of action to passion
    translation: Transformando movimentos de ação em paixão
    notes: ''
  - original: Their life was a game
    translation: A vida deles era um jogo
    notes: ''
  - original: See the blood of the bodies
    translation: Veja o sangue dos corpos
    notes: ''
  - original: Spilling onto the floor?
    translation: Derramando-se no chão?
    notes: ''
  - original: How could people applaud it
    translation: Como as pessoas podiam aplaudir
    notes: ''
  - original: It's madness it's all so insane!
    translation: É loucura, é tudo tão insano!
    notes: ''
- section: Pre-Chorus
  lines:
  - original: Blood, through your heart
    translation: Sangue, através do seu coração
    notes: ''
  - original: Never stops for one minute
    translation: Nunca para por um minuto
    notes: ''
  - original: 'And there you will find:'
    translation: 'E lá você encontrará:'
    notes: ''
  - original: '- There is no other way!'
    translation: '- Não há outro caminho!'
    notes: ''
- section: Verse 2
  lines:
  - original: The arena's still crowded
    translation: A arena ainda está lotada
    notes: ''
  - original: But the rules take new forms
    translation: Mas as regras assumem novas formas
    notes: ''
  - original: Some of them tread on stages,
    translation: Alguns pisam palcos,
    notes: ''
  - original: Some others chase after a ball...
    translation: Outros correm atrás de uma bola...
    notes: ''
- section: Pre-Chorus (repeat)
  lines:
  - original: Blood, through your heart
    translation: Sangue, através do seu coração
    notes: ''
  - original: Never stops for one minute
    translation: Nunca para por um minuto
    notes: ''
  - original: 'And there you will find:'
    translation: 'E lá você encontrará:'
    notes: ''
  - original: '- There is no way out!'
    translation: '- Não há saída!'
    notes: ''
- section: Bridge
  lines:
  - original: 'Demons with a thousand eyes:'
    translation: 'Demônios com mil olhos:'
    notes: ''
  - original: '- Look at me and cast your spell!...'
    translation: '- Olhe para mim e lance seu feitiço!...'
    notes: ''
- section: Chorus
  lines:
  - original: We're dreaming of Paradise
    translation: Sonhamos com o Paraíso
    notes: ''
  - original: While we stay here in hell!!!
    translation: Enquanto permanecemos aqui no inferno!!!
    notes: ''
research:
  summary: Epopeia crítica que liga gladiadores romanos ao espetáculo moderno — palcos e esportes — concluindo que sonhamos paraíso enquanto vivemos no inferno.
  themes:
  - violência espetacular
  - crítica social
  - paraíso e inferno
  context: Uma das faixas mais longas do álbum (7:38), com arranjo orquestral extenso. Letra de Matos sobre música co-escrita com Bittencourt e Loureiro.
  interpretation: A progressão de "no other way" para "no way out" intensifica o aprisionamento cultural — a humanidade substitui a arena antiga por novos circos, sem escapar da sede de sangue.
