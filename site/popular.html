<body data-asset-prefix="" data-asset-version="1782054499">
  <header class="site-header">
    <div class="container">
      <a class="site-logo" href="index.html">Angra Lyrics</a>
      <nav class="site-nav" aria-label="Principal">
        <a href="index.html">Discografia</a>
        <a href="popular.html">Músicas</a>
        <a href="critics.html">Avaliações</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      
<nav class="breadcrumb" aria-label="Navegação">
  <a href="index.html">Home</a>
  <span aria-hidden="true">›</span>
  <span>Músicas</span>
</nav>

<section class="hero hero--compact">
  <h1>Músicas</h1>
  <p class="hero-subtitle">Busque por título ou álbum e ordene/filtre por popularidade ou nota dos críticos (0 a 10).</p>
</section>

<section class="popular-section" aria-label="Busca e listagem de faixas">
  <div class="popular-controls">
    <div class="search-box" role="search">
      <label for="popular-search" class="visually-hidden">Buscar faixas por título ou álbum</label>
      <input
        type="search"
        id="popular-search"
        class="search-input"
        placeholder="Buscar faixas…"
        autocomplete="off"
        aria-controls="popular-results"
      >
    </div>

    <div class="popular-options">
      <div class="popular-filters" role="group" aria-label="Filtrar por nota mínima">
        <span id="filter-label-text" class="popular-filters-label">Mínimo:</span>
        <button type="button" class="filter-btn active" data-min-score="0">Todas</button>
        <button type="button" class="filter-btn" data-min-score="5">5+</button>
        <button type="button" class="filter-btn" data-min-score="7">7+</button>
        <button type="button" class="filter-btn" data-min-score="9">9+</button>
      </div>

      <div style="display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;">
        <div class="sort-control">
          <label for="popular-sort" class="popular-filters-label">Ordenar por:</label>
          <select id="popular-sort" class="sort-select">
            <option value="popularity">Popularidade (Fãs)</option>
            <option value="critic">Nota dos Críticos</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <p id="popular-count" class="popular-count" aria-live="polite"></p>

  <ol id="popular-results" class="popular-results" role="list"></ol>

  <p id="popular-empty" class="popular-empty" hidden>Nenhuma faixa encontrada com os filtros atuais.</p>
</section>



    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Projeto de levantamento artístico — letras propriedade dos compositores.</p>
    </div>
  </footer>

</body>
</html>
